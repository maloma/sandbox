-top:1px solid var(--line);backdrop-filter:blur(18px)}.nav{border:0;background:transparent;color:var(--muted);font-size:10px;font-weight:780;display:grid;place-items:center;gap:2px}.nav.active{color:var(--green)}.nav i{font-style:normal;font-size:19px}.modal{display:none;position:fixed;inset:0;z-index:60;background:rgba(4,18,28,.5);align-items:flex-end}.modal.open{display:flex}.sheet{width:min(100%,480px);margin:auto;background:var(--bg);border-radius:25px 25px 0 0;padding:18px 18px calc(22px + env(safe-area-inset-bottom))}.sheet h2{margin:0 0 14px}.amount{width:100%;padding:14px;border:1px solid var(--line);border-radius:16px;background:#fff;font-size:28px;font-weight:900}.save{width:100%;height:48px;border:0;border-radius:15px;background:var(--green);color:#fff;font-weight:900;margin-top:12px}.cancel{width:100%;height:42px;border:0;background:transparent;color:var(--muted);font-weight:800}</style></head><body><div class="app"><header class="top"><div class="brand">🛡 FamilyPilot</div><div class="head"><button class="round">◐</button><button class="round">Л</button></div></header><main><section class="card capital"><h2>Капитал · <span style="color:var(--muted)">всё время</span></h2><div class="value">6 097 €</div><div class="change">+897 € · +17,3%</div><svg viewBox="0 0 360 55"><defs><linearGradient id="cf" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#10a958" stop-opacity=".22"/><stop offset="1" stop-color="#10a958" stop-opacity=".02"/></linearGradient></defs><path d="M75 48 L130 53 L180 10 L235 11 L290 12 L335 13 L335 54 L75 54Z" fill="url(#cf)"/><path d="M75 48 L130 53 L180 10 L235 11 L290 12 L335 13" fill="none" stroke="var(--green)" stroke-width="3"/><circle cx="335" cy="13" r="4" fill="#fff" stroke="var(--green)" stroke-width="3"/></svg><div class="dates"><span>16.07.2026</span><span>19.07.2026</span></div></section><section class="card range"><button>День</button><button>Неделя</button><button class="active">Месяц</button><button>Год</button><button>Всё время</button></section><section class="card balance"><div class="balance-head"><h2>Финансовый баланс</h2><button class="analytics">Аналитика ›</button></div><div class="edge-labels"><div class="edge-label"><span class="negative">Расходы</span><strong id="expenseTop" class="negative">203 €</strong></div><div class="edge-label"><span class="positive">Приходы</span><strong id="incomeTop" class="positive">1 100 €</strong></div></div><div class="linear-wrap"><div class="linear-track"></div><span class="endpoint left"></span><span class="endpoint right"></span><span id="marker" class="marker"></span><span class="scale-label left" id="leftLabel">203 €</span><span id="zeroLabel" class="scale-label zero">0 €</span><span id="resultLabel" class="scale-label result">+897 €</span><span class="scale-label right" id="rightLabel">1 100 €</span></div><div class="metrics"><div class="metric"><span>Расход</span><strong id="expenseMetric" class="negative">203 €</strong></div><div class="metric"><span>Разница</span><strong id="diffMetric" class="positive">+897 €</strong></div><div class="metric"><span>Приход</span><strong id="incomeMetric" class="positive">1 100 €</strong></div></div></section><div class="debts"><button class="debt"><b>Мне должны</b><strong class="positive">180 €</strong><small>2 человека</small><i>›</i></button><button class="debt"><b>Я должен вернуть</b><strong class="negative">420 €</strong><small>3 человека</small><i>›</i></button></div><section class="card section"><h2>Крупнейшие категории расходов</h2><div class="cat"><div><div class="cat-row"><b>Продукты</b><span>54%</span></div><div class="bar"><i style="width:54%"></i></div></div><b>110 €</b></div><div class="cat"><div><div class="cat-row"><b>Транспорт</b><span>22%</span></div><div class="bar"><i style="width:22%"></i></div></div><b>45 €</b></div></section></main><div class="action-dock"><div class="actions"><button class="action income" data-kind="income"><span class="sign">＋</span><span><strong>Приход</strong>< ementById('cancel').onclick=()=>document.getElementById('modal').classList.remove('open');document.getElementById('save').onclick=()=>{const v=Number(document.getElementById('amount').value.replace(',','.'));if(v>0){kind==='income'?income+=v:expense+=v;document.getElementById('amount').value='';document.getElementById('modal').classList.remove('open');render()}};document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});render()})();</script><!-- Build: main-v6 | Scope: ACCEPTED_LINEAR_BALANCE_AND_FAST_ENTRY --></body></html>
