<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>FamilyPilot — Main v8</title><style>html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f5f7fb;color:#10213b}.loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.box{max-width:420px;background:#fff;border:1px solid #e6ebf2;border-radius:22px;padding:24px;box-shadow:0 12px 36px rgba(35,54,86,.10)}.spinner{width:40px;height:40px;margin:0 auto 15px;border:4px solid #e5efe9;border-top-color:#16a45a;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><div class="loading"><div class="box"><div class="spinner"></div><strong>Запускаем FamilyPilot</strong><p id="status">Обновляем маршруты и экраны…</p></div></div><script>const source='https://raw.githubusercontent.com/maloma/sandbox/f8df4ad5626218738078a4c62d2440b09ab12243/main-v7.html';const patchCss=`#periodSelector{margin:12px 0 0!important;border:1px solid var(--line)!important;box-shadow:none!important;background:var(--card2)!important}.balance>#periodSelector{border-radius:16px}.balance .edge-labels{margin-top:22px}.patch-title{display:flex;align-items:center;gap:8px}.patch-back{width:38px;height:38px;border:1px solid var(--line);border-radius:13px;background:var(--card);color:var(--ink);font-size:22px;box-shadow:var(--shadow)}.patch-range{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:3px;margin:10px 0 12px;border:1px solid var(--line);border-radius:16px;background:var(--card2)}.patch-range button{height:34px;border:0;border-radius:12px;background:transparent;color:var(--muted);font-size:12px;font-weight:800}.patch-range button.active{background:var(--card);color:var(--green);box-shadow:0 2px 8px rgba(35,54,86,.1)}.patch-modal{display:no t';const STORAGE_KEY='familypilot.main.v7';const $=id=>document.getElementById(id);const money=value=>new Intl.NumberFormat('ru-RU',{maximumFractionDigits:2}).format(Math.abs(value))+' €';const dateTime=value=>new Intl.DateTimeFormat('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}).format(new Date(value));const escape=value=>String(value).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const labels={day:'День',week:'Неделя',month:'Месяц',year:'Год',all:'Всё время'};let viewedId=null,allowNativeOperation=false,selectedCategory=null,patchHistory=[];function readState(){try{const value=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');return Array.isArray(value.transactions)?value:{transactions:[],range:'month'}}catch{return {transactions:[],range:'month'}}}function periodStart(range){const d=new Date();if(range==='day')return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();if(range==='week'){const day=(d.getDay()+6)%7;return new Date(d.getFullYear(),d.getMonth(),d.getDate()-day).getTime()}if(range==='month')return new Date(d.getFullYear(),d.getMonth(),1).getTime();if(range==='year')return new Date(d.getFullYear(),0,1).getTime();return 0}function selectedTransactions(){const state=readState(),start=periodStart(state.range);return state.transactions.filter(t=>t.date>=start)}function summary(){const expense=selectedTransactions().filter(t=>t.kind==='expense'),total=expense.reduce((s,t)=>s+Number(t.amount||0),0),map={};expense.forEach(t=>map[t.category]=(map[t.category]||0)+Number(t.amount||0));return Object.entries(map).map(([name,value])=>({name,value,percent:total?value/total*100:0})).sort((a,b)=>b.value-a.value)}function rangeHtml(){const current=readState().range||'month';return `<div class="patch-range">${Object.entries(labels).map(([key,label])=>`<button data-patch-range="${key}" class="${key===current?'active':''}">${label}</button>`).join('')}</div>`}function syncRanges(){const current=readState().range||'month';document.querySelectorAll('[data-patch-range]').forEach(b=>b.classList.toggle('active',b.dataset.patchRange===current))}function activateBuiltIn(name){if(name==='analytics'){$('analyticsBtn')?.click();return}document.querySelector(`[data-screen="${name}"]`)?.click()}function currentName(){return document.querySelector('.screen.active')?.id?.replace('Screen','')||'home'}function showPatch(name,push=true){const target=$(`${name}Screen`);if(!target)return;if(push)patchHistory.push(currentName());document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));target.classList.add('active');document.querySelectorAll('.nav').forEach(n=>n.classList.remove('active'));$('actionDock')?.classList.add('hidden');window.scrollTo({top:0,behavior:'instant'});if(name==='categories')renderCategories()}function backPatch(){const previous=patchHistory.pop()||'home';if(['categories','receivables','payables'].includes(previous))showPatch(previous,false);else activateBuiltIn(previous)}function openModal(id){$(id)?.classList.add('open')}function closeModal(id){$(id)?.classList.remove('open')}function operationHtml(t){return `<div class="operation" data-operation-id="${t.id}"><div class="op-icon ${t.kind}">${t.kind==='income'?'＋':'−'}</div><div><div class="op-title">${escape(t.category)}${t.receipt?'<span class="receipt-dot"></span>':''}</div><div class="op-meta">${dateTime(t.date)}${t.note?' · '+escape(t.note):''}</div></div><div class="op-value ${t.kind==='income'?'positive':'negative'}">${t.kind==='income'?'+':'−'}${money(t.amount)}</div></div>`}function openOperation(id){const t=readState().transactions.find(x=>x.id===id);if(!t)return;viewedId=id;$('patchViewAmount').textContent=`${t.kind==='income'?'+':'−'}${money(t.amount)}`;$('patchViewAmount').className=`patch-view-amount ${t.kind==='income'?'positive':'negative'}`;$('patchViewCategory').textContent=t.category;$('patchViewDate').textContent=dateTime(t.date);$('patchViewNote') g id="analyticsIncome" class="positive">0 €</strong></div><div><span>Расход</span><strong id="analyticsExpense" class="negative">0 €</strong></div><div><span>Разница</span><strong id="analyticsDiff">0 €</strong></div></div><section class="card section"><div class="section-head"><h2>Расходы по категориям</h2><button id="patchAnalyticsCategories" class="link">Подробнее</button></div><div id="analyticsCategories"></div></section>`}const main=document.querySelector('main');main?.insertAdjacentHTML('beforeend',`<section id="categoriesScreen" class="screen"><div class="page-title"><div class="patch-title"><button class="patch-back" data-patch-back>‹</button><h1 id="patchCategoriesTitle">Категории расходов</h1></div></div><section class="card section"><div id="patchCategoriesRange"></div></section><section class="card section"><div id="patchCategoriesList"></div></section><section id="patchCategoryDetail" class="card section patch-category-detail patch-hidden"><div class="section-head"><h2 id="patchCategoryOperationsTitle"></h2><button id="patchClearCategory" class="link">Все категории</button></div><div id="patchCategoryOperations"></div></section></section><section id="receivablesScreen" class="screen"><div class="page-title"><div class="patch-title"><button class="patch-back" data-patch-back>‹</button><h1>Мне должны</h1></div></div><section class="card section"><div class="patch-debt-list"><div class="patch-debt-person"><div class="patch-avatar">АК</div><div><b>Алексей К.</b><small>Вернуть до 25 июля</small></div><strong class="positive">120 €</strong></div><div class="patch-debt-person"><div class="patch-avatar">М</div><div><b>Марина</b><small>Срок не указан</small></div><strong class="positive">60 €</strong></div></div></section></section><section id="payablesScreen" class="screen"><div class="page-title"><div class="patch-title"><button class="patch-back" data-patch-back>‹</button><h1>Я должен вернуть</h1></div></div><section class="card section"><div class="patch-debt-list"><div class="patch-debt-person"><div class="patch-avatar">Б</div><div><b>Банк</b><small>Платёж 28 июля</small></div><strong class="negative">250 €</strong></div><div class="patch-debt-person"><div class="patch-avatar">ОД</div><div><b>Олег Д.</b><small>Вернуть до августа</small></div><strong class="negative">120 €</strong></div><div class="patch-debt-person"><div class="patch-avatar">Н</div><div><b>Наталья</b><small>Срок не указан</small></div><strong class="negative">50 €</strong></div></div></section></section>`)document.body.insertAdjacentHTML('beforeend',`<div id="patchCapitalModal" class="patch-modal"><div class="patch-sheet"><div class="patch-sheet-head"><h2>Что такое капитал</h2><button class="close" data-patch-close="patchCapitalModal">Закрыть</button></div><p class="patch-copy">Капитал — текущая сумма денег семьи с учётом всех сохранённых приходов и расходов. Он всегда считается за всю историю и не меняется при переключении периода финансового баланса.</p><p class="patch-copy">График показывает изменение капитала от первой записанной даты до сегодня.</p></div></div><div id="patchOperationModal" class="patch-modal"><div class="patch-sheet"><div class="patch-sheet-head"><h2>Операция</h2><button class="close" data-patch-close="patchOperationModal">Закрыть</button></div><div id="patchViewAmount" class="patch-view-amount"></div><div class="patch-view-row"><span>Категория</span><b id="patchViewCategory"></b></div><div class="patch-view-row"><span>Дата и время</span><b id="patchViewDate"></b></div><div class="patch-view-row"><span>Комментарий</span><b id="patchViewNote"></b></div><img id="patchViewReceipt" class="patch-view-receipt patch-hidden" alt="Чек"><div class="patch-actions"><button class="patch-btn patch-secondary" data-patch-close="patchOperationModal">Готово</button><button id="patchEditOperation" class="patch-btn patch-primary">Изменить</button></div></div></div>`)const info=document.querySelector('.capital .info');if(info)info.setAttribute('aria-label','Что такое капитал');document.addEventListener('click',event=>{const target=event.target;const close=target.closest('[data-patch-close]');if(close){event.preventDefault();event.stopImmediatePropagation();closeModal(close.dataset.patchClose);return}if(target.closest('.capital .info')){event.preventDefault();event.stopImmediatePropagation();openModal('patchCapitalModal');return}const back=target.closest('[data-patch-back]');if(back){event.preventDefault();event.stopImmediatePropagation();back.dataset.patchBack==='home'?activateBuiltIn('home'):backPatch();return}const range=target.closest('[data-patch-range]');if(range){event.preventDefault();event.stopImmediatePropagation();const original=document.querySelector(`#periodSelector [data-range="${range.dataset.patchRange}"]`);original?.click();setTimeout(()=>{syncRanges();renderCategories()},0);return}if(target.closest('#categoriesAllBtn')){event.preventDefault();event.stopImmediatePropagation();selectedCategory=null;showPatch('categories');return}if(target.closest('#patchAnalyticsCategories')){event.preventDefault();event.stopImmediatePropagation();selectedCategory=null;showPatch('categories');return}const topCat=target.closest('#topCategories .cat,#analyticsCategories .cat');if(topCat){event.preventDefault();event.stopImmediatePropagation();selectedCategory=topCat.querySelector('.cat-row b')?.textContent||null;showPatch('categories');return}const patchCat=target.closest('[data-patch-category]');if(patchCat){event.preventDefault();event.stopImmediatePropagation();selectedCategory=patchCat.dataset.patchCategory;renderCategories();return}if(target.closest('#patchClearCategory')){event.preventDefault();event.stopImmediatePropagation();selectedCategory=null;renderCategories();return}const debt=target.closest('.debt');if(debt){event.preventDefault();event.stopImmediatePropagation();const index=[...document.querySelectorAll('.debt')].indexOf(debt);showPatch(index===0?'receivables':'payables');return}const row=target.cl
