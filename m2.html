<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<title>FamilyPilot — M2 Долги</title>
<style>html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f4f7f6;color:#17332d}.loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.box{max-width:440px;background:#fff;border:1px solid #d8e4e1;border-radius:20px;padding:22px}.spinner{width:38px;height:38px;margin:0 auto 14px;border:4px solid #dfeeea;border-top-color:#0f766e;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}button{font:inherit;border:0;border-radius:13px;padding:12px 16px;background:#0f766e;color:#fff;font-weight:750}</style>
</head>
<body>
<div class="loading"><div class="box"><div class="spinner"></div><strong>Открываем модуль 2</strong><p id="status">Загружаем долговые цепочки…</p><button id="retry" hidden>Повторить</button></div></div>
<script>
const urls={core:'https://raw.githubusercontent.com/maloma/sandbox/e6421db0eed8c84bb774f2ef627985ef0139669d/m2.html',runtime:'https://raw.githubusercontent.com/maloma/sandbox/33b461376b501d5ff02d12d4258903af0d4c1bc4/m2-runtime-v6.js',guidance:'https://raw.githubusercontent.com/maloma/sandbox/8e41457983e422938afee6598808ab1aa919d4c4/m2-runtime-v6-guidance.js',layout:'https://raw.githubusercontent.com/maloma/sandbox/ae38975739685a59113e0ffa93702be41df7d41d/m2-calculator-layout-v3.js',limit:'https://raw.githubusercontent.com/maloma/sandbox/9485b49571497c3c337197f21a43f10699ab34ac/m2-money-limit-v1.js',mobile:'https://raw.githubusercontent.com/maloma/sandbox/7ed2a9908f5a9ff81b0679f5f42264683f80d2b6/m2-mobile-calculator-fixes-v1.js',chainScroll:'https://raw.githubusercontent.com/maloma/sandbox/322b418b2df993d875b9b8339877e5aaaac1ab3a/m2-chain-scroll-fix-v1.js'};
const chainUrls=['https://raw.githubusercontent.com/maloma/sandbox/e695148722b7119fb565a2fc0983fa74b3c40f4a/m2-debt-chains-v1.part00.js','https://raw.githubusercontent.com/maloma/sandbox/36c942a3688c3691cb86d42fb77aee83c27a2ab9/m2-debt-chains-v1.part01.js','https://raw.githubusercontent.com/maloma/sandbox/304ce324e52be96588e36e161331af10e0abd135/m2-debt-chains-v1.part02.js','https://raw.githubusercontent.com/maloma/sandbox/1f55efe9dd57ba21d0baaef94fa3e4deff1eafcd/m2-debt-chains-v1.part03.js','https://raw.githubusercontent.com/maloma/sandbox/d694e1709f6ea6a93c7876519d3c12257f75639c/m2-debt-chains-v1.part04.js','https://raw.githubusercontent.com/maloma/sandbox/1b5266409fe3998c6367071f86b77031e74cc98e/m2-debt-chains-v1.part05.js'];
async function text(url){const response=await fetch(url,{cache:'no-store'});if(!response.ok)throw new Error('HTTP');return response.text()}
async function load(){const status=document.getElementById('status'),retry=document.getElementById('retry');retry.hidden=true;status.textContent='Загружаем долговые цепочки…';try{const[html,runtime,guidance,layout,limit,mobile,chainScroll,...parts]=await Promise.all([text(urls.core),text(urls.runtime),text(urls.guidance),text(urls.layout),text(urls.limit),text(urls.mobile),text(urls.chainScroll),...chainUrls.map(text)]);const chains=parts.join('');if(!html.includes('FamilyPilot')||!chains.includes('Закрыть этот долг')||!chains.includes('Сохранить и пересчитать')||!chainScroll.includes('m2-modal-scroll-locked'))throw new Error('Некорректный файл');new Function(chains);new Function(chainScroll);const corrected=html.replace('</body>','<script>'+runtime+'\n'+guidance+'\n'+layout+'\n'+limit+'\n'+mobile+'\n'+chains+'\n'+chainScroll+'<\/script></body>');document.open();document.write(corrected);document.close()}catch(error){status.textContent='Не удалось загрузить M2. Нажмите «Повторить».';retry.hidden=false}}
document.getElementById('retry').onclick=load;load();
</script>
</body>
</html>
