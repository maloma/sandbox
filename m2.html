<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<title>FamilyPilot — M2 Долги</title>
<style>html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f4f7f6;color:#17332d}.loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.box{max-width:440px;background:#fff;border:1px solid #d8e4e1;border-radius:20px;padding:22px}.spinner{width:38px;height:38px;margin:0 auto 14px;border:4px solid #dfeeea;border-top-color:#0f766e;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}button{font:inherit;border:0;border-radius:13px;padding:12px 16px;background:#0f766e;color:#fff;font-weight:750}</style>
</head>
<body>
<div class="loading"><div class="box"><div class="spinner"></div><strong>Открываем модуль 2</strong><p id="status">Загружаем исправления калькулятора…</p><button id="retry" hidden>Повторить</button></div></div>
<script>
const coreUrl='https://raw.githubusercontent.com/maloma/sandbox/e6421db0eed8c84bb774f2ef627985ef0139669d/m2.html';
const runtimeUrl='https://raw.githubusercontent.com/maloma/sandbox/33b461376b501d5ff02d12d4258903af0d4c1bc4/m2-runtime-v6.js';
const guidanceUrl='https://raw.githubusercontent.com/maloma/sandbox/8e41457983e422938afee6598808ab1aa919d4c4/m2-runtime-v6-guidance.js';
const calculatorLayoutUrl='https://raw.githubusercontent.com/maloma/sandbox/ae38975739685a59113e0ffa93702be41df7d41d/m2-calculator-layout-v3.js';
const moneyLimitUrl='https://raw.githubusercontent.com/maloma/sandbox/9485b49571497c3c337197f21a43f10699ab34ac/m2-money-limit-v1.js';
const mobileFixUrl='https://raw.githubusercontent.com/maloma/sandbox/7ed2a9908f5a9ff81b0679f5f42264683f80d2b6/m2-mobile-calculator-fixes-v1.js';
async function load(){const status=document.getElementById('status'),retry=document.getElementById('retry');retry.hidden=true;status.textContent='Загружаем исправления калькулятора…';try{const[coreResponse,runtimeResponse,guidanceResponse,layoutResponse,limitResponse,mobileFixResponse]=await Promise.all([fetch(coreUrl,{cache:'no-store'}),fetch(runtimeUrl,{cache:'no-store'}),fetch(guidanceUrl,{cache:'no-store'}),fetch(calculatorLayoutUrl,{cache:'no-store'}),fetch(moneyLimitUrl,{cache:'no-store'}),fetch(mobileFixUrl,{cache:'no-store'})]);if(!coreResponse.ok||!runtimeResponse.ok||!guidanceResponse.ok||!layoutResponse.ok||!limitResponse.ok||!mobileFixResponse.ok)throw new Error('HTTP');const html=await coreResponse.text(),runtime=await runtimeResponse.text(),guidance=await guidanceResponse.text(),layout=await layoutResponse.text(),limit=await limitResponse.text(),mobileFix=await mobileFixResponse.text();if(!html.includes('FamilyPilot')||!runtime.includes('автоматически становится встречным долгом')||!guidance.includes('основную сумму долга')||!layout.includes('Очистить весь расчёт')||!limit.includes('Максимальная сумма — 999 999,99 €')||!mobileFix.includes('Введите копейки'))throw new Error('Некорректный файл');const corrected=html.replace('</body>','<script>'+runtime+'\n'+guidance+'\n'+layout+'\n'+limit+'\n'+mobileFix+'<\/script></body>');document.open();document.write(corrected);document.close()}catch(error){status.textContent='Не удалось загрузить M2. Нажмите «Повторить».';retry.hidden=false}}
document.getElementById('retry').onclick=load;load();
</script>
</body>
</html>
