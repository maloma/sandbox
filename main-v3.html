.balance{padding:10px 14px 8px}.balance-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.analytics-btn{border:0;background:transparent;color:var(--brand);font-size:13px;font-weight:850;padding:6px;cursor:pointer}.gauge{width:100%;height:auto;display:block;margin-top:-2px}.gauge-track{fill:none;stroke:var(--line);stroke-width:13;stroke-linecap:round}.gauge-zone{fill:none;stroke-width:13;stroke-linecap:round}.gauge-tick{stroke:color-mix(in srgb,var(--muted) 76%,transparent);stroke-width:1.5}.gauge-tick.major{stroke-width:2.5}.gauge-label{font-size:12px;fill:var(--ink);font-weight:800}.needle{stroke:var(--ink);stroke-width:5;stroke-linecap:round;filter:drop-shadow(0 2px 3px rgba(0,0,0,.22))}.needle-hub{fill:var(--surface);stroke:var(--ink);stroke-width:4}.gauge-result{font-size:28px;font-weight:920;fill:var(--income);letter-spacing:-.5px}.gauge-result.negative{fill:var(--expense)}.gauge-caption{font-size:13px;fill:var(--muted);font-weight:750}.balance-metrics{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line);margin-top:-8px}.balance-metric{text-align:center;padding:9px 5px 2px;border-left:1px solid var(--line)}.balance-metric:first-child{border-left:0}.balance-metric span{display:block;color:var(--muted);font-size:12px;font-weight:700}.balance-metric strong{display:block;margin-top:3px;font-size:17px;white-space:nowrap}.positive{color:var(--income)!important}.negative{color:var(--expense)!important}

.section{padding:16px}.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.section-head h2{font-size:16px;margin:0;letter-spacing:-.2px}.section-link{border:0;background:transparent;color:var(--brand);font-weight:850;font-size:13px;cursor:pointer}.cats{display:grid;gap:12px}.cat{display:grid;grid-template-columns:26px minmax(0,1fr) auto;gap:10px;align-items:center}.cat-icon{width:26px;height:26px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;font-size:15px}.cat-main{min-width:0}.cat-row{display:flex;justify-content:space-between;gap:8px;font-size:14px}.cat-name{font-weight:800}.cat-percent{color:var(--muted);font-weight:750}.bar{height:7px;border-radius:999px;background:var(--line);overflow:hidden;margin-top:6px}.bar i{height:100%;display:block;border-radius:999px;background:linear-gradient(90deg,var(--brand),color-mix(in srgb,var(--brand) 65%,#8bdb9e))}.cat-value{font-size:14px;font-weight:850;white-space:nowrap}
.operations{display:grid}.operation{display:grid;grid-template-columns:38px minmax(0,1fr) auto;gap:10px;align-items:center;padding:11px 0;border-top:1px solid var(--line);cursor:pointer}.operation:first-child{border-top:0}.op-icon{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:17px}.op-icon.income{background:var(--income)}.op-icon.expense{background:var(--expense)}.op-title{font-size:14px;font-weight:850}.op-meta{font-size:12px;color:var(--muted);margin-top:2px}.op-value{font-size:16px;font-weight:900;white-space:nowrap}
.bottom-nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:30;width:min(100%,480px);height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);align-items:end;background:color-mix(in srgb,var(--surface) 94%,transparent);backdrop-filter:blur(20px);border-top:1px solid var(--line);box-shadow:0 -8px 28px rgba(35,54,86,.08)}.nav-item{border:0;background:transparent;color:var(--muted);display:grid;place-items:center;gap:3px;font-size:10px;font-weight:750;padding:5px 1px;cursor:pointer}.nav-item.active{color:var(--brand)}.nav-icon{font-size:21px;line-height:1}
.modal{display:none;position:fixed;inset:0;z-index:50;background:rgba(4,18,28,.54);align-items:flex-end;justify-content:center}.modal.open{display:flex}.sheet{width:min(100%,480px);max-height:92dvh;overflow:auto;background:var(--page);border-radius:28px 28px 0 0;padding:18px 18px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -18px 50px rgba(0,0,0,.22)}.sheet-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.sheet h2{margin:0;font-size:23px}.close{border:1px solid var(--line);background:var(--surface);border-radius:13px;padding:9px 12px;font-weight:800;cursor:pointer}.field{display:grid;gap:7px;margin-top:15px}.field label{font-size:13px;font-weight:850}.amount{width:100%;border:1px solid var(--line);border-radius:18px;background:var(--surface);color:var(--ink);padding:15px;font-size:30px;font-weight:920;outline:none}.amount:focus{border-color:var(--brand);box-shadow:0 0 0 4px color-mix(in srgb,var(--brand) 14%,transparent)}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:10px 13px;cursor:pointer}.chip.active{background:color-mix(in srgb,var(--brand) 12%,var(--surface));border-color:var(--brand);color:var(--brand);font-weight:850}.sheet-actions{display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-top:18px}.btn{min-height:48px;border:0;border-radius:15px;font-weight:900;cursor:pointer}.btn-secondary{background:var(--surface);border:1px solid var(--line)}.btn-primary{background:var(--brand);color:#fff}.error{min-height:20px;color:var(--expense);font-size:13px;margin-top:6px}.analytics-page{padding-bottom:20px}.back{border:0;background:transparent;color:var(--brand);font-weight:900;padding:2px 0 12px;cursor:pointer}.analytics-page h1{margin:0 0 12px}.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.summary-box{padding:13px 8px;border-radius:16px;background:var(--surface-2);text-align:center}.summary-box span{font-size:11px;color:var(--muted)}.summary-box strong{display:block;margin-top:5px;font-size:16px}
.toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 18px);transform:translateX(-50%) translateY(20px);z-index:60;opacity:0;pointer-events:none;width:min(calc(100% - 28px),440px);background:#10213b;color:#fff;border-radius:16px;padding:13px 15px;box-shadow:0 14px 36px rgba(0,0,0,.25);transition:.22s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:370px){main{padding-left:10px;padding-right:10px}.capital-value{font-size:30px}.balance{padding-left:10px;padding-right:10px}.gauge-label{font-size:10px}.gauge-result{font-size:24px}.balance-metric strong{font-size:15px}.debts{grid-template-columns:1fr 1fr}.debt strong{font-size:18px}.sheet-actions{grid-template-columns:1fr}.analytics-link{align-items:flex-start}.capital-value{font-size:24px}}
@media(min-width:700px){body{padding:28px 0}.app{border-radius:30px;overflow:hidden;box-shadow:0 28px 70px rgba(20,38,60,.18);min-height:calc(100vh - 56px)}.bottom-nav{bottom:28px;border-radius:0 0 30px 30px}}
</style>
</head>
<body>
<div class="app">
<header class="topbar">
  <div class="brand"><svg viewBox="0 0 32 36" aria-hidden="true"><path d="M16 2 28 7v9c0 8-4.8 14.2-12 18C8.8 30.2 4 24 4 16V7z" fill="none" stroke="var(--brand)" stroke-width="3"/><path d="m10 18 4 4 8-10" fill="none" stroke="var(--brand)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg><span>FamilyPilot</span></div>
  <div class="head-actions"><button id="themeToggle" class="icon-btn" aria-label="Сменить тему">◐</button><button class="icon-btn avatar" aria-label="Профиль">Л</button></div>
</header>
<main>
<section id="homeScreen" class="screen active">
  <section class="card capital">
    <div class="capital-head"><div><div class="capital-kicker">Капитал <span class="muted">· всё время</span></div><div id="capitalValue" class="capital-value">0 €</div><div id="capitalChange" class="capital-change">0 €</div></div><div class="info-dot">i</div></div>
    <svg id="capitalChart" class="capital-chart" viewBox="0 0 420 110" role="img" aria-label="Рост капитала за всё время"></svg>
    <div class="capital-date-row"><span id="capitalStart">—</span><span id="capitalEnd">—</span></div>
  </section>

  <div class="range" aria-label="Период анализа"><button data-range="day">День</button><button data-range="week">Неделя</button><button class="active" data-range="month">Месяц</button><button data-range="year">Год</button><button data-range="all">Всё время</button></div>

  <section class="card balance">
    <div class="balance-head"><div class="card-title">Финансовый баланс</div><button id="openAnalytics" class="analytics-btn">Аналитика ›</button></div>
    <svg id="gauge" class="gauge" viewBox="0 0 400 175" role="img" aria-label="Индикатор финансового баланса"></svg>
    <div class="balance-metrics"><div class="balance-metric"><span>Приход</span><strong id="incomeTotal" class="positive">0 €</strong></div><div class="balance-metric"><span>Расход</span><strong id="expenseTotal" class="negative">0 €</strong></div><div class="balance-metric"><span>Разница</span><strong id="differenceTotal">0 €</strong></div></div>
  </section>

  <div class="debts">
    <button class="debt" data-debt="receivable"><span class="debt-icon">♙</span><span><span class="debt-label">Мне должны</span><span id="receivableTotal" class="debt-value positive">0 €</span><span class="debt-meta">2 человека</span></span><span class="chev">›</span></button>
    <button class="debt payable" data-debt="payable"><span class="debt-icon">≋</span><span><span class="debt-label">Я должен вернуть</span><span id="payableTotal" class="debt-value negative">0 €</span><span class="debt-meta">3 человека</span></span><span class="chev">›</span></button>
  </div>

  <div class="action-zone"><div class="actions">
    <button class="action action-income" data-open-entry="income"><span class="action-sign">+</span><span><strong>Приход</strong><small>Добавить доход</small></span><span class="action-arrow">›</span></button>
    <button class="action action-expense" data-open-entry="expense"><span class="action-sign">−</span><span><strong>Расход</strong><small>Добавить расход</small></span><span class="action-arrow">›</span></button>
  </div></div>

  <section class="card section"><div class="section-head"><h2>Крупнейшие категории расходов</h2><button id="allCategories" class="section-link">Все ›</button></div><div id="topCategories" class="cats"></div></section>
  <section class="card section"><div class="section-head"><h2>Последние операции</h2><button class="section-link">Все</button></div><div id="recentOperations" class="operations"></div></section>
</section>

<section id="analyticsScreen" class="screen analytics-page">
  <button id="backHome" class="back">← На главную</button><h1>Аналитика</h1>
  <section class="card section"><div class="section-head"><h2 id="analyticsPeriod">За месяц</h2></div><div class="summary-grid"><div class="summary-box"><span>Приход</span><strong id="aIncome" class="positive">0 €</strong></div><div class="summary-box"><span>Расход</span><strong id="aExpense" class="negative">0 €</strong></div><div class="summary-box"><span>Разница</span><strong id="aDifference">0 €</strong></div></div></section>
  <section class="card section"><div class="section-head"><h2>Структура расходов</h2></div><div id="analyticsCategories" class="cats"></div></section>
</section>
</main>
</div>

<nav class="bottom-nav" aria-label="Основная навигация"><button class="nav-item active"><span class="nav-icon">⌂</span><span>Главная</span></button><button class="nav-item"><span class="nav-icon">☷</span><span>Операции</span></button><button class="nav-item"><span class="nav-icon">▣</span><span>Планы</span></button><button class="nav-item"><span class="nav-icon">⊞</span><span>Ещё</span></button></nav>

<div id="entryModal" class="modal"><div class="sheet"><div class="sheet-head"><div><h2 id="entryTitle">Расход</h2><div class="muted">Сумма и категория — детали можно добавить позже.</div></div><button class="close" data-close>Закрыть</button></div><div class="field"><label for="amount">Сумма</label><input id="amount" class="amount" inputmode="decimal" autocomplete="off" placeholder="0,00"></div><div class="field"><label>Категория</label><div id="categoryChips" class="chips"></div></div><div id="entryError" class="error"></div><div class="sheet-actions"><button id="cancelEntry" class="btn btn-secondary">Отмена</button><button id="saveEntry" class="btn btn-primary">Сохранить</button></div></div></div>
<div id="debtModal" class="modal"><div class="sheet"><div class="sheet-head"><div><h2 id="debtTitle">Долги</h2><div id="debtText" class="muted" style="margin-top:8px;line-height:1.55"></div></div><button class="close" data-close>Закрыть</button></div></div></div>
<div id="toast" class="toast"></div>

<script>
(()=>{'use strict';
const $=id=>document.getElementById(id),KEY='familypilot.standard.v3',OLD_KEYS=['familypilot.main.v2','familypilot.main.v1'];
const memStore={};function storeGet(k){try{return localStorage.getItem(k)}catch(e){return memStore[k]??null}}function storeSet(k,v){try{localStorage.setItem(k,v)}catch(e){memStore[k]=String(v)}}
const expenseCats=['Продукты','Транспорт','Жильё','Ребёнок','Здоровье','Другое'];
const incomeCats=['Зарплата','Продажа','Возврат','Подарок','Другое'];
const now=Date.now(),day=86400000;
const demo={openingCapital:5200,operations:[
{id:'a1',type:'income',amount:980,category:'Зарплата',ts:now-780*day,receipt:false},
{id:'a2',type:'expense',amount:310,category:'Жильё',ts:now-720*day,receipt:false},
{id:'a3',type:'income',amount:1100,category:'Зарплата',ts:now-600*day,receipt:false},
{id:'a4',type:'expense',amount:430,category:'Продукты',ts:now-520*day,receipt:false},
{id:'a5',type:'income',amount:1450,category:'Продажа',ts:now-400*day,receipt:false},
{id:'a6',type:'expense',amount:690,category:'Жильё',ts:now-300*day,receipt:false},
{id:'a7',type:'income',amount:1200,category:'Зарплата',ts:now-180*day,receipt:false},
{id:'d1',type:'expense',amount:46,category:'Продукты',ts:now-3600000,receipt:false},
{id:'d2',type:'expense',amount:32,category:'Транспорт',ts:now-day,receipt:false},
{id:'d3',type:'income',amount:1100,category:'Зарплата',ts:now-2*day,receipt:false},
{id:'d4',type:'expense',amount:125,category:'Жильё',ts:now-3*day,receipt:false}],
debts:{receivable:1240,payable:2580}};
let state=load(),range='month',entryType='expense',selectedCategory='',toastTimer,lastTouchEnd=0;
function valid(x){return x&&Number.isFinite(x.openingCapital)&&Array.isArray(x.operations)&&x.debts}
function load(){try{const x=JSON.parse(storeGet(KEY));if(valid(x))return x}catch(e){}for(const k of OLD_KEYS){try{const x=JSON.parse(storeGet(k));if(x&&Array.isArray(x.operations)&&x.debts){const migrated={openingCapital:Number.isFinite(x.openingCapital)?x.openingCapital:5200,operations:x.operations,debts:x.debts};storeSet(KEY,JSON.stringify(migrated));return migrated}}catch(e){}}storeSet(KEY,JSON.stringify(demo));return JSON.parse(JSON.stringify(demo))}
function save(){storeSet(KEY,JSON.stringify(state))}
function money(n){const whole=Math.abs(n-Math.round(n))<.000001;return new Intl.NumberFormat('ru-RU',{style:'currency',currency:'EUR',minimumFractionDigits:whole?0:2,maximumFractionDigits:2}).format(n)}
function signed(n){return`${n>=0?'+':'−'}${money(Math.abs(n))}`}
const labels={day:'За день',week:'За неделю',month:'За месяц',year:'За год',all:'За всё время'};
function startOf(kind){const d=new Date();if(kind==='all')return-Infinity;if(kind==='day'){d.setHours(0,0,0,0);return+d}if(kind==='week'){const shift=(d.getDay()+6)%7;d.setDate(d.getDate()-shift);d.setHours(0,0,0,0);return+d}if(kind==='month'){d.setDate(1);d.setHours(0,0,0,0);return+d}d.setMonth(0,1);d.setHours(0,0,0,0);return+d}
function periodOps(){const start=startOf(range);return state.operations.filter(o=>o.ts>=start)}
function totals(){const ops=periodOps(),income=ops.filter(o=>o.type==='income').reduce((s,o)=>s+o.amount,0),expense=ops.filter(o=>o.type==='expense').reduce((s,o)=>s+o.amount,0);return{income,expense,difference:income-expense}}
function categoryRows(){const sums={};periodOps().filter(o=>o.type==='expense').forEach(o=>sums[o.category]=(sums[o.category]||0)+o.amount);const rows=Object.entries(sums).sort((a,b)=>b[1]-a[1]);const max=rows[0]?.[1]||1,total=rows.reduce((s,r)=>s+r[1],0)||1;return rows.map(([name,value])=>({name,value,pct:value/max*100,share:value/total*100}))}
function capitalPoints(){const sorted=[...state.operations].sort((a,b)=>a.ts-b.ts);let value=state.openingCapital;const pts=[{ts:sorted[0]?.ts||now,value}];for(const o of sorted){value+=o.type==='income'?o.amount:-o.amount;pts.push({ts:o.ts,value})}if(pts.length===1)pts.push({ts:now,value});return pts}
function renderCapital(){const pts=capitalPoints(),values=pts.map(p=>p.value),min=Math.min(...values),max=Math.max(...values),span=Math.max(1,max-min),L=10,R=410,T=10,B=96,W=R-L,H=B-T;const coords=pts.map((p,i)=>({x:L+i/(pts.length-1)*W,y:B-(p.value-min)/span*H,...p}));const line=coords.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '),area=`${L},${B} ${line} ${R},${B}`,first=pts[0].value,last=pts.at(-1).value,change=last-first,pct=first?change/Math.abs(first)*100:0;$('capitalValue').textContent=money(last);$('capitalChange').textContent=`${signed(change)}  ·  ${pct>=0?'+':''}${pct.toFixed(1).replace('.',',')}%`;$('capitalChange').className='capital-change '+(change>=0?'positive':'negative');$('capitalStart').textContent=new Date(pts[0].ts).toLocaleDateString('ru-RU');$('capitalEnd').textContent=new Date(pts.at(-1).ts).toLocaleDateString('ru-RU');$('capitalChart').innerHTML=`<defs><linearGradient id="capitalFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--income)" stop-opacity=".24"/><stop offset="100%" stop-color="var(--income)" stop-opacity=".015"/></linearGradient></defs><line x1="${L}" y1="${B}" x2="${R}" y2="${B}" class="capital-grid"/><polygon points="${area}" class="capital-area"/><polyline points="${line}" class="capital-line"/><circle cx="${coords.at(-1).x}" cy="${coords.at(-1).y}" r="5" class="capital-dot"/>`}
function polar(cx,cy,r,deg){const rad=deg*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}}
function arc(cx,cy,r,startDeg,endDeg){const s=polar(cx,cy,r,startDeg),e=polar(cx,cy,r,endDeg);return`M ${s.x} ${s.y} A ${r} ${r} 0 0 1 ${e.x} ${e.y}`}
function renderGauge(t){const maxBase=Math.max(t.income,t.expense,1),ratio=Math.max(-1,Math.min(1,t.difference/maxBase)),angle=180+(ratio+1)/2*180;const cx=200,cy=143,r=104,needleR=80,tip=polar(cx,cy,needleR,angle);let ticks='',labs='';for(let v=-100;v<=100;v+=10){const a=180+(v+100)/200*180,p1=polar(cx,cy,r-4,a),p2=polar(cx,cy,r-(v%50===0?16:10),a);ticks+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" class="gauge-tick ${v%50===0?'major':''}"/>`;if(v%50===0){const p=polar(cx,cy,r+17,a);labs+=`<text x="${p.x}" y="${p.y+4}" text-anchor="middle" class="gauge-label">${v}%</text>`}}const cls=t.difference<0?'negative':'';$('gauge').innerHTML=`<path d="${arc(cx,cy,r,180,360)}" class="gauge-track"/><path d="${arc(cx,cy,r,180,252)}" class="gauge-zone" stroke="var(--expense)"/><path d="${arc(cx,cy,r,252,288)}" class="gauge-zone" stroke="var(--amber)"/><path d="${arc(cx,cy,r,288,360)}" class="gauge-zone" stroke="var(--income)"/>${ticks}${labs}<line x1="${cx}" y1="${cy}" x2="${tip.x}" y2="${tip.y}" class="needle"/><circle cx="${cx}" cy="${cy}" r="8" class="needle-hub"/><text x="${cx}" y="116" text-anchor="middle" class="gauge-result ${cls}">${signed(t.difference)}</text><text x="${cx}" y="134" text-anchor="middle" class="gauge-caption">${t.difference>0?'Положительный баланс':t.difference<0?'Отрицательный баланс':'Баланс равен нулю'}</text>`}
function esc(v){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function iconFor(cat){return({Продукты:'🛒',Транспорт:'🚙',Жильё:'⌂',Ребёнок:'★',Здоровье:'✚'}[cat]||'•')}
function renderCats(target,limit){const rows=categoryRows().slice(0,limit);target.innerHTML=rows.length?rows.map(r=>`<div class="cat"><span class="cat-icon">${iconFor(r.name)}</span><div class="cat-main"><div class="cat-row"><span class="cat-name">${esc(r.name)}</span><span class="cat-percent">${Math.round(r.share)}%</span></div><div class="bar"><i style="width:${r.pct}%"></i></div></div><span class="cat-value">${money(r.value)}</span></div>`).join(''):'<div class="muted">Пока нет расходов за выбранный период.</div>'}
function renderRecent(){const rows=[...state.operations].sort((a,b)=>b.ts-a.ts).slice(0,4);$('recentOperations').innerHTML=rows.map(o=>`<div class="operation"><span class="op-icon ${o.type}">${o.type==='income'?'↓':'🛒'}</span><span><span class="op-title">${esc(o.category)}</span><span class="op-meta">${new Date(o.ts).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span></span><span class="op-value ${o.type==='income'?'positive':'negative'}">${o.type==='income'?'+':'−'}${money(o.amount)}</span></div>`).join('')}
function render(){const t=totals();$('incomeTotal').textContent=money(t.income);$('expenseTotal').textContent=money(t.expense);$('differenceTotal').textContent=signed(t.difference);$('differenceTotal').className=t.difference>=0?'positive':'negative';$('receivableTotal').textContent=money(state.debts.receivable);$('payableTotal').textContent=money(state.debts.payable);$('aIncome').textContent=money(t.income);$('aExpense').textContent=money(t.expense);$('aDifference').textContent=signed(t.difference);$('aDifference').className=t.difference>=0?'positive':'negative';$('analyticsPeriod').textContent=labels[range];document.querySelectorAll('[data-range]').forEach(b=>b.classList.toggle('active',b.dataset.range===range));renderCapital();renderGauge(t);renderCats($('topCategories'),3);renderCats($('analyticsCategories'),20);renderRecent()}
function openModal(id){$(id).classList.add('open')}function closeModal(el){el.closest('.modal').classList.remove('open')}
function openEntry(type){entryType=type;selectedCategory='';$('entryTitle').textContent=type==='income'?'Приход':'Расход';$('amount').value='';$('entryError').textContent='';const cats=type==='income'?incomeCats:expenseCats;$('categoryChips').innerHTML=cats.map(c=>`<button class="chip" data-cat="${esc(c)}">${esc(c)}</button>`).join('');document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{selectedCategory=b.dataset.cat;document.querySelectorAll('[data-cat]').forEach(x=>x.classList.toggle('active',x===b))});openModal('entryModal');setTimeout(()=>$('amount').focus(),120)}
function saveEntry(){const amount=Number($('amount').value.trim().replace(',','.'));if(!amount||amount<=0){$('entryError').textContent='Введите сумму больше нуля.';return}if(!selectedCategory){$('entryError').textContent='Выберите категорию.';return}state.operations.push({id:'o'+Date.now(),type:entryType,amount,category:selectedCategory,ts:Date.now(),receipt:false});save();render();$('entryModal').classList.remove('open');toast('Операция сохранена')}
function toast(text){$('toast').textContent=text;$('toast').classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>$('toast').classList.remove('show'),2600)}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');scrollTo({top:0,behavior:'smooth'})}
document.querySelectorAll('[data-range]').forEach(b=>b.onclick=()=>{range=b.dataset.range;render()});
document.querySelectorAll('[data-open-entry]').forEach(b=>b.onclick=()=>openEntry(b.dataset.openEntry));
document.querySelectorAll('[data-debt]').forEach(b=>b.onclick=()=>{const recv=b.dataset.debt==='receivable';$('debtTitle').textContent=recv?'Мне должны':'Я должен вернуть';$('debtText').textContent=recv?`Общая сумма: ${money(state.debts.receivable)}. Здесь откроется список людей и сроков возврата.`:`Общая сумма: ${money(state.debts.payable)}. Здесь откроется список обязательств семьи.`;openModal('debtModal')});
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>closeModal(b));$('cancelEntry').onclick=()=>$('entryModal').classList.remove('open');$('saveEntry').onclick=saveEntry;
$('openAnalytics').onclick=$('allCategories').onclick=()=>showScreen('analyticsScreen');$('backHome').onclick=()=>showScreen('homeScreen');
$('themeToggle').onclick=()=>{const dark=document.body.dataset.theme==='dark';document.body.dataset.theme=dark?'light':'dark';storeSet('familypilot.theme',dark?'light':'dark')};document.body.dataset.theme=storeGet('familypilot.theme')||'light';
document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});document.addEventListener('touchend',e=>{const n=Date.now();if(n-lastTouchEnd<=300)e.preventDefault();lastTouchEnd=n},{passive:false});
render();
})();
