<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta http-equiv="cache-control" content="no-store"><meta name="theme-color" content="#f5f7fb"><title>FamilyPilot</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5f7fb}iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#f5f7fb}</style></head><body><iframe id="shell" title="FamilyPilot"></iframe><script>
(()=>{
'use strict';
const shell=document.getElementById('shell');
const PERIOD_KEY='familypilot.period.selection.v3',APP_KEY='familypilot.main.v7';
const types=['day','week','month','year','all'];
let ops={range:'month',anchor:Date.now()},pickerOpen=false;
function deepest(doc){let current=doc;for(let i=0;i<6;i++){if(current?.getElementById('operationsScreen'))return current;const f=current?.querySelector('iframe');if(!f?.contentWindow?.document)break;current=f.contentWindow.document}return null}
function norm(v){return {range:types.includes(v?.range)?v.range:'month',anchor:Number(v?.anchor)||Date.now()}}
function homePeriod(w){try{return norm(JSON.parse(w.localStorage.getItem(PERIOD_KEY)||'{}').home)}catch{return norm(null)}}
function bounds(p){const x=new Date(p.anchor),y=x.getFullYear(),m=x.getMonth(),d=x.getDate();if(p.range==='day')return[new Date(y,m,d).getTime(),new Date(y,m,d+1).getTime()];if(p.range==='week'){const q=(x.getDay()+6)%7,s=new Date(y,m,d-q);return[s.getTime(),new Date(s.getFullYear(),s.getMonth(),s.getDate()+7).getTime()]};if(p.range==='month')return[new Date(y,m,1).getTime(),new Date(y,m+1,1).getTime()];if(p.range==='year')return[new Date(y,0,1).getTime(),new Date(y+1,0,1).getTime()];return[0,Infinity]}
function label(p){const[s,e]=bounds(p),a=new Date(s);if(p.range==='day')return new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'long',year:'numeric'}).format(a);if(p.range==='week'){const b=new Date(e-1);return `${new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'short'}).format(a)} — ${new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'short',year:'numeric'}).format(b)}`};if(p.range==='month')return new Intl.DateTimeFormat('ru-RU',{month:'long',year:'numeric'}).format(a);if(p.range==='year')return `${a.getFullYear()} год`;return 'Всё время'}
const money=v=>new Intl.NumberFormat('ru-RU',{maximumFractionDigits:2}).format(Math.abs(Number(v)||0))+' €';
const signed=v=>(v>0?'+':v<0?'−':'')+money(v);
const esc=v=>String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function install(){const d=deepest(shell.contentWindow?.document);if(!d||d.documentElement.dataset.fpOpsPeriodV9==='1')return;d.documentElement.dataset.fpOpsPeriodV9='1';const w=d.defaultView,$=id=>d.getElementById(id),screen=$('operationsScreen');if(!screen)return;
const css=d.createElement('style');css.textContent=`#fpOpsPeriodV9{padding:13px 14px 4px}#fpOpsPeriodV9 h2{font-size:15px;margin:0}.fp-ops-range{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:3px;margin-top:10px;border:1px solid var(--line);border-radius:15px;background:var(--card2)}.fp-ops-range button{height:34px;border:0;border-radius:12px;background:transparent;color:var(--muted);font-size:12px;font-weight:800;padding:0 2px}.fp-ops-range button.active{background:var(--card);color:var(--green);box-shadow:0 2px 8px rgba(35,54,86,.1)}.fp-ops-nav{display:grid;grid-template-columns:42px 1fr 42px;gap:6px;align-items:center;margin:7px 0 10px}.fp-ops-nav button{height:38px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--ink);font-weight:900}.fp-ops-nav button:disabled{opacity:.3}.fp-ops-label{font-size:13px!important;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px!important}`;d.head.appendChild(css);
$('fpOpsPeriod')?.remove();const filters=screen.querySelector('.filters');filters?.insertAdjacentHTML('beforebegin',`<section id="fpOpsPeriodV9" class="card"><h2>Период операций</h2><div class="fp-ops-range">${[['day','День'],['week','Неделя'],['month','Месяц'],['year','Год'],['all','Всё время']].map(([r,t])=>`<button data-ops-range="${r}">${t}</button>`).join('')}</div><div class="fp-ops-nav"><button data-ops-prev>‹</button><button class="fp-ops-label" data-ops-label></button><button data-ops-next>›</button></div></section>`);
function read(){try{return JSON.parse(w.localStorage.getItem(APP_KEY)||'{}')}catch{return {transactions:[]}}}
function render(){const[s,e]=bounds(ops),filter=screen.querySelector('[data-op-filter].active')?.dataset.opFilter||'all',list=[...(read().transactions||[])].filter(t=>Number(t.date)>=s&&Number(t.date)<e).filter(t=>filter==='all'||t.kind===filter).sort((a,b)=>b.date-a.date);const html=t=>`<div class="operation" data-operation-id="${esc(t.id)}"><div class="op-icon ${t.kind}">${t.kind==='income'?'＋':'−'}</div><div><div class="op-title">${esc(t.category)}${t.receipt?'<span class="receipt-dot"></span>':''}</div><div class="op-meta">${new Intl.DateTimeFormat('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}).format(new Date(t.date))}${t.note?' · '+esc(t.note):''}</div></div><div class="op-value ${t.kind==='income'?'positive':'negative'}">${t.kind==='income'?'+':'−'}${money(t.amount)}</div></div>`;$('operationsList').innerHTML=list.length?list.map(html).join(''):'<div class="empty">Подходящих операций нет.</div>';const total=list.reduce((a,t)=>(a[t.kind]+=Number(t.amount)||0,a),{income:0,expense:0});$('opsIncome').textContent=money(total.income);$('opsExpense').textContent=money(total.expense);$('opsDiff').textContent=signed(total.income-total.expense);d.querySelectorAll('[data-ops-range]').forEach(b=>b.classList.toggle('active',b.dataset.opsRange===ops.range));$('[data-ops-label]').textContent=label(ops);$('[data-ops-prev]').disabled=ops.range==='all';$('[data-ops-next]').disabled=ops.range==='all'||bounds(ops)[0]>=bounds({range:ops.range,anchor:Date.now()})[0]}
function resetFromHome(){ops={...homePeriod(w)};setTimeout(render,0)}
function shift(n){const a=new Date(ops.anchor);if(ops.range==='day')a.setDate(a.getDate()+n);if(ops.range==='week')a.setDate(a.getDate()+7*n);if(ops.range==='month')a.setMonth(a.getMonth()+n);if(ops.range==='year')a.setFullYear(a.getFullYear()+n);ops.anchor=Math.min(a.getTime(),Date.now());render()}
d.addEventListener('click',e=>{const t=e.target;if(t.closest?.('[data-screen="operations"]'))resetFromHome();if(t.closest?.('[data-fp-open-ops]')){ops={...homePeriod(w)};setTimeout(render,0)}const r=t.closest?.('[data-ops-range]');if(r){e.preventDefault();ops.range=r.dataset.opsRange;ops.anchor=Date.now();render();return}if(t.closest?.('[data-ops-prev]')){e.preventDefault();shift(-1);return}if(t.closest?.('[data-ops-next]')){e.preventDefault();shift(1);return}if(t.closest?.('[data-ops-label]')){e.preventDefault();const picker=$('fpPicker'),input=$('fpPickInput');if(!picker||!input)return;const a=new Date(ops.anchor),pad=n=>String(n).padStart(2,'0');if(ops.range==='all')return;if(ops.range==='month'){input.type='month';input.value=`${a.getFullYear()}-${pad(a.getMonth()+1)}`}else if(ops.range==='year'){input.type='number';input.value=a.getFullYear()}else{input.type='date';input.value=`${a.getFullYear()}-${pad(a.getMonth()+1)}-${pad(a.getDate())}`};picker.classList.add('open');picker.setAttribute('aria-hidden','false');pickerOpen=true;return}if(pickerOpen&&t.closest?.('[data-fp-apply]')){setTimeout(()=>{const input=$('fpPickInput');let a;if(ops.range==='month'){const[y,m]=input.value.split('-').map(Number);a=new Date(y,m-1,1)}else if(ops.range==='year')a=new Date(Number(input.value),0,1);else a=new Date(input.value+'T12:00:00');if(Number.isFinite(a.getTime()))ops.anchor=Math.min(a.getTime(),Date.now());pickerOpen=false;render()},0)}if(t.closest?.('[data-op-filter]'))setTimeout(render,0)},true);
ops={...homePeriod(w)};render();}
function boot(){install();setTimeout(install,300);setTimeout(install,900)}shell.addEventListener('load',boot);shell.src='./main-v8-periodfix.html?opsperiod=9&t='+Date.now();setInterval(install,1200);
})();
</script></body></html>
