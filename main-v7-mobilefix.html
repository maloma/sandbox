<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="cache-control" content="no-store">
<title>FamilyPilot — iOS form fix</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5f7fb}
iframe{position:fixed;left:0;top:var(--vv-top,0px);display:block;width:100%;height:var(--vv-height,100dvh);border:0;background:#f5f7fb}
</style>
</head>
<body>
<iframe id="app" src="./main-v7.html?mobilefix=3" title="FamilyPilot"></iframe>
<script>
(()=>{
  const frame=document.getElementById('app');
  const updateOuterViewport=()=>{
    const vv=window.visualViewport;
    const height=Math.round(vv?vv.height:window.innerHeight);
    const top=Math.round(vv?vv.offsetTop:0);
    document.documentElement.style.setProperty('--vv-height',height+'px');
    document.documentElement.style.setProperty('--vv-top',top+'px');
  };
  updateOuterViewport();
  visualViewport?.addEventListener('resize',updateOuterViewport);
  visualViewport?.addEventListener('scroll',updateOuterViewport);
  window.addEventListener('resize',updateOuterViewport);

  frame.addEventListener('load',()=>{
    const w=frame.contentWindow,d=w.document;
    if(!d||d.getElementById('fp-mobile-modal-fix3'))return;

    const style=d.createElement('style');
    style.id='fp-mobile-modal-fix3';
    style.textContent=`
      html.fp-modal-open,body.fp-modal-open{overflow:hidden!important;overscroll-behavior:none!important}
      body.fp-modal-open{position:fixed!important;inset:0!important;width:100%!important;height:100%!important}
      #entryModal.modal{position:fixed!important;inset:0!important;width:100%!important;height:100%!important;display:none!important;align-items:stretch!important;overflow:hidden!important;overscroll-behavior:none!important;background:rgba(4,18,28,.5)!important}
      #entryModal.modal.open{display:flex!important}
      #entryModal .sheet{position:relative!important;display:block!important;width:min(100%,480px)!important;height:100%!important;max-height:none!important;margin:0 auto!important;border-radius:0!important;overflow-y:auto!important;overscroll-behavior:contain!important;-webkit-overflow-scrolling:touch!important;touch-action:pan-y!important;padding:18px 18px 112px!important;scroll-padding-top:90px!important;scroll-padding-bottom:150px!important;background:var(--bg)!important}
      #entryModal .sheet-head{position:sticky!important;top:-18px!important;z-index:10!important;background:var(--bg)!important;padding:18px 0 12px!important;margin-top:-18px!important}
      #entryModal .sheet-actions{position:fixed!important;left:50%!important;transform:translateX(-50%)!important;bottom:0!important;z-index:30!important;width:min(100%,480px)!important;display:grid!important;grid-template-columns:1fr 1.5fr!important;gap:9px!important;margin:0!important;padding:10px 18px calc(10px + env(safe-area-inset-bottom))!important;background:linear-gradient(to top,var(--bg) 80%,color-mix(in srgb,var(--bg) 92%,transparent))!important;border-top:1px solid var(--line)!important}
      #entryModal textarea{min-height:120px!important}
      #entryModal .field:last-of-type{margin-bottom:18px!important}
    `;
    d.head.appendChild(style);

    const modal=d.getElementById('entryModal');
    if(!modal)return;
    let locked=false,scrollY=0;
    const lock=()=>{
      if(locked)return;
      locked=true;
      scrollY=w.scrollY||0;
      d.documentElement.classList.add('fp-modal-open');
      d.body.classList.add('fp-modal-open');
      d.body.style.top=`-${scrollY}px`;
      modal.querySelector('.sheet')?.scrollTo(0,0);
    };
    const unlock=()=>{
      if(!locked)return;
      locked=false;
      d.documentElement.classList.remove('fp-modal-open');
      d.body.classList.remove('fp-modal-open');
      d.body.style.top='';
      w.scrollTo(0,scrollY);
    };
    new MutationObserver(()=>modal.classList.contains('open')?lock():unlock()).observe(modal,{attributes:true,attributeFilter:['class']});

    d.addEventListener('focusin',e=>{
      if(!modal.classList.contains('open')||!e.target.matches('input,textarea,select'))return;
      setTimeout(()=>{
        const sheet=modal.querySelector('.sheet');
        if(!sheet)return;
        const rect=e.target.getBoundingClientRect();
        const safeBottom=Math.max(110,Math.round(w.innerHeight*.22));
        if(rect.bottom>w.innerHeight-safeBottom){sheet.scrollBy({top:rect.bottom-(w.innerHeight-safeBottom)+24,behavior:'smooth'})}
        else if(rect.top<80){sheet.scrollBy({top:rect.top-100,behavior:'smooth'})}
      },250);
    });
  });
})();
</script>
</body>
</html>
