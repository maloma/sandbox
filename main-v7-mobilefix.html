<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta http-equiv="cache-control" content="no-store"><title>FamilyPilot</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5f7fb}iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#f5f7fb}</style></head>
<body><iframe id="app" title="FamilyPilot"></iframe><script>
(()=>{

 `;d.head.appendChild(css);
 const modal=$('entryModal');let sy=0;

 const amount=$('amountInput'),err=$('entryError'),save=$('saveOperationBtn');if(amount&&save&&err){amount.maxLength=9;amount.inputMode='decimal';const h=d.createElement('div');h.className='fp-hint';h.textContent='Максимум одной операции: 999 999,99 €';amount.after(h);const norm=v=>{let t=String(v||'').replace(/\s/g,'').replace('.',',').replace(/[^0-9,]/g,'');const c=t.indexOf(',');if(c>=0)t=t.slice(0,c+1)+t.slice(c+1).replace(/,/g,'');let [a='',b='']=t.split(',');a=a.slice(0,6);b=b.slice(0,2);return c<0?a:a+','+b};const valid=()=>{const v=amount.value.trim(),ok=/^(?:0|[1-9]\d{0,5})(?:[.,]\d{1,2})?$/.test(v)&&Number(v.replace(',','.'))>0&&Number(v.replace(',','.'))<=999999.99;amount.classList.toggle('fp-invalid',!ok&&v.length>0);return ok};amount.addEventListener('input',()=>{amount.value=norm(amount.value);valid()});save.addEventListener('click',e=>{if(valid())return;e.preventDefault();e.stopImmediatePropagation();err.textContent='Сумма должна быть от 0,01 € до 999 999,99 €.';amount.focus()},true)}
 const read=()=>{try{return JSON.parse(w.localStorage.getItem(APP)||'{}')}catch{return {transactions:[]}}};let p;try{p=JSON.parse(w.localStorage.getItem(PKEY)||'{}')}catch{};p={range:['day','week','month','year','all'].includes(p?.range)?p.range:'month',anchor:Number(p?.anchor)||Date.now()};const saveP=()=>w.localStorage.setItem(PKEY,JSON.stringify(p));
 const bounds=(r,a)=>{const x=new Date(a),y=x.getFullYear(),m=x.getMonth(),dt=x.getDate();if(r==='day')return [new Date(y,m,dt).getTime(),new Date(y,m,dt+1).getTime()];if(r==='week'){const q=(x.getDay()+6)%7,s=new Date(y,m,dt-q);return [s.getTime(),new Date(s.getFullYear(),s.getMonth(),s.getDate()+7).getTime()]};if(r==='month')return [new Date(y,m,1).getTime(),new Date(y,m+1,1).getTime()];if(r==='year')return [new Date(y,0,1).getTime(),new Date(y+1,0,1).getTime()];return [0,Infinity]};
 const label=()=>{const [s,e]=bounds(p.range,p.anchor),a=new Date(s);if(p.range==='day')return new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'long',year:'numeric'}).format(a);if(p.range==='week'){const b=new Date(e-1);return `${new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'short'}).format(a)} — ${new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'short',year:'numeric'}).format(b)}`};if(p.range==='month')return new Intl.DateTimeFormat('ru-RU',{month:'long',year:'numeric'}).format(a);if(p.range==='year')return a.getFullYear()+' год';return 'Всё время'};
 const tx=()=>{const [s,e]=bounds(p.range,p.anchor);return (read().transactions||[]).filter(t=>t.date>=s&&t.date<e)};const totals=l=>l.reduce((a,t)=>(a[t.kind]=(a[t.kind]||0)+Number(t.amount||0),a),{income:0,expense:0});const money=v=>new Intl.NumberFormat('ru-RU',{maximumFractionDigits:2}).format(Math.abs(v))+' €';const signed=v=>(v>0?'+':v<0?'−':'')+money(v);
 const render=()=>{const t=totals(tx()),diff=t.income-t.expense,total=t.income+t.expense,pct=total?t.income/total*100:50;[['expenseTop',t.expense],['expenseMetric',t.expense],['incomeTop',t.income],['incomeMetric',t.income],['analyticsIncome',t.income],['analyticsExpense',t.expense]].forEach(([id,v])=>{if($(id))$(id).textContent=money(v)});['diffMetric','analyticsDiff'].forEach(id=>{if($(id))$(id).textContent=signed(diff)});if($('balanceMarker'))$('balanceMarker').style.left=pct+'%';if($('resultLabel')){$('resultLabel').style.left=pct+'%';$('resultLabel').textContent=signed(diff)};d.querySelectorAll('[data-range]').forEach(b=>b.classList.toggle('active',b.dataset.range===p.range));d.querySelectorAll('[data-fp-label]').forEach(b=>b.textContent=label());d.querySelectorAll('[data-fp-next]').forEach(b=>b.disabled=p.range==='all'||bounds(p.range,p.anchor)[0]>=bounds(p.range,Date.now())[0]);d.querySelectorAll('[data-fp-prev]').forEach(b=>b.disabled=p.range==='all')};
 const selector=$('periodSelector'),balance=d.querySelector('.balance'),head=balance?.querySelector('.balance-head');if(selector&&balance&&head){selector.classList.remove('card');balance.insertBefore(selector,head.nextSibling)}const nav='<div class="fp-period-nav"><button data-fp-prev>‹</button><button class="fp-period-label" data-fp-label></button><button data-fp-next>›</button></div>';selector?.insertAdjacentHTML('afterend',nav);
 ['operationsScreen','analyticsScreen'].forEach(id=>{const title=$(id)?.querySelector('.page-title');if(title){title.classList.add('fp-back-title');title.insertAdjacentHTML('afterbegin','<button class="fp-back" data-fp-back>‹</button>')}});$('analyticsScreen')?.querySelector('.card')?.insertAdjacentHTML('beforebegin',`<section class="card section"><h2 style="font-size:15px;margin:0">Период</h2>${nav}</section>`);
 d.body.insertAdjacentHTML('beforeend','<div id="fpPicker" class="fp-overlay"><div class="fp-panel"><div class="fp-panel-head"><h2>Выберите период</h2><button class="close" data-fp-close>Закрыть</button></div><input id="fpPickInput" class="fp-input"><div class="fp-actions"><button data-fp-current>Текущий</button><button class="fp-primary" data-fp-apply>Применить</button></div></div></div><div id="fpInfo" class="fp-overlay"><div class="fp-panel"><div class="fp-panel-head"><h2>Что такое капитал</h2><button class="close" data-fp-close>Закрыть</button></div><p>Капитал — текущая сумма денег семьи с учётом всех сохранённых приходов и расходов. Он считается за всё время.</p></div></div>');
 const openPicker=()=>{if(p.range==='all')return;const i=$('fpPickInput'),a=new Date(p.anchor),pad=n=>String(n).padStart(2,'0');if(p.range==='month'){i.type='month';i.value=`${a.getFullYear()}-${pad(a.getMonth()+1)}`}else if(p.range==='year'){i.type='number';i.value=a.getFullYear();i.max=new Date().getFullYear()}else{i.type='date';i.value=`${a.getFullYear()}-${pad(a.getMonth()+1)}-${pad(a.getDate())}`};$('fpPicker').classList.add('open')};
 const shift=n=>{const a=new Date(p.anchor);if(p.range==='day')a.setDate(a.getDate()+n);if(p.range==='week')a.setDate(a.getDate()+7*n);if(p.range==='month')a.setMonth(a.getMonth()+n);if(p.range==='year')a.setFullYear(a.getFullYear()+n);p.anchor=Math.min(a.getTime(),Date.now());saveP();render()};
 d.addEventListener('click',e=>{const r=e.target.closest('[data-range]');if(r){e.preventDefault();e.stopImmediatePropagation();p.range=r.dataset.range;p.anchor=Date.now();saveP();render();openPicker();return}if(e.target.closest('[data-fp-prev]'))return shift(-1);if(e.target.closest('[data-fp-next]'))return shift(1);if(e.target.closest('[data-fp-label]'))return openPicker();if(e.target.closest('[data-fp-close]'))return e.target.closest('.fp-overlay')?.classList.remove('open');if(e.target.closest('[data-fp-current]')){p.anchor=Date.now();saveP();$('fpPicker').classList.remove('open');return render()}if(e.target.closest('[data-fp-apply]')){const i=$('fpPickInput');let a;if(p.range==='month'){const [y,m]=i.value.split('-').map(Number);a=new Date(y,m-1,1)}else if(p.range==='year')a=new Date(Number(i.value),0,1);else a=new Date(i.value+'T12:00:00');if(Number.isFinite(a.getTime())){p.anchor=Math.min(a.getTime(),Date.now());saveP();$('fpPicker').classList.remove('open');render()}return}if(e.target.closest('.capital .info'))return $('fpInfo').classList.add('open');if(e.target.closest('[data-fp-back]'))return d.querySelector('[data-screen="home"]')?.click()},true);
 let sx=0,syy=0,edge=false;d.addEventListener('touchstart',e=>{const t=e.touches[0];sx=t.clientX;syy=t.clientY;edge=sx<24},{passive:true});d.addEventListener('touchend',e=>{const t=e.changedTouches[0];if(edge&&t.clientX-sx>70&&Math.abs(t.clientY-syy)<55)d.querySelector('[data-screen="home"]')?.click();edge=false},{passive:true});
 render();
}
