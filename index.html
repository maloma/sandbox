<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>FamilyPilot Standard Home</title><style>html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f5f7fb;color:#10213b;touch-action:manipulation}.loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.box{max-width:440px;background:#fff;border:1px solid #e6ebf2;border-radius:22px;padding:24px;box-shadow:0 12px 36px rgba(35,54,86,.10)}.spinner{width:40px;height:40px;margin:0 auto 15px;border:4px solid #e5efe9;border-top-color:#16a45a;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}button{font:inherit;border:0;border-radius:14px;padding:12px 16px;background:#16a45a;color:#fff;font-weight:800}</style></head><body><div class="loading"><div class="box"><div class="spinner"></div><strong>Открываем FamilyPilot Standard</strong><p id="status">Загружаем обновлённые маршруты…</p><button id="retry" hidden>Повторить</button></div></div><script>const source='https://raw.githubusercontent.com/maloma/sandbox/7ef185c3f6db7038e317568c1a8d4d6456805122/main-v8-fixed.html';async function load(){const s=document.getElementById('status'),b=document.getElementById('retry');b.hidden=true;try{const r=await fetch(source,{cache:'no-store'});if(!r.ok)throw new Error('source');const html=await r.text();if(!html.includes('Runtime: main-v8-fixed')||!html.includes('ASI_BOUNDARIES'))throw new Error('contract');document.open();document.write(html);document.close()}catch(e){s.textContent='Не удалось загрузить главную. Нажмите «Повторить».';b.hidden=false}}document.getElementById('retry').onclick=load;load();</script></body></html>
