<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<title>FamilyPilot — загрузка M2</title>
<style>
html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f4f7f6;color:#17332d}.loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.box{max-width:420px;background:#fff;border:1px solid #d8e4e1;border-radius:20px;padding:22px}.spinner{width:38px;height:38px;margin:0 auto 14px;border:4px solid #dfeeea;border-top-color:#0f766e;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}button{font:inherit;border:0;border-radius:13px;padding:12px 16px;background:#0f766e;color:#fff;font-weight:750}
</style>
</head>
<body>
<div class="loading"><div class="box"><div class="spinner"></div><strong>Открываем модуль 2</strong><p id="status">Загружаем долги и стартовые остатки…</p><button id="retry" hidden>Повторить</button></div></div>
<script>
const source='https://raw.githubusercontent.com/maloma/sandbox/main/m2.html?rev=2d0caffe';
async function load(){
 const status=document.getElementById('status'),retry=document.getElementById('retry');
 retry.hidden=true;status.textContent='Загружаем долги и стартовые остатки…';
 try{
  const response=await fetch(source,{cache:'no-store'});
  if(!response.ok)throw new Error('HTTP '+response.status);
  const html=await response.text();
  if(!html.includes('FamilyPilot')||!html.includes('Модуль 2'))throw new Error('Некорректный файл');
  document.open();document.write(html);document.close();
 }catch(error){
  status.textContent='Не удалось загрузить M2. Проверьте соединение и повторите.';
  retry.hidden=false;
 }
}
document.getElementById('retry').onclick=load;
load();
</script>
</body>
</html>
