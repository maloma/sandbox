<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="cache-control" content="no-store"><meta name="theme-color" content="#071824"><title>FamilyPilot</title><style>html,body{margin:0;min-height:100%;background:#071824;color:#f4f8fb;font-family:system-ui,sans-serif}#boot{min-height:100dvh;display:grid;place-items:center;font-size:14px;opacity:.72}</style></head><body><div id="boot">Загрузка FamilyPilot…</div><script>
(async()=>{'use strict';
try{
  let source=await fetch('./src/familypilot.html?v=wallet-warning-visible-double-pulse-v1',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text()});
  const marker='wallet-warning-visible-double-pulse-v1';
  if(!source.includes(marker)){
    const replaceOnce=(from,to,label)=>{const count=source.split(from).length-1;if(count!==1)throw new Error(label+': expected 1, got '+count);source=source.replace(from,to)};
    replaceOnce('<meta name="familypilot-correction" content="contextual-wallet-before-save-v1">','<meta name="familypilot-correction" content="contextual-wallet-before-save-v1">\n<meta name="familypilot-correction" content="analytics-period-entry-state-wallet-pulse-v1">\n<meta name="familypilot-correction" content="wallet-warning-visible-double-pulse-v1">','correction markers');
    replaceOnce('state.operations.filter(o=>o.categoryId===c.id).length','categoryFilterCount(c.id)','period category count');
    replaceOnce('function renderCategoryChecks(){',"function categoryFilterCount(id){const list=categoryFilterContext==='analytics'?inPeriod(activeOps(),periods.analytics):inPeriod(activeOps(),periods.operations);return list.filter(o=>o.categoryId===id).length}\nfunction renderCategoryChecks(){",'period count helper');
    replaceOnce("$('categoryError').textContent='';$('newCategoryBox').style.display='none';open('entryModal')","$('categoryError').textContent='';$('newCategoryInput').value='';$('newCategoryBox').style.display='none';open('entryModal')",'new category draft reset');
    replaceOnce("function renderEntryWalletWarning(w){const primary=defaultWallet(),warning=$('entryWalletWarning'),unusual=!!w&&!!primary&&w.id!==primary.id;warning.hidden=!unusual;if(unusual)$('entryWalletWarningName').textContent=w.name}","function renderEntryWalletWarning(w){const primary=defaultWallet(),warning=$('entryWalletWarning'),unusual=!!w&&!!primary&&w.id!==primary.id;warning._attentionObserver?.disconnect();warning._attentionObserver=null;warning.hidden=!unusual;warning.classList.remove('wallet-attention');if(unusual){$('entryWalletWarningName').textContent=w.name;requestAnimationFrame(()=>{const root=warning.closest('.entry-sheet'),observer=new IntersectionObserver(entries=>{if(!entries.some(e=>e.isIntersecting&&e.intersectionRatio>=.6))return;observer.disconnect();warning._attentionObserver=null;warning.classList.remove('wallet-attention');void warning.offsetWidth;warning.classList.add('wallet-attention');setTimeout(()=>warning.classList.remove('wallet-attention'),1500)},{root,threshold:[.6]});warning._attentionObserver=observer;observer.observe(warning)})}}",'visible wallet warning attention');
    const css='\n/* wallet-warning-visible-double-pulse-v1 */\n@keyframes walletWarningAttention{0%,100%{border-color:color-mix(in srgb,var(--blue) 55%,var(--line));box-shadow:none}38%{border-color:var(--red);box-shadow:0 0 0 3px color-mix(in srgb,var(--red) 18%,transparent)}}\n.entry-wallet-warning.wallet-attention{animation:walletWarningAttention .55s ease-out 2}\n@media(prefers-reduced-motion:reduce){.entry-wallet-warning.wallet-attention{animation:none;border-color:color-mix(in srgb,var(--red) 62%,var(--line))}}\n';
    replaceOnce('</style>',css+'</style>','wallet warning CSS');
  }
  document.open();document.write(source);document.close();
}catch(error){console.error(error);document.getElementById('boot').textContent='Не удалось загрузить FamilyPilot. Обновите страницу.'}
})();
</script></body></html>
