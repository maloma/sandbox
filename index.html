<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<title>FamilyPilot — загрузка M2</title>
<style>html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f4f7f6;color:#17332d}.loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.box{max-width:420px;background:#fff;border:1px solid #d8e4e1;border-radius:20px;padding:22px}.spinner{width:38px;height:38px;margin:0 auto 14px;border:4px solid #dfeeea;border-top-color:#0f766e;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}button{font:inherit;border:0;border-radius:13px;padding:12px 16px;background:#0f766e;color:#fff;font-weight:750}</style>
</head>
<body>
<div class="loading"><div class="box"><div class="spinner"></div><strong>Открываем модуль 2</strong><p id="status">Загружаем исправленную форму долгов…</p><button id="retry" hidden>Повторить</button></div></div>
<script>
const source='https://raw.githubusercontent.com/maloma/sandbox/main/m2.html?rev=e6421db0';
const uiFix=`<script>(function(){function a(){return document.querySelector('.action.active')?.dataset.action||'borrow'}function s(){const i=document.getElementById('extra');if(!i)return;const f=i.closest('label');if(!f)return;const r=['repay','receive'].includes(a());f.classList.toggle('hidden',!r);if(!r)i.value='';const l=f.querySelector('.label-row > span');if(l)l.textContent='Дополнительно сверх основного долга';i.placeholder='Например, проценты или подарок';let h=f.querySelector('[data-extra-helper]');if(!h){h=document.createElement('span');h.className='tiny';h.dataset.extraHelper='true';f.appendChild(h)}h.textContent='Необязательно. Эта сумма не изменяет основной долг.'}function x(){s();const b=document.querySelector('[data-help="extra"]');if(b)b.onclick=()=>{document.getElementById('helpTitle').textContent='Дополнительно сверх основного долга';document.getElementById('helpText').textContent='Поле показывается только при возврате долга. Используйте его для процентов или подарка. Эта сумма сохраняется отдельно и не меняет основной остаток долга.';document.getElementById('helpModal').classList.add('open')};document.getElementById('actions')?.addEventListener('click',()=>setTimeout(s,0));document.getElementById('saveDebtAction')?.addEventListener('click',()=>{if(!['repay','receive'].includes(a())){const i=document.getElementById('extra');if(i)i.value=''}},true)}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',x,{once:true});else x()})();<\/script>`;
async function load(){const status=document.getElementById('status'),retry=document.getElementById('retry');retry.hidden=true;status.textContent='Загружаем исправленную форму долгов…';try{const response=await fetch(source,{cache:'no-store'});if(!response.ok)throw new Error('HTTP '+response.status);const html=await response.text();if(!html.includes('FamilyPilot')||!html.includes('Сумма больше остатка долга'))throw new Error('Некорректный файл');const corrected=html.replace('</body>',uiFix+'</body>');document.open();document.write(corrected);document.close()}catch(error){status.textContent='Не удалось загрузить M2. Нажмите «Повторить». ';retry.hidden=false}}
document.getElementById('retry').onclick=load;load();
</script>
</body>
</html>
