<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f766e"><title>FamilyPilot M4</title><style>html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f4f7f6;color:#17332d}.loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.box{max-width:440px;background:#fff;border:1px solid #d8e4e1;border-radius:20px;padding:22px}.spinner{width:38px;height:38px;margin:0 auto 14px;border:4px solid #dfeeea;border-top-color:#0f766e;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}button{font:inherit;border:0;border-radius:13px;padding:12px 16px;background:#0f766e;color:#fff;font-weight:750}</style></head><body><div class="loading"><div class="box"><div class="spinner"></div><strong>Открываем модуль 4</strong><p id="status">Загружаем понятные объяснения целей накоплений…</p><button id="retry" hidden>Повторить</button></div></div><script>const source='https://raw.githubusercontent.com/maloma/sandbox/c88b96d33b6e00c14f4b9c6467a9a7368eb43401/m4-v9.html';async function load(){const s=document.getElementById('status'),b=document.getElementById('retry');b.hidden=true;try{const r=await fetch(source,{cache:'no-store'});if(!r.ok)throw new Error();const html=await r.text();if(!html.includes('Build: m4-v9')||!html.includes('Goal definition: EXPLICIT'))throw new Error();document.open();document.write(html);document.close()}catch(e){s.textContent='Не удалось загрузить M4. Нажмите «Повторить».';b.hidden=false}}document.getElementById('retry').onclick=load;load();</script></body></html>
