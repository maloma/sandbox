name: Apply corrected FamilyPilot runtime patch v3

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-runtime-patch-v3-fixed.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - name: Correct replacement engine and apply patch
        run: |
          python <<'PY'
          from pathlib import Path
          p=Path('runtime-patch-v3.py')
          s=p.read_text(encoding='utf-8')
          old='s2,n=re.subn(pattern,new,s,count=1,flags=re.M)'
          new='s2,n=re.subn(pattern,lambda _m:new,s,count=1,flags=re.M)'
          if old not in s: raise SystemExit('replacement engine marker missing')
          p.write_text(s.replace(old,new,1),encoding='utf-8')
          PY
          python runtime-patch-v3.py
      - name: Validate required UX and JavaScript
        run: |
          python <<'PY'
          from pathlib import Path
          import re
          s=Path('runtime-source.html').read_text(encoding='utf-8')
          required=['id="filterToggleBtn"','id="resetAllFilters"','id="analyticsSearch"','id="analyticsSortBtn"','id="quickCategories"','id="categoryMergeModal"','function mergeCategory','function analyticsFilteredOperations','touch-action:manipulation','Долговая позиция отдельно']
          for marker in required:
            if marker not in s: raise SystemExit(f'missing {marker}')
          scripts=re.findall(r'<script>(.*?)</script>',s,re.S)
          Path('/tmp/runtime.js').write_text(scripts[-1],encoding='utf-8')
          PY
          node --check /tmp/runtime.js
      - name: Build deterministic standalone runtime
        run: |
          python <<'PY'
          from pathlib import Path
          import gzip,base64,hashlib
          html=Path('runtime-source.html').read_bytes()
          payload=base64.b64encode(gzip.compress(html,compresslevel=9,mtime=0)).decode('ascii')
          wrapper=f'''<!doctype html>
          <html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="cache-control" content="no-store"><meta name="theme-color" content="#071824"><title>FamilyPilot</title><style>html,body{{margin:0;min-height:100%;background:#071824}}</style></head><body><script>
          (async()=>{{const b="{payload}",a=Uint8Array.from(atob(b),c=>c.charCodeAt(0)),s=new Blob([a]).stream().pipeThrough(new DecompressionStream('gzip')),h=await new Response(s).text();document.open();document.write(h);document.close()}})().catch(e=>{{document.body.textContent='Ошибка загрузки FamilyPilot';console.error(e)}});
          </script></body></html>'''
          wrapper='\n'.join(line.strip() for line in wrapper.splitlines())
          Path('index.html').write_text(wrapper,encoding='utf-8')
          Path('verification/runtime-v3-sha.txt').parent.mkdir(exist_ok=True)
          Path('verification/runtime-v3-sha.txt').write_text(f'SOURCE-SHA256: {hashlib.sha256(html).hexdigest()}\nINDEX-SHA256: {hashlib.sha256(wrapper.encode()).hexdigest()}\n',encoding='utf-8')
          PY
      - name: Commit runtime and clean staging
        run: |
          rm -f runtime-source.html runtime-patch-v3.py verification/runtime-patch-v3-diagnostic.txt .github/workflows/apply-runtime-patch-v3.yml .github/workflows/apply-runtime-patch-v3-fixed.yml .github/workflows/diagnose-runtime-patch-v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html verification/runtime-v3-sha.txt runtime-source.html runtime-patch-v3.py verification/runtime-patch-v3-diagnostic.txt .github/workflows/apply-runtime-patch-v3.yml .github/workflows/apply-runtime-patch-v3-fixed.yml .github/workflows/diagnose-runtime-patch-v3.yml
          git commit -m "Expand FamilyPilot filters analytics and category lifecycle"
          git push origin HEAD:main
