name: Temporary M3-03 Action Order Test API Fix

on:
  pull_request:
    branches: [main]
    paths:
      - '_delivery/m3v3-action-order'

permissions:
  contents: write

concurrency:
  group: m3v3-action-order-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch-action-order:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          show-progress: false
      - name: Patch and verify test API label projection
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path=Path('familypilot-payment-attention-ui.js')
          text=path.read_text(encoding='utf-8')
          old="actionOrder:()=>[...document.querySelectorAll('#actionDock .actions .action')].sort((a,b)=>Number(getComputedStyle(a).order)-Number(getComputedStyle(b).order)).map(node=>node.textContent.trim().split(/\\s+/)[0]),"
          new="actionOrder:()=>[...document.querySelectorAll('#actionDock .actions .action')].sort((a,b)=>Number(getComputedStyle(a).order)-Number(getComputedStyle(b).order)).map(node=>node.querySelector('strong')?.textContent.trim()||''),"
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one actionOrder projection')
          path.write_text(text.replace(old,new),encoding='utf-8')
          PY
          rm _delivery/m3v3-action-order
          node --check familypilot-payment-attention-ui.js
          grep -Fq "node.querySelector('strong')?.textContent.trim()" familypilot-payment-attention-ui.js
      - name: Commit patch to feature branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add familypilot-payment-attention-ui.js _delivery/m3v3-action-order
          git commit -m 'Correct action-order test labels'
          git push origin "HEAD:${{ github.head_ref }}"
