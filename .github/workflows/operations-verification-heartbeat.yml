name: Operations verification heartbeat

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/operations-verification-heartbeat.yml

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Record heartbeat
        run: |
          mkdir -p verification
          echo "OPERATIONS-VERIFICATION-HEARTBEAT: OK" > verification/operations-verification-heartbeat.txt
          echo "SOURCE-COMMIT: ${GITHUB_SHA}" >> verification/operations-verification-heartbeat.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add verification/operations-verification-heartbeat.txt
          git commit -m "Record Operations verification heartbeat [skip ci]"
          git push origin HEAD:main
