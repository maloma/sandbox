name: Diagnose synchronous modal scroll lock build

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/diagnose-synchronous-modal-scroll-lock-build.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Diagnose exact patch markers
        run: |
          mkdir -p verification
          python <<'PY' > verification/synchronous-modal-scroll-lock-build-diagnostic.txt 2>&1
          from pathlib import Path
          import re,base64,gzip,traceback
          try:
              wrapper=Path('index.html').read_text(encoding='utf-8')
              m=re.search(r'const b="([A-Za-z0-9+/=]+)"',wrapper)
              print('PAYLOAD:',bool(m))
              if not m: raise RuntimeError('runtime payload not found')
              s=gzip.decompress(base64.b64decode(m.group(1))).decode('utf-8')
              old_css="html.modal-open,body.modal-open{overflow:hidden;overscroll-behavior:none}body.modal-open{position:fixed;width:100%}"
              old_functions="function syncBodyLock(){const locked=!!document.querySelector('.overlay.open,.modal.open');if(locked&&!document.body.classList.contains('modal-open')){bodyLockY=window.scrollY;document.documentElement.classList.add('modal-open');document.body.classList.add('modal-open');document.body.style.top=`-${bodyLockY}px`}else if(!locked&&document.body.classList.contains('modal-open')){document.documentElement.classList.remove('modal-open');document.body.classList.remove('modal-open');document.body.style.top='';window.scrollTo(0,bodyLockY)}}\nfunction open(id){$(id).classList.add('open');queueMicrotask(syncBodyLock)}\nfunction close(id){$(id).classList.remove('open');queueMicrotask(syncBodyLock)}"
              print('SOURCE-LENGTH:',len(s))
              print('OLD-CSS-COUNT:',s.count(old_css))
              print('OLD-FUNCTIONS-COUNT:',s.count(old_functions))
              print('BACKGROUND-LOCKED-COUNT:',s.count('backgroundScrollLocked'))
              print('SYNC-BACKGROUND-COUNT:',s.count('syncBackgroundScrollLock'))
              print('FOREGROUND-OBSERVER-COUNT:',s.count('foregroundLayerObserver'))
              p1=re.compile(r"let backgroundScrollLocked=false;.*?syncBackgroundScrollLock\(\);",re.S)
              matches=list(p1.finditer(s))
              print('DUPLICATE-BLOCK-REGEX-COUNT:',len(matches))
              if matches:
                  print('DUPLICATE-BLOCK-LENGTH:',matches[0].end()-matches[0].start())
                  print('DUPLICATE-BLOCK-START:',repr(s[matches[0].start():matches[0].start()+180]))
              for token in ['html.background-locked,body.background-locked','document.addEventListener(\'touchmove\'','function syncBodyLock()','function open(id)','function close(id)']:
                  print(token,':',s.count(token))
              print('DIAGNOSTIC: COMPLETE')
          except Exception:
              traceback.print_exc()
              raise
          PY
          cat verification/synchronous-modal-scroll-lock-build-diagnostic.txt
      - name: Record diagnostic
        if: always()
        run: |
          cp verification/synchronous-modal-scroll-lock-build-diagnostic.txt /tmp/diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/diagnostic.txt verification/synchronous-modal-scroll-lock-build-diagnostic.txt
          git add verification/synchronous-modal-scroll-lock-build-diagnostic.txt
          git diff --cached --quiet && exit 0
          git commit -m "Record synchronous modal scroll lock diagnostic [skip ci]"
          git push origin HEAD:main
