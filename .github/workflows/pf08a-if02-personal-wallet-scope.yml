name: PF-08A IF-02 Personal Wallet Scope (Completed Audit)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-completed-personal-wallet-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Recreate completed IF-02 artifacts
        run: node tools/pf08a-if02-finalize-runtime-artifacts.mjs
      - name: Require completed IF-02 artifacts to remain stable
        run: git diff --exit-code -- src/familypilot.html index.html familypilot-scope.js
      - name: Verify completed personal wallet scope
        run: node tools/pf08a-if02-verify-personal-wallet-scope.mjs
      - name: Run completed personal wallet browser audit
        run: node tools/pf08a-if02-browser-smoke.mjs
