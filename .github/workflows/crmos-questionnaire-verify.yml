name: Verify CRMOS lifecycle questionnaire

on:
  pull_request:
    paths:
      - "crmos-questionnaire/**"
      - ".github/workflows/crmos-questionnaire-*.yml"

permissions:
  contents: read

concurrency:
  group: crmos-questionnaire-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      - name: Run questionnaire contract tests
        run: node --test crmos-questionnaire/questionnaire.test.mjs
      - name: Parse runtime scripts
        run: |
          node --check crmos-questionnaire/seed-questionnaire.mjs
          node --check crmos-questionnaire/accept-answer.mjs
