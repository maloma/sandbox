name: Diagnose modal scroll lock coordinates

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/diagnose-global-modal-scroll-lock-coordinates.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: npm install --no-save playwright-core@1.53.2
      - name: Capture coordinates
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs=require('fs');const {chromium}=require('playwright-core');
          (async()=>{let b;const out=[];try{
            const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
            b=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});const c=await b.newContext({viewport:{width:390,height:844},isMobile:true,hasTouch:true});const p=await c.newPage();
            await p.goto('https://maloma.github.io/sandbox/?test=1&scroll-coordinate-diagnostic=1',{waitUntil:'domcontentloaded'});await p.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2);
            const snap=label=>p.evaluate(label=>{const app=document.querySelector('.app'),body=document.body;return{label,windowY:window.scrollY,docY:document.documentElement.scrollTop,bodyY:body.scrollTop,bodyTop:body.style.top,bodyPosition:getComputedStyle(body).position,bodyClasses:body.className,appY:app?.getBoundingClientRect().y,open:[...document.querySelectorAll('.overlay.open,.modal.open')].map(x=>x.id)}},label);
            await p.locator('[data-screen="operations"]').click();await p.locator('#filterToggleBtn').click();await p.evaluate(()=>{document.body.style.minHeight='2800px';window.scrollTo(0,360)});await p.waitForTimeout(100);out.push(await snap('CATEGORY-BEFORE'));
            await p.evaluate(()=>document.getElementById('categoryFilterBtn').click());await p.waitForFunction(()=>document.body.classList.contains('background-locked'));out.push(await snap('CATEGORY-LOCKED'));
            await p.mouse.move(385,430);await p.mouse.wheel(0,1000);await p.waitForTimeout(100);out.push(await snap('CATEGORY-AFTER-GESTURE'));
            await p.evaluate(()=>document.querySelector('[data-close="categoryFilterModal"]').click());await p.waitForFunction(()=>!document.body.classList.contains('background-locked'));await p.waitForTimeout(300);out.push(await snap('CATEGORY-CLOSED-300MS'));
            await p.locator('[data-screen="home"]').click();await p.evaluate(()=>{document.body.style.minHeight='2800px';window.scrollTo(0,300)});await p.waitForTimeout(100);out.push(await snap('ENTRY-BEFORE'));
            await p.evaluate(()=>document.querySelector('[data-open-entry="expense"]').click());await p.waitForFunction(()=>document.body.classList.contains('background-locked'));out.push(await snap('ENTRY-LOCKED'));
            await p.evaluate(()=>document.querySelector('[data-close="entryModal"]').click());await p.waitForFunction(()=>!document.body.classList.contains('background-locked'));await p.waitForTimeout(300);out.push(await snap('ENTRY-CLOSED-300MS'));
            await c.close();
          }catch(e){out.push({error:e.stack||e.message})}finally{if(b)await b.close();fs.writeFileSync('verification/global-modal-scroll-lock-coordinate-diagnostic.txt',out.map(x=>JSON.stringify(x)).join('\n')+'\n')}})();
          NODE
          cat verification/global-modal-scroll-lock-coordinate-diagnostic.txt
      - name: Record diagnostic
        if: always()
        run: |
          cp verification/global-modal-scroll-lock-coordinate-diagnostic.txt /tmp/diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/diagnostic.txt verification/global-modal-scroll-lock-coordinate-diagnostic.txt
          git add verification/global-modal-scroll-lock-coordinate-diagnostic.txt
          git commit -m "Record modal scroll lock coordinate diagnostic [skip ci]"
          git push origin HEAD:main
