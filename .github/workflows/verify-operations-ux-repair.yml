name: Verify Operations UX repair

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-operations-ux-repair.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v6
      - name: Wait for exact Pages runtime
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
        run: |
          expected=$(sha256sum index.html | awk '{print $1}')
          actual=""
          status=0
          for i in $(seq 1 72); do
            status=$(curl -L -sS -o /tmp/public-index.html -w '%{http_code}' "${PUBLIC_URL}?ux-repair=3c977d6d&attempt=$i&ts=$(date +%s)" || true)
            actual=$(sha256sum /tmp/public-index.html 2>/dev/null | awk '{print $1}')
            [ "$status" = "200" ] && [ "$actual" = "$expected" ] && break
            sleep 5
          done
          echo "EXPECTED=$expected" >> "$GITHUB_ENV"
          echo "ACTUAL=$actual" >> "$GITHUB_ENV"
          echo "HTTP_STATUS=$status" >> "$GITHUB_ENV"
      - name: Install browser driver
        run: npm install --no-save playwright-core@1.53.2
      - name: Run public browser scenarios
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs=require('fs');
          const {chromium}=require('playwright-core');
          const gate={
            'PUBLIC-URL':process.env.PUBLIC_URL,
            'HTTP-STATUS':process.env.HTTP_STATUS||'0',
            'PUBLIC-SHA256':process.env.ACTUAL||'',
            'EXPECTED-SHA256':process.env.EXPECTED||'',
            'AMOUNT-RANGE-FILTER':'FAILED',
            'OPERATIONS-SUMMARY-ORDER':'FAILED',
            'ANALYTICS-SUMMARY-ORDER':'FAILED',
            'ANALYTICS-GAP':'FAILED',
            'EMPTY-STATE-GAP':'FAILED',
            'PICKER-IP14-NO-OVERFLOW':'FAILED',
            'ENTRY-DATE-NO-OVERFLOW':'FAILED',
            'HISTORY-NOTE-ONLY':'FAILED',
            'HISTORY-TWO-FIELDS-ONE-BATCH':'FAILED',
            'DETAIL-THREE-ACTIONS':'FAILED',
            'TRASH-PURGE-LARGE-TEXT-FITS':'FAILED',
            'BACKGROUND-SCROLL-LOCKED':'FAILED',
            'CATEGORY-NAME-SCOPED-BY-TYPE':'FAILED',
            'CATEGORY-RENAME-SCOPED-BY-TYPE':'FAILED',
            'CATEGORY-ERROR-NEAR-FIELD':'FAILED',
            'CATEGORY-MANAGER-ADD':'FAILED',
            'CATEGORY-DELETE-CONFIRM':'FAILED',
            'PAGE-JAVASCRIPT-ERRORS':'FAILED',
            'VERIFIED-RUNTIME-COMMIT':'3c977d6db09454d014ffb39becb0aff5c2541ac2'
          };
          const ok=(k,v)=>gate[k]=v?'VERIFIED':'FAILED';
          const within=(box,w)=>box&&box.x>=-0.5&&box.x+box.width<=w+0.5;
          (async()=>{
            let browser; const errors=[];
            try{
              const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
              browser=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});
              const ctx=await browser.newContext({viewport:{width:390,height:844},isMobile:true,hasTouch:true});
              const page=await ctx.newPage(); page.on('pageerror',e=>errors.push(e.message));
              await page.goto(`${process.env.PUBLIC_URL}?test=1&ux=2`,{waitUntil:'domcontentloaded',timeout:60000});
              await page.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2,{timeout:30000});

              await page.locator('[data-screen="operations"]').click();
              const opsOrder=await page.locator('#operationsScreen>.summary span').allTextContents();
              ok('OPERATIONS-SUMMARY-ORDER',opsOrder.join('|')==='Расход|Разница|Приход');
              const amountResult=await page.evaluate(()=>{
                const a=window.__FP_TEST__;
                a.createOperation({id:'range-10',kind:'expense',amount:10,categoryId:'cat-exp-food'});
                a.createOperation({id:'range-50',kind:'expense',amount:50,categoryId:'cat-exp-food'});
                a.createOperation({id:'range-90',kind:'income',amount:90,categoryId:'cat-inc-sale'});
                a.setAmountFilter(40,60); const got=a.filteredOperations(); return got.includes('range-50')&&!got.includes('range-10')&&!got.includes('range-90');
              });
              ok('AMOUNT-RANGE-FILTER',amountResult&&await page.locator('#amountFrom').count()===1&&await page.locator('#amountTo').count()===1);
              const emptyGap=await page.evaluate(()=>{window.__FP_TEST__.setAmountFilter(999998,999999);const a=document.querySelector('#operationsScreen>.summary').getBoundingClientRect(),b=document.querySelector('#operationsList .empty').getBoundingClientRect();return b.top-a.bottom>=8});
              ok('EMPTY-STATE-GAP',emptyGap);
              await page.evaluate(()=>window.__FP_TEST__.setAmountFilter(null,null));

              await page.locator('#operationsScreen [data-back]').click();
              await page.locator('#analyticsBtn').click();
              const analyticsOrder=await page.locator('#analyticsScreen>.summary span').allTextContents();
              ok('ANALYTICS-SUMMARY-ORDER',analyticsOrder.join('|')==='Расход|Разница|Приход');
              const analyticsGap=await page.evaluate(()=>{const a=document.querySelector('#analyticsScreen>.summary').getBoundingClientRect(),b=document.querySelector('#analyticsScreen>.card.section:last-child').getBoundingClientRect();return b.top-a.bottom>=8});
              ok('ANALYTICS-GAP',analyticsGap);
              await page.locator('[data-label="analytics"]').click();
              const pickerBox=await page.locator('#pickerInput').boundingBox(),panelBox=await page.locator('#picker .panel').boundingBox();
              ok('PICKER-IP14-NO-OVERFLOW',within(pickerBox,390)&&within(panelBox,390));
              await page.locator('[data-close="picker"]').click();

              await page.locator('#analyticsScreen [data-back]').click();
              await page.locator('[data-open-entry="expense"]').click();
              ok('ENTRY-DATE-NO-OVERFLOW',within(await page.locator('#dateInput').boundingBox(),390));
              ok('BACKGROUND-SCROLL-LOCKED',await page.evaluate(()=>document.body.classList.contains('modal-open')&&getComputedStyle(document.body).position==='fixed'));
              await page.locator('[data-close="entryModal"]').click();

              const id=await page.evaluate(()=>window.__FP_TEST__.createOperation({id:'history-ui',kind:'expense',amount:12.34,categoryId:'cat-exp-food',note:'Старый комментарий',occurredAt:Date.now()-45678}));
              await page.locator('[data-screen="operations"]').click();
              await page.locator(`[data-op-id="${id}"]`).click();
              ok('DETAIL-THREE-ACTIONS',await page.locator('#operationDetail .detail-actions .btn').count()===3&&await page.locator('#detailDeleteBtn').isVisible());
              await page.locator('#detailEditBtn').click();
              await page.locator('#noteInput').fill('Новый комментарий');
              await page.locator('#saveOperationBtn').click();
              const noteOnly=await page.evaluate(id=>{const o=window.__FP_TEST__.getState().operations.find(x=>x.id===id);return o.revisions.length===1&&o.revisions[0].changes.length===1&&o.revisions[0].changes[0].field==='note'},id);
              ok('HISTORY-NOTE-ONLY',noteOnly);
              await page.locator(`[data-op-id="${id}"]`).click(); await page.locator('#detailEditBtn').click();
              await page.locator('#amountInput').fill('77,70'); await page.locator('#noteInput').fill('Ещё один комментарий'); await page.locator('#saveOperationBtn').click();
              const twoFields=await page.evaluate(id=>{const o=window.__FP_TEST__.getState().operations.find(x=>x.id===id),r=o.revisions.at(-1),f=r.changes.map(c=>c.field).sort();return o.revisions.length===2&&r.changes.length===2&&f.join('|')==='amount|note'},id);
              ok('HISTORY-TWO-FIELDS-ONE-BATCH',twoFields);

              const cats=await page.evaluate(()=>{const a=window.__FP_TEST__,i=a.createCategory('income','3D'),e=a.createCategory('expense','3D'),dup=a.createCategory('expense','  3d  '),other=a.createCategory('expense','Для переименования'),ren=a.renameCategory(other.category.id,'3D');return{i:i.ok,e:e.ok,dup:dup.ok,ren:ren.ok}});
              ok('CATEGORY-NAME-SCOPED-BY-TYPE',cats.i&&cats.e&&!cats.dup);
              const renameCross=await page.evaluate(()=>{const a=window.__FP_TEST__,x=a.createCategory('expense','Кросс расход'),y=a.createCategory('income','Кросс имя');return a.renameCategory(x.category.id,'Кросс имя').ok});
              ok('CATEGORY-RENAME-SCOPED-BY-TYPE',!cats.ren&&renameCross);

              await page.locator('[data-open-entry="expense"]').click(); await page.locator('#addCategoryBtn').click(); await page.locator('#newCategoryInput').fill('3D'); await page.locator('#saveNewCategoryBtn').click();
              const catErr=await page.locator('#categoryError').innerText(),errBox=await page.locator('#categoryError').boundingBox(),dateBox=await page.locator('#dateInput').boundingBox();
              ok('CATEGORY-ERROR-NEAR-FIELD',catErr.length>0&&errBox&&dateBox&&errBox.y+errBox.height<=dateBox.y+1);
              await page.locator('[data-close="entryModal"]').click();

              await page.locator('[data-screen="more"]').click(); await page.locator('#openCategoryManager').click();
              await page.locator('#managerNewCategoryInput').fill('Категория из справочника'); await page.locator('#managerAddCategoryBtn').click();
              ok('CATEGORY-MANAGER-ADD',(await page.locator('#categoryManagerList').innerText()).includes('Категория из справочника'));
              let confirmSeen=false,confirmText=''; page.once('dialog',async d=>{confirmSeen=d.type()==='confirm';confirmText=d.message();await d.dismiss()});
              const item=page.locator('.category-item',{hasText:'Категория из справочника'}); await item.locator('[data-cat-delete]').click(); await page.waitForTimeout(100);
              ok('CATEGORY-DELETE-CONFIRM',confirmSeen&&/нельзя отменить/i.test(confirmText)&&(await item.count())===1);
              await page.locator('[data-close="categoryManager"]').click();

              await page.evaluate(()=>{document.documentElement.style.fontSize='20px';const a=window.__FP_TEST__,id=a.createOperation({id:'trash-big-text',kind:'expense',amount:2,categoryId:'cat-exp-food'});a.setTrashEnabled(true);a.trashOperation(id)});
              await page.locator('[data-screen="operations"]').click(); await page.locator('#trashBtn').click();
              const purge=page.locator('[data-trash-purge="trash-big-text"]'),purgeBox=await purge.boundingBox(),trashPanel=await page.locator('#trashModal .panel').boundingBox();
              ok('TRASH-PURGE-LARGE-TEXT-FITS',within(purgeBox,390)&&purgeBox.x>=trashPanel.x-0.5&&purgeBox.x+purgeBox.width<=trashPanel.x+trashPanel.width+0.5);
              gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'NONE';
              await ctx.close();
            }catch(e){gate['BROWSER-ERROR']=e.stack||e.message;gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'FAILED'}finally{
              if(browser)await browser.close();
              fs.writeFileSync('verification/operations-ux-repair-gate.txt',Object.entries(gate).map(([k,v])=>`${k}: ${v}`).join('\n')+'\n');
              console.log(fs.readFileSync('verification/operations-ux-repair-gate.txt','utf8'));
            }
          })();
          NODE
      - name: Record public evidence
        if: always()
        run: |
          cp verification/operations-ux-repair-gate.txt /tmp/gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/gate.txt verification/operations-ux-repair-gate.txt
          git add verification/operations-ux-repair-gate.txt
          git diff --cached --quiet && exit 0
          git commit -m "Record Operations UX repair public gate [skip ci]"
          git push origin HEAD:main
