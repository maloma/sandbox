name: Corrected global modal scroll lock closure gate

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-global-modal-scroll-lock-closure.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - run: npm install --no-save playwright-core@1.53.2
      - name: Verify exact public runtime and corrected scroll reference
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs=require('fs');
          const {chromium}=require('playwright-core');
          const expected='d4aab98cb5271bd7f7cfb9faced1cfe3c61644e10f1fe55d6687d636fdbc722b';
          const gate={
            'PUBLIC-URL':'https://maloma.github.io/sandbox/',
            'HTTP-STATUS':'FAILED',
            'PUBLIC-RUNTIME-MATCH':'FAILED',
            'MOBILE-CATEGORY-BACKGROUND-LOCK':'FAILED',
            'MOBILE-BACKGROUND-STABLE-DURING-GESTURE':'FAILED',
            'MOBILE-BACKDROP-TOUCHMOVE-BLOCKED':'FAILED',
            'MOBILE-SCROLL-POSITION-RESTORED':'FAILED',
            'MOBILE-ENTRY-BACKGROUND-LOCK':'FAILED',
            'MOBILE-FOREGROUND-SHEET-SCROLL':'FAILED',
            'DESKTOP-BACKGROUND-LOCK':'FAILED',
            'DESKTOP-BACKGROUND-STABLE-DURING-WHEEL':'FAILED',
            'PAGE-JAVASCRIPT-ERRORS':'FAILED',
            'PACKAGE-CLOSURE':'FAILED',
            'VERIFIED-RUNTIME-COMMIT':'8573e0c0a3e542ad4a88883d9fdf957388b716fd'
          };
          const set=(k,v)=>gate[k]=v?'VERIFIED':'FAILED';
          (async()=>{let browser;const errors=[];try{
            const html=await fetch(`https://maloma.github.io/sandbox/?closure-sha=${Date.now()}`).then(async r=>{gate['HTTP-STATUS']=String(r.status);return new Uint8Array(await r.arrayBuffer())});
            const digest=Buffer.from(await crypto.subtle.digest('SHA-256',html)).toString('hex');
            set('PUBLIC-RUNTIME-MATCH',digest===expected);
            const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
            browser=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});
            const mobile=await browser.newContext({viewport:{width:390,height:844},isMobile:true,hasTouch:true});
            const p=await mobile.newPage();p.on('pageerror',e=>errors.push(e.message));
            await p.goto('https://maloma.github.io/sandbox/?test=1&scroll-lock-closure=1',{waitUntil:'domcontentloaded',timeout:60000});
            await p.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2,{timeout:30000});
            await p.locator('[data-screen="operations"]').click();
            await p.locator('#filterToggleBtn').click();
            await p.evaluate(()=>{document.body.style.minHeight='2800px';window.scrollTo(0,360)});
            const beforeCategory=await p.evaluate(()=>window.scrollY);
            await p.evaluate(()=>document.getElementById('categoryFilterBtn').click());
            await p.waitForFunction(()=>document.body.classList.contains('background-locked'));
            const categoryLock=await p.evaluate(()=>({position:getComputedStyle(document.body).position,top:document.body.style.top,appY:document.querySelector('.app').getBoundingClientRect().y}));
            set('MOBILE-CATEGORY-BACKGROUND-LOCK',categoryLock.position==='fixed'&&categoryLock.top===`-${beforeCategory}px`);
            await p.mouse.move(385,430);await p.mouse.wheel(0,1000);await p.waitForTimeout(100);
            set('MOBILE-BACKGROUND-STABLE-DURING-GESTURE',Math.abs((await p.evaluate(()=>document.querySelector('.app').getBoundingClientRect().y))-categoryLock.appY)<1);
            set('MOBILE-BACKDROP-TOUCHMOVE-BLOCKED',await p.evaluate(()=>{const modal=document.getElementById('categoryFilterModal');const e=new Event('touchmove',{bubbles:true,cancelable:true});modal.dispatchEvent(e);return e.defaultPrevented}));
            await p.evaluate(()=>document.querySelector('[data-close="categoryFilterModal"]').click());
            await p.waitForFunction(()=>!document.body.classList.contains('background-locked'));
            set('MOBILE-SCROLL-POSITION-RESTORED',Math.abs((await p.evaluate(()=>window.scrollY))-beforeCategory)<2);
            await p.locator('[data-screen="home"]').click();
            await p.evaluate(()=>{document.body.style.minHeight='2800px';window.scrollTo(0,300)});
            const beforeEntry=await p.evaluate(()=>window.scrollY);
            await p.evaluate(()=>document.querySelector('[data-open-entry="expense"]').click());
            await p.waitForFunction(()=>document.body.classList.contains('background-locked'));
            set('MOBILE-ENTRY-BACKGROUND-LOCK',await p.evaluate(v=>getComputedStyle(document.body).position==='fixed'&&document.body.style.top===`-${v}px`,beforeEntry));
            set('MOBILE-FOREGROUND-SHEET-SCROLL',await p.evaluate(()=>{const s=document.querySelector('#entryModal .sheet');const a=s.scrollTop;s.scrollTop=a+100;return s.scrollTop>a||s.scrollHeight<=s.clientHeight}));
            await mobile.close();
            const desktop=await browser.newContext({viewport:{width:1720,height:966}});const d=await desktop.newPage();d.on('pageerror',e=>errors.push(e.message));
            await d.goto('https://maloma.github.io/sandbox/?test=1&scroll-lock-closure-desktop=1',{waitUntil:'domcontentloaded',timeout:60000});await d.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2);
            await d.locator('[data-screen="operations"]').click();await d.locator('#filterToggleBtn').click();await d.evaluate(()=>{document.body.style.minHeight='2800px';window.scrollTo(0,420);document.getElementById('categoryFilterBtn').click()});await d.waitForFunction(()=>document.body.classList.contains('background-locked'));
            const desktopLock=await d.evaluate(()=>({locked:getComputedStyle(document.body).position==='fixed',y:document.querySelector('.app').getBoundingClientRect().y}));set('DESKTOP-BACKGROUND-LOCK',desktopLock.locked);
            await d.mouse.move(1600,450);await d.mouse.wheel(0,1200);await d.waitForTimeout(100);set('DESKTOP-BACKGROUND-STABLE-DURING-WHEEL',Math.abs((await d.evaluate(()=>document.querySelector('.app').getBoundingClientRect().y))-desktopLock.y)<1);
            await desktop.close();gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'NONE';
          }catch(e){gate['BROWSER-ERROR']=e.stack||e.message;gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'FAILED'}finally{
            if(browser)await browser.close();const req=['PUBLIC-RUNTIME-MATCH','MOBILE-CATEGORY-BACKGROUND-LOCK','MOBILE-BACKGROUND-STABLE-DURING-GESTURE','MOBILE-BACKDROP-TOUCHMOVE-BLOCKED','MOBILE-SCROLL-POSITION-RESTORED','MOBILE-ENTRY-BACKGROUND-LOCK','MOBILE-FOREGROUND-SHEET-SCROLL','DESKTOP-BACKGROUND-LOCK','DESKTOP-BACKGROUND-STABLE-DURING-WHEEL'];
            gate['PACKAGE-CLOSURE']=req.every(k=>gate[k]==='VERIFIED')&&gate['PAGE-JAVASCRIPT-ERRORS']==='NONE'?'VERIFIED':'FAILED';fs.writeFileSync('verification/global-modal-scroll-lock-closure-gate.txt',Object.entries(gate).map(([k,v])=>`${k}: ${v}`).join('\n')+'\n');
          }})();
          NODE
          cat verification/global-modal-scroll-lock-closure-gate.txt
      - name: Record closure evidence
        if: always()
        run: |
          cp verification/global-modal-scroll-lock-closure-gate.txt /tmp/gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/gate.txt verification/global-modal-scroll-lock-closure-gate.txt
          git add verification/global-modal-scroll-lock-closure-gate.txt
          git diff --cached --quiet && exit 0
          git commit -m "Record corrected global modal scroll lock closure [skip ci]"
          git push origin HEAD:main
