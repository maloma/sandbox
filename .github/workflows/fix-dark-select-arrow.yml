name: Fix dark select arrow

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-dark-select-arrow.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Patch rendered runtime CSS
        run: |
          python <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          old="h=await new Response(s).text();document.open();"
          new="h=await new Response(s).text();h=h.replace('</style>','[data-theme=dark] select,body[data-theme=dark] select{color-scheme:dark} [data-theme=dark] select:hover,body[data-theme=dark] select:hover{color-scheme:dark}</style>');document.open();"
          if old not in s:
              raise SystemExit('loader marker not found')
          p.write_text(s.replace(old,new,1),encoding='utf-8')
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Keep category select arrow dark on hover"
          git push origin HEAD:main
