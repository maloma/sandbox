name: Apply operation row visual fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-operation-row-visual-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Patch canonical runtime
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let source = fs.readFileSync(path, 'utf8');

          const replaceLine = (prefix, replacement) => {
            const lines = source.split('\n');
            const indexes = lines.map((line, index) => line.startsWith(prefix) ? index : -1).filter(index => index >= 0);
            if (indexes.length !== 1) throw new Error(`Expected one line beginning ${prefix}, found ${indexes.length}`);
            lines[indexes[0]] = replacement;
            source = lines.join('\n');
          };

          replaceLine('.debts{', '.debts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:0 0 9px}.debt{min-height:58px;border:1px solid var(--line);border-radius:18px;background:var(--card);color:var(--ink);box-shadow:var(--shadow);padding:10px 12px;display:flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;min-width:0}.debt b{font-size:13px;line-height:1;white-space:nowrap}.debt strong{font-size:clamp(14px,4.2vw,18px);line-height:1;white-space:nowrap;min-width:0}');
          replaceLine('.operation{', '.operation{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:11px 0;border-top:1px solid var(--line);cursor:pointer}.operation:first-child{border-top:0}.op-main{min-width:0}.op-title-line{display:flex;align-items:baseline;gap:7px;min-width:0}.op-title{font-size:14px;font-weight:850;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.op-time{font-size:11px;color:var(--muted);font-weight:800;white-space:nowrap}.op-note{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.op-value{font-size:15px;font-weight:900;white-space:nowrap}.operation.income .op-title,.operation.income .op-value{color:color-mix(in srgb,var(--green) 62%,var(--ink))!important}.operation.expense .op-title,.operation.expense .op-value{color:color-mix(in srgb,var(--red) 58%,var(--ink))!important}');
          replaceLine('@media(max-width:360px)', '@media(max-width:360px){.debt{gap:5px;padding:9px 8px}.debt b{font-size:12px}.debt strong{font-size:14px}.operation{grid-template-columns:minmax(0,1fr) auto;gap:9px}}');
          replaceLine('const operationRow=', "const operationRow=t=>`<div class=\"operation ${t.kind}\" data-op-id=\"${esc(t.id)}\" role=\"button\" tabindex=\"0\"><div class=\"op-main\"><div class=\"op-title-line\"><div class=\"op-title\">${esc(t.category)}</div><span class=\"op-time\">${new Intl.DateTimeFormat('ru-RU',{hour:'2-digit',minute:'2-digit'}).format(new Date(t.date))}</span></div>${t.note?`<div class=\"op-note\">${esc(t.note)}</div>`:''}</div><div class=\"op-value\">${t.kind==='income'?'+':'−'}${money(t.amount)}</div></div>`;");

          source = source.replaceAll('<!-- Build: canonical-single-runtime | No iframe | No version redirect | Operation detail and day grouping -->', '<!-- Build: canonical-single-runtime | No iframe | No version redirect | Calm operation rows and standard debt spacing -->');

          if (source.includes('op-icon')) throw new Error('Legacy operation icons remain');
          if (!source.includes('margin:0 0 9px')) throw new Error('Standard debt spacing not applied');
          if (!source.includes('operation.income .op-title')) throw new Error('Income text tone missing');
          if (!source.includes('operation.expense .op-title')) throw new Error('Expense text tone missing');
          fs.writeFileSync(path, source);
          NODE

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Simplify operation rows and normalize debt spacing"
          git pull --rebase origin main
          git push origin HEAD:main
