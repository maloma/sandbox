name: Verify dark desktop canvas

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-dark-desktop-canvas.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v6
      - run: npm install --no-save playwright-core@1.53.2
      - name: Run public dark desktop canvas gate
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright-core');
          const baseUrl = process.env.PUBLIC_URL;
          const url = `${baseUrl}?dark-canvas=${process.env.GITHUB_SHA}`;
          const gate = {
            'PUBLIC-URL': baseUrl,
            'HTTP-LOAD': 'FAILED',
            'HTTP-STATUS': 'NOT VERIFIED',
            'FINAL-ADDRESS': 'NOT VERIFIED',
            'ROOT-DARK-THEME': 'NOT VERIFIED',
            'BODY-DARK-THEME': 'NOT VERIFIED',
            'VIEWPORT-MIN-HEIGHT': 'NOT VERIFIED',
            'DESKTOP-OUTSIDE-APP-TOP-CANVAS': 'NOT VERIFIED',
            'DESKTOP-OUTSIDE-APP-BOTTOM-CANVAS': 'NOT VERIFIED',
            'BOTTOM-NAV-FIXED': 'NOT VERIFIED',
            'PAGE-JAVASCRIPT-ERRORS': 'NOT VERIFIED',
            'VERIFIED-COMMIT': process.env.GITHUB_SHA,
          };
          const sleep = ms => new Promise(r => setTimeout(r, ms));
          (async()=>{
            let source = '';
            let status = 0;
            for (let i = 0; i < 48; i++) {
              try {
                const response = await fetch(url, { cache: 'no-store', redirect: 'follow' });
                status = response.status;
                source = await response.text();
                if (response.ok && source.includes(':root[data-theme=dark]') && source.includes('min-height:100dvh')) break;
              } catch {}
              await sleep(5000);
            }
            gate['HTTP-STATUS'] = String(status);
            if (!(status >= 200 && status < 400) || !source.includes(':root[data-theme=dark]') || !source.includes('min-height:100dvh')) {
              throw new Error('Published runtime did not expose the root dark canvas fix');
            }
            gate['HTTP-LOAD'] = 'SUCCEEDED';
            const executablePath = ['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
            const browser = await chromium.launch({ headless: true, executablePath, args: ['--no-sandbox'] });
            const context = await browser.newContext({ viewport: { width: 1720, height: 966 } });
            await context.addInitScript(() => localStorage.setItem('familypilot.theme', 'dark'));
            const page = await context.newPage();
            const errors = [];
            page.on('pageerror', error => errors.push(error.message));
            const response = await page.goto(url, { waitUntil: 'networkidle', timeout: 60000 });
            gate['FINAL-ADDRESS'] = page.url();
            gate['HTTP-STATUS'] = String(response?.status() || status);
            await page.locator('[data-screen="operations"]').click();
            const result = await page.evaluate(() => {
              const rgb = value => value.replace(/\s+/g, '');
              const htmlBg = getComputedStyle(document.documentElement).backgroundColor;
              const bodyBg = getComputedStyle(document.body).backgroundColor;
              const rootTheme = document.documentElement.dataset.theme;
              const bodyTheme = document.body.dataset.theme;
              const docHeight = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
              const viewportHeight = window.innerHeight;
              const topPoint = document.elementFromPoint(40, 400);
              const bottomPoint = document.elementFromPoint(40, viewportHeight - 80);
              const effectiveBg = el => {
                let current = el;
                while (current) {
                  const bg = getComputedStyle(current).backgroundColor;
                  if (bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent') return bg;
                  current = current.parentElement;
                }
                return getComputedStyle(document.documentElement).backgroundColor;
              };
              return {
                rootTheme,
                bodyTheme,
                htmlBg: rgb(htmlBg),
                bodyBg: rgb(bodyBg),
                docHeight,
                viewportHeight,
                topBg: rgb(effectiveBg(topPoint)),
                bottomBg: rgb(effectiveBg(bottomPoint)),
                navPosition: getComputedStyle(document.querySelector('.bottom')).position,
              };
            });
            const expected = 'rgb(7,24,36)';
            gate['ROOT-DARK-THEME'] = result.rootTheme === 'dark' && result.htmlBg === expected ? 'VERIFIED' : `FAILED: theme=${result.rootTheme}, bg=${result.htmlBg}`;
            gate['BODY-DARK-THEME'] = result.bodyTheme === 'dark' && result.bodyBg === expected ? 'VERIFIED' : `FAILED: theme=${result.bodyTheme}, bg=${result.bodyBg}`;
            gate['VIEWPORT-MIN-HEIGHT'] = result.docHeight >= result.viewportHeight ? `VERIFIED: ${result.docHeight}px >= ${result.viewportHeight}px` : `FAILED: ${result.docHeight}px < ${result.viewportHeight}px`;
            gate['DESKTOP-OUTSIDE-APP-TOP-CANVAS'] = result.topBg === expected ? `VERIFIED: ${result.topBg}` : `FAILED: ${result.topBg}`;
            gate['DESKTOP-OUTSIDE-APP-BOTTOM-CANVAS'] = result.bottomBg === expected ? `VERIFIED: ${result.bottomBg}` : `FAILED: ${result.bottomBg}`;
            gate['BOTTOM-NAV-FIXED'] = result.navPosition === 'fixed' ? 'VERIFIED' : `FAILED: ${result.navPosition}`;
            gate['PAGE-JAVASCRIPT-ERRORS'] = errors.length ? `FAILED: ${errors.join(' | ')}` : 'NONE';
            await context.close();
            await browser.close();
          })().catch(error => {
            gate['ERROR'] = error.stack || error.message;
          }).finally(() => {
            fs.writeFileSync('verification/dark-desktop-canvas-gate.txt', Object.entries(gate).map(([k,v]) => `${k}: ${v}`).join('\n') + '\n');
          });
          NODE
      - name: Record evidence
        if: always()
        run: |
          cp verification/dark-desktop-canvas-gate.txt /tmp/dark-desktop-canvas-gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/dark-desktop-canvas-gate.txt verification/dark-desktop-canvas-gate.txt
          git add verification/dark-desktop-canvas-gate.txt
          git diff --cached --quiet && exit 0
          git commit -m "Record dark desktop canvas verification [skip ci]"
          git push origin HEAD:main
