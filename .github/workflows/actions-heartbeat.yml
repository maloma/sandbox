name: Actions Heartbeat

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/actions-heartbeat.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Write heartbeat
        run: |
          mkdir -p verification
          printf 'ACTIONS-HEARTBEAT: SUCCEEDED\nCOMMIT: %s\n' "$GITHUB_SHA" > verification/actions-heartbeat.txt
      - name: Commit heartbeat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add verification/actions-heartbeat.txt
          git commit -m "Record Actions heartbeat [skip ci]"
          git push origin HEAD:main
