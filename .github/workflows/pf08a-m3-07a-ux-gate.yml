name: PF-08A M3-07A UX Gate

on:
  pull_request:
    branches: [main]
    paths:
      - familypilot-scope.js
      - src/familypilot-scope.js
      - familypilot-partial-payment-entry-ui.js
      - familypilot-mobile-payment-tap.js
      - familypilot-viewport-anchor.js
      - familypilot-operation-date-picker.js
      - tools/pf08a-m3-07a-ux-browser-smoke.mjs
      - .github/workflows/pf08a-m3-07a-ux-gate.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-exact-head:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Quiet exact-head checkout
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          git fetch -q --depth=1 origin "${HEAD_SHA}"
          git checkout -q --detach FETCH_HEAD

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Check syntax and mirrors
        run: |
          node --check familypilot-scope.js
          node --check familypilot-partial-payment-entry-ui.js
          node --check familypilot-mobile-payment-tap.js
          node --check familypilot-viewport-anchor.js
          node --check familypilot-operation-date-picker.js
          node --check tools/pf08a-m3-07a-ux-browser-smoke.mjs
          cmp familypilot-scope.js src/familypilot-scope.js

      - name: Verify package contract
        run: |
          grep -qF "familypilot-partial-payment-entry-ui.js" familypilot-scope.js
          grep -qF "familypilot-viewport-anchor.js" familypilot-scope.js
          grep -qF "?v=${BUILD}" familypilot-scope.js || true
          grep -qF "Сколько оплачено сейчас" familypilot-partial-payment-entry-ui.js
          grep -qF "Оплата уже записана" familypilot-partial-payment-entry-ui.js
          grep -qF "releasePointerCapture" familypilot-mobile-payment-tap.js
          grep -qF "document.body.appendChild(nav)" familypilot-viewport-anchor.js
          grep -qF "operation-date-native-source" familypilot-operation-date-picker.js

      - name: Browser regression — M3-07A UX
        run: node tools/pf08a-m3-07a-ux-browser-smoke.mjs

      - name: Browser regression — partial payments
        run: node tools/pf08a-m3-07-partial-payments-browser-smoke.mjs

      - name: Browser regression — mobile operations
        run: node tools/pf08a-m3-06-mobile-ux-browser-smoke.mjs
