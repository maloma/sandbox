name: Probe synchronous modal scroll lock publication

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/probe-synchronous-modal-scroll-lock-publication.yml

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Probe public SHA
        run: |
          mkdir -p verification
          status=$(curl -L -sS -o /tmp/public.html -w '%{http_code}' "https://maloma.github.io/sandbox/?sync-probe=$(date +%s)" || true)
          actual=$(sha256sum /tmp/public.html 2>/dev/null | awk '{print $1}')
          expected=fceea77f5e462292eaadbec872e223f1af9452a46f6cdaa6e0e2b2326377bab6
          result=FAILED
          [ "$status" = "200" ] && [ "$actual" = "$expected" ] && result=VERIFIED
          {
            echo "HTTP-STATUS: $status"
            echo "EXPECTED-SHA256: $expected"
            echo "ACTUAL-SHA256: $actual"
            echo "PUBLIC-RUNTIME-MATCH: $result"
          } > verification/synchronous-modal-scroll-lock-publication-probe.txt
      - name: Record probe
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add verification/synchronous-modal-scroll-lock-publication-probe.txt
          git commit -m "Record synchronous modal scroll lock publication probe [skip ci]"
          git push origin HEAD:main
