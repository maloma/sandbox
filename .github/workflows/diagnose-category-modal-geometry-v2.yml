name: Diagnose category modal keyboard geometry

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/diagnose-category-modal-geometry-v2.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: npm install --no-save playwright-core@1.53.2
      - name: Capture exact geometry
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs=require('fs');
          const {chromium}=require('playwright-core');
          (async()=>{
            let browser;
            const out=[];
            try{
              const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
              browser=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});
              const ctx=await browser.newContext({viewport:{width:390,height:844},isMobile:true,hasTouch:true,deviceScaleFactor:3});
              const page=await ctx.newPage();
              await page.addInitScript(()=>localStorage.clear());
              await page.goto('https://maloma.github.io/sandbox/?test=1&geometry-v2=1',{waitUntil:'domcontentloaded',timeout:60000});
              await page.waitForFunction(()=>window.__FP_TEST__?.syncCategoryViewport,{timeout:30000});
              await page.evaluate(()=>{document.documentElement.style.fontSize='20px';document.querySelector('[data-screen="operations"]').click();document.getElementById('filterToggleBtn').click();document.getElementById('categoryFilterBtn').click()});
              await page.locator('#categorySearch').focus();
              await page.waitForTimeout(30);
              const grab=()=>page.evaluate(()=>{
                const m=document.getElementById('categoryFilterModal'),p=m.querySelector('.panel'),h=m.querySelector('.panel-head'),tools=m.querySelector('.category-picker-tools'),i=document.getElementById('categorySearch'),checks=document.getElementById('categoryChecks');
                const rect=e=>{const r=e.getBoundingClientRect();return{x:r.x,y:r.y,top:r.top,bottom:r.bottom,left:r.left,right:r.right,width:r.width,height:r.height}};
                return{windowY:window.scrollY,docScrollTop:document.documentElement.scrollTop,bodyScrollTop:document.body.scrollTop,classes:m.className,modal:rect(m),panel:rect(p),head:rect(h),tools:rect(tools),input:rect(i),checks:rect(checks),modalStyle:{top:getComputedStyle(m).top,height:getComputedStyle(m).height,align:getComputedStyle(m).alignItems,position:getComputedStyle(m).position},panelStyle:{height:getComputedStyle(p).height,maxHeight:getComputedStyle(p).maxHeight,position:getComputedStyle(p).position,transform:getComputedStyle(p).transform,overflow:getComputedStyle(p).overflow}};
              });
              out.push('ARMED: '+JSON.stringify(await grab()));
              await page.evaluate(()=>window.__FP_TEST__.syncCategoryViewport(420,0,844));
              await page.waitForTimeout(120);
              out.push('KEYBOARD: '+JSON.stringify(await grab()));
              await page.locator('#categorySearch').fill('ъ');
              await page.waitForTimeout(80);
              out.push('EMPTY: '+JSON.stringify(await grab()));
              await ctx.close();
            }catch(e){out.push('ERROR: '+(e.stack||e.message))}finally{if(browser)await browser.close();fs.writeFileSync('verification/category-modal-geometry-v2.txt',out.join('\n')+'\n')}
          })();
          NODE
          cat verification/category-modal-geometry-v2.txt
      - name: Record diagnostic and remove workflow
        if: always()
        run: |
          cp verification/category-modal-geometry-v2.txt /tmp/geometry.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/geometry.txt verification/category-modal-geometry-v2.txt
          rm -f .github/workflows/diagnose-category-modal-geometry-v2.yml
          git add verification/category-modal-geometry-v2.txt .github/workflows/diagnose-category-modal-geometry-v2.yml
          git commit -m "Record category modal geometry diagnostic [skip ci]"
          git push origin HEAD:main
