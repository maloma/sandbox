name: Fix iPhone category search keyboard positioning

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-category-search-keyboard-ios.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - name: Decode and patch runtime
        run: |
          python <<'PY'
          from pathlib import Path
          import re,base64,gzip
          wrapper=Path('index.html').read_text(encoding='utf-8')
          m=re.search(r'const b="([A-Za-z0-9+/=]+)"',wrapper)
          if not m: raise SystemExit('runtime payload not found')
          s=gzip.decompress(base64.b64decode(m.group(1))).decode('utf-8')

          css='''
          #categoryFilterModal{top:var(--category-vv-top,0px);bottom:auto;height:var(--category-vv-height,100dvh);min-height:0;align-items:flex-end}
          #categoryFilterModal .panel{height:calc(var(--category-vv-height,100dvh) - 8px);max-height:calc(var(--category-vv-height,100dvh) - 8px);min-height:0;display:flex;flex-direction:column;overflow:hidden;padding-bottom:max(12px,env(safe-area-inset-bottom))}
          #categoryFilterModal .panel-head{flex:none}
          #categoryFilterModal .category-picker-tools{position:sticky;top:0;z-index:4;flex:none;background:var(--bg);padding:12px 0 8px;margin-top:0}
          #categoryFilterModal .category-checks{flex:1;min-height:72px;max-height:none;overflow:auto;margin-top:0;overscroll-behavior:contain}
          #categoryFilterModal .selected-count,#categoryFilterModal .category-actions{flex:none}
          #categoryFilterModal.keyboard-visible .panel{border-radius:18px 18px 0 0}
          #categoryFilterModal.keyboard-visible .category-picker-tools{box-shadow:0 8px 16px color-mix(in srgb,var(--bg) 88%,transparent)}
          '''
          marker='</style>'
          if marker not in s: raise SystemExit('style marker missing')
          s=s.replace(marker,css+marker,1)

          old="function openCategoryFilter(context='operations'){categoryFilterContext=context;if(context==='analytics'){analyticsPendingCategoryIds=new Set(analyticsSelectedCategoryIds);pendingCategoryIds=analyticsPendingCategoryIds;$('categoryFilterHeading').textContent='Категории аналитики'}else{pendingCategoryIds=new Set(selectedCategoryIds);$('categoryFilterHeading').textContent='Категории операций'}categorySearch='';$('categorySearch').value='';renderCategoryChecks();open('categoryFilterModal')}"
          new="function openCategoryFilter(context='operations'){categoryFilterContext=context;if(context==='analytics'){analyticsPendingCategoryIds=new Set(analyticsSelectedCategoryIds);pendingCategoryIds=analyticsPendingCategoryIds;$('categoryFilterHeading').textContent='Категории аналитики'}else{pendingCategoryIds=new Set(selectedCategoryIds);$('categoryFilterHeading').textContent='Категории операций'}categorySearch='';$('categorySearch').value='';renderCategoryChecks();open('categoryFilterModal');syncCategoryVisualViewport()}"
          if old not in s: raise SystemExit('openCategoryFilter marker missing')
          s=s.replace(old,new,1)

          js="""
          const categoryFilterViewportModal=$('categoryFilterModal');
          function syncCategoryVisualViewport(metrics=null){
            const vv=metrics||window.visualViewport;
            const inner=Number(metrics?.innerHeight)||window.innerHeight;
            const height=Math.max(240,Math.round(Number(vv?.height)||inner));
            const offsetTop=Math.max(0,Math.round(Number(vv?.offsetTop)||0));
            categoryFilterViewportModal.style.setProperty('--category-vv-height',`${height}px`);
            categoryFilterViewportModal.style.setProperty('--category-vv-top',`${offsetTop}px`);
            categoryFilterViewportModal.classList.toggle('keyboard-visible',inner-height>120);
            if(categoryFilterViewportModal.classList.contains('open')&&document.activeElement===$('categorySearch')){
              requestAnimationFrame(()=>$('categorySearch').scrollIntoView({block:'nearest',inline:'nearest'}));
            }
          }
          if(window.visualViewport){
            window.visualViewport.addEventListener('resize',()=>syncCategoryVisualViewport(),{passive:true});
            window.visualViewport.addEventListener('scroll',()=>syncCategoryVisualViewport(),{passive:true});
          }
          window.addEventListener('resize',()=>syncCategoryVisualViewport(),{passive:true});
          $('categorySearch').addEventListener('focus',()=>{syncCategoryVisualViewport();requestAnimationFrame(()=>$('categorySearch').scrollIntoView({block:'nearest'}))});
          $('categorySearch').addEventListener('input',()=>{syncCategoryVisualViewport();requestAnimationFrame(()=>$('categorySearch').scrollIntoView({block:'nearest'}))});
          $('categorySearch').addEventListener('blur',()=>setTimeout(()=>syncCategoryVisualViewport(),80));
          """
          marker="document.addEventListener('click',e=>{"
          if marker not in s: raise SystemExit('click handler marker missing')
          s=s.replace(marker,js+marker,1)

          tail='renderAll();\n})();'
          replacement="if(new URLSearchParams(location.search).has('test')&&window.__FP_TEST__)window.__FP_TEST__.syncCategoryViewport=(height,offsetTop=0,innerHeight=window.innerHeight)=>syncCategoryVisualViewport({height,offsetTop,innerHeight});\nsyncCategoryVisualViewport();\nrenderAll();\n})();"
          if tail not in s: raise SystemExit('runtime tail marker missing')
          s=s.replace(tail,replacement,1)
          Path('/tmp/runtime-source.html').write_text(s,encoding='utf-8')
          PY
      - name: Validate patched source
        run: |
          python <<'PY'
          from pathlib import Path
          import re
          s=Path('/tmp/runtime-source.html').read_text(encoding='utf-8')
          required=['--category-vv-height','keyboard-visible','syncCategoryVisualViewport','visualViewport.addEventListener','syncCategoryViewport','categorySearch').scrollIntoView']
          # final marker is checked separately because it contains quotes
          for marker in required[:-1]:
            if marker not in s: raise SystemExit(f'missing {marker}')
          if "$('categorySearch').scrollIntoView" not in s: raise SystemExit('missing search scrollIntoView')
          scripts=re.findall(r'<script>(.*?)</script>',s,re.S)
          Path('/tmp/runtime.js').write_text(scripts[-1],encoding='utf-8')
          PY
          node --check /tmp/runtime.js
      - name: Build deterministic standalone runtime
        run: |
          python <<'PY'
          from pathlib import Path
          import gzip,base64,hashlib
          html=Path('/tmp/runtime-source.html').read_bytes()
          payload=base64.b64encode(gzip.compress(html,compresslevel=9,mtime=0)).decode('ascii')
          wrapper=f'''<!doctype html>
          <html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="cache-control" content="no-store"><meta name="theme-color" content="#071824"><title>FamilyPilot</title><style>html,body{{margin:0;min-height:100%;background:#071824}}</style></head><body><script>
          (async()=>{{const b="{payload}",a=Uint8Array.from(atob(b),c=>c.charCodeAt(0)),s=new Blob([a]).stream().pipeThrough(new DecompressionStream('gzip')),h=await new Response(s).text();document.open();document.write(h);document.close()}})().catch(e=>{{document.body.textContent='Ошибка загрузки FamilyPilot';console.error(e)}});
          </script></body></html>'''
          wrapper='\n'.join(line.strip() for line in wrapper.splitlines())
          Path('index.html').write_text(wrapper,encoding='utf-8')
          Path('verification/category-search-keyboard-ios-sha.txt').write_text(f'SOURCE-SHA256: {hashlib.sha256(html).hexdigest()}\nINDEX-SHA256: {hashlib.sha256(wrapper.encode()).hexdigest()}\n',encoding='utf-8')
          PY
      - name: Commit runtime and remove workflow
        run: |
          rm -f .github/workflows/fix-category-search-keyboard-ios.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html verification/category-search-keyboard-ios-sha.txt .github/workflows/fix-category-search-keyboard-ios.yml
          git commit -m "Keep category search visible above iPhone keyboard"
          git push origin HEAD:main
