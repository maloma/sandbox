name: PR Fix Desktop Fixed Action Dock

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Remove desktop flow override
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '''@media (min-width:700px){
  .app{min-height:auto;padding-bottom:calc(var(--nav) + 16px + env(safe-area-inset-bottom))}
  main{padding-bottom:0}
  .action-dock{position:static;left:auto;right:auto;bottom:auto;transform:none;width:auto;padding:8px 12px 8px;background:none}
}'''
          if old in text:
              text = text.replace(old, '', 1)
          marker = '<!-- Layout: fixed-action-dock-all-viewports -->'
          if marker not in text:
              text = text.replace('</body>', marker + '\n</body>', 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit correction to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Keep action buttons fixed on desktop"
          git push origin HEAD:${{ github.head_ref }}
