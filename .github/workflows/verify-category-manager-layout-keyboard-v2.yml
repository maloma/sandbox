name: Verify category manager layout and immediate keyboard lift

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-category-manager-layout-keyboard-v2.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Wait for exact public runtime
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_SHA256: ac696f5c33d79876ae913d5647d2da1cd41892eb6d8535efdf1bb7c5d7047d1e
        run: |
          status=0
          actual=""
          for i in $(seq 1 72); do
            status=$(curl -L -sS -o /tmp/public-index.html -w '%{http_code}' "${PUBLIC_URL}?manager-keyboard-v2=$i&ts=$(date +%s)" || true)
            actual=$(sha256sum /tmp/public-index.html 2>/dev/null | awk '{print $1}')
            [ "$status" = "200" ] && [ "$actual" = "$EXPECTED_SHA256" ] && break
            sleep 5
          done
          echo "HTTP_STATUS=$status" >> "$GITHUB_ENV"
          echo "PUBLIC_SHA=$actual" >> "$GITHUB_ENV"
      - name: Install browser driver
        run: npm install --no-save playwright-core@1.53.2
      - name: Run public layout and keyboard scenarios
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_SHA256: ac696f5c33d79876ae913d5647d2da1cd41892eb6d8535efdf1bb7c5d7047d1e
          RUNTIME_COMMIT: 0cacada094fb5a2a2d9f849f41e65b8523d7b2f2
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs=require('fs');
          const {chromium}=require('playwright-core');
          const gate={
            'PUBLIC-URL':process.env.PUBLIC_URL,
            'HTTP-STATUS':process.env.HTTP_STATUS||'0',
            'PUBLIC-RUNTIME-MATCH':process.env.PUBLIC_SHA===process.env.EXPECTED_SHA256?'VERIFIED':'FAILED',
            'MOBILE-EXPENSE-TYPE-EXPLICIT':'FAILED',
            'MOBILE-INCOME-TYPE-EXPLICIT':'FAILED',
            'MOBILE-ACTIVE-TAB-VISIBLE':'FAILED',
            'MOBILE-CATEGORY-ACTIONS-WRAP':'FAILED',
            'MOBILE-NO-HORIZONTAL-OVERFLOW':'FAILED',
            'DESKTOP-EXPENSE-TYPE-EXPLICIT':'FAILED',
            'DESKTOP-INCOME-TYPE-EXPLICIT':'FAILED',
            'DESKTOP-CATEGORY-ACTIONS-WRAP':'FAILED',
            'DESKTOP-NO-HORIZONTAL-OVERFLOW':'FAILED',
            'SEARCH-MODAL-ARMS-BEFORE-KEYBOARD':'FAILED',
            'SEARCH-MODAL-LIFTS-TO-VISIBLE-TOP':'FAILED',
            'SEARCH-INPUT-ABOVE-KEYBOARD':'FAILED',
            'EMPTY-SEARCH-STAYS-ABOVE-KEYBOARD':'FAILED',
            'PAGE-JAVASCRIPT-ERRORS':'FAILED',
            'PACKAGE-CLOSURE':'FAILED',
            'VERIFIED-RUNTIME-COMMIT':process.env.RUNTIME_COMMIT
          };
          const ok=(k,v)=>gate[k]=v?'VERIFIED':'FAILED';
          const layout=async(page,prefix,width)=>{
            await page.evaluate(()=>{
              document.documentElement.style.fontSize='20px';
              document.querySelector('[data-screen="more"]').click();
              document.getElementById('openCategoryManager').click();
            });
            const expenseTitle=await page.locator('#categoryManagerTitle').innerText();
            const expenseHint=await page.locator('#categoryManagerKindHint').innerText();
            const expenseActive=await page.locator('[data-cat-kind="expense"]').evaluate(el=>el.classList.contains('active'));
            ok(`${prefix}-EXPENSE-TYPE-EXPLICIT`,expenseTitle==='Категории расходов'&&expenseHint.includes('расходов'));
            ok(prefix==='MOBILE'?'MOBILE-ACTIVE-TAB-VISIBLE':'DESKTOP-EXPENSE-TYPE-EXPLICIT',prefix==='MOBILE'?expenseActive:expenseTitle==='Категории расходов');
            await page.locator('[data-cat-kind="income"]').click();
            const incomeTitle=await page.locator('#categoryManagerTitle').innerText();
            const incomeHint=await page.locator('#categoryManagerKindHint').innerText();
            const incomeActive=await page.locator('[data-cat-kind="income"]').evaluate(el=>el.classList.contains('active'));
            ok(`${prefix}-INCOME-TYPE-EXPLICIT`,incomeTitle==='Категории приходов'&&incomeHint.includes('приходов')&&incomeActive);
            await page.locator('[data-cat-kind="expense"]').click();
            const info=await page.locator('#categoryManager .category-item').first().evaluate((item,width)=>{
              const panel=item.closest('.panel'),actions=item.querySelector('.category-item-actions'),buttons=[...actions.querySelectorAll('button')];
              const pr=panel.getBoundingClientRect(),ar=actions.getBoundingClientRect(),rects=buttons.map(b=>b.getBoundingClientRect());
              const rows=new Set(rects.map(r=>Math.round(r.top))).size;
              return{
                count:buttons.length,
                rows,
                inside:rects.every(r=>r.left>=pr.left-1&&r.right<=pr.right+1&&r.left>=-1&&r.right<=width+1),
                panelOverflow:panel.scrollWidth>panel.clientWidth+1,
                actionsOverflow:actions.scrollWidth>actions.clientWidth+1,
                viewportOverflow:document.documentElement.scrollWidth>width+1,
                actionRight:ar.right,
                panelRight:pr.right
              };
            },width);
            ok(`${prefix}-CATEGORY-ACTIONS-WRAP`,info.count>=5&&info.rows>=2&&info.inside);
            ok(`${prefix}-NO-HORIZONTAL-OVERFLOW`,!info.panelOverflow&&!info.actionsOverflow&&!info.viewportOverflow&&info.actionRight<=info.panelRight+1);
            await page.evaluate(()=>document.getElementById('categoryManager').classList.remove('open'));
          };
          (async()=>{
            let browser;const errors=[];
            try{
              const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
              browser=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});
              const mobile=await browser.newContext({viewport:{width:390,height:844},isMobile:true,hasTouch:true,deviceScaleFactor:3});
              const page=await mobile.newPage();
              await page.addInitScript(()=>localStorage.clear());
              page.on('pageerror',e=>errors.push(`mobile: ${e.message}`));
              const response=await page.goto(`${process.env.PUBLIC_URL}?test=1&manager-layout-v2=1`,{waitUntil:'domcontentloaded',timeout:60000});
              await page.waitForFunction(()=>window.__FP_TEST__?.syncCategoryViewport,{timeout:30000});
              if(!response||response.status()!==200)gate['HTTP-STATUS']=`FAILED: ${response?.status()}`;
              await layout(page,'MOBILE',390);

              await page.evaluate(()=>{
                document.querySelector('[data-screen="operations"]').click();
                document.getElementById('filterToggleBtn').click();
                document.getElementById('categoryFilterBtn').click();
              });
              const input=page.locator('#categorySearch');
              await input.focus();
              await page.waitForTimeout(20);
              const armed=await page.evaluate(()=>{
                const m=document.getElementById('categoryFilterModal'),p=m.querySelector('.panel'),i=document.getElementById('categorySearch');
                const pr=p.getBoundingClientRect(),ir=i.getBoundingClientRect();
                return{armed:m.classList.contains('keyboard-arming'),panelTop:pr.top,inputTop:ir.top};
              });
              ok('SEARCH-MODAL-ARMS-BEFORE-KEYBOARD',armed.armed&&armed.panelTop<=1&&armed.inputTop>=0);
              await page.evaluate(()=>window.__FP_TEST__.syncCategoryViewport(420,0,844));
              await page.waitForTimeout(100);
              const lifted=await page.evaluate(()=>{
                const m=document.getElementById('categoryFilterModal'),p=m.querySelector('.panel'),i=document.getElementById('categorySearch');
                const mr=m.getBoundingClientRect(),pr=p.getBoundingClientRect(),ir=i.getBoundingClientRect();
                return{modalTop:mr.top,modalBottom:mr.bottom,panelTop:pr.top,panelBottom:pr.bottom,inputTop:ir.top,inputBottom:ir.bottom};
              });
              ok('SEARCH-MODAL-LIFTS-TO-VISIBLE-TOP',lifted.modalTop>=-1&&lifted.modalBottom<=421&&lifted.panelTop>=-1&&lifted.panelBottom<=421);
              ok('SEARCH-INPUT-ABOVE-KEYBOARD',lifted.inputTop>=0&&lifted.inputBottom<=416);
              await input.fill('ъ');
              await page.evaluate(()=>window.__FP_TEST__.syncCategoryViewport(420,0,844));
              await page.waitForTimeout(80);
              const empty=await page.evaluate(()=>{const i=document.getElementById('categorySearch').getBoundingClientRect();return{top:i.top,bottom:i.bottom,focused:document.activeElement===document.getElementById('categorySearch')}});
              ok('EMPTY-SEARCH-STAYS-ABOVE-KEYBOARD',empty.top>=0&&empty.bottom<=416&&empty.focused);
              await mobile.close();

              const desktop=await browser.newContext({viewport:{width:1720,height:966}});
              const dp=await desktop.newPage();
              await dp.addInitScript(()=>localStorage.clear());
              dp.on('pageerror',e=>errors.push(`desktop: ${e.message}`));
              await dp.goto(`${process.env.PUBLIC_URL}?test=1&manager-layout-desktop-v2=1`,{waitUntil:'domcontentloaded',timeout:60000});
              await dp.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2,{timeout:30000});
              await layout(dp,'DESKTOP',1720);
              await desktop.close();
              gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'NONE';
            }catch(e){gate['BROWSER-ERROR']=e.stack||e.message;gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'FAILED'}finally{
              if(browser)await browser.close();
              const required=['PUBLIC-RUNTIME-MATCH','MOBILE-EXPENSE-TYPE-EXPLICIT','MOBILE-INCOME-TYPE-EXPLICIT','MOBILE-ACTIVE-TAB-VISIBLE','MOBILE-CATEGORY-ACTIONS-WRAP','MOBILE-NO-HORIZONTAL-OVERFLOW','DESKTOP-EXPENSE-TYPE-EXPLICIT','DESKTOP-INCOME-TYPE-EXPLICIT','DESKTOP-CATEGORY-ACTIONS-WRAP','DESKTOP-NO-HORIZONTAL-OVERFLOW','SEARCH-MODAL-ARMS-BEFORE-KEYBOARD','SEARCH-MODAL-LIFTS-TO-VISIBLE-TOP','SEARCH-INPUT-ABOVE-KEYBOARD','EMPTY-SEARCH-STAYS-ABOVE-KEYBOARD'];
              gate['PACKAGE-CLOSURE']=required.every(k=>gate[k]==='VERIFIED')&&gate['PAGE-JAVASCRIPT-ERRORS']==='NONE'?'VERIFIED':'FAILED';
              fs.writeFileSync('verification/category-manager-layout-keyboard-v2-gate.txt',Object.entries(gate).map(([k,v])=>`${k}: ${v}`).join('\n')+'\n');
              console.log(fs.readFileSync('verification/category-manager-layout-keyboard-v2-gate.txt','utf8'));
            }
          })();
          NODE
      - name: Record evidence and remove workflow
        if: always()
        run: |
          cp verification/category-manager-layout-keyboard-v2-gate.txt /tmp/gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/gate.txt verification/category-manager-layout-keyboard-v2-gate.txt
          rm -f .github/workflows/verify-category-manager-layout-keyboard-v2.yml
          git add verification/category-manager-layout-keyboard-v2-gate.txt .github/workflows/verify-category-manager-layout-keyboard-v2.yml
          git commit -m "Record category manager layout and keyboard gate [skip ci]"
          git push origin HEAD:main
