name: Operation Row Visual Verification

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/operation-row-visual-verification.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6

      - name: Install browser driver
        run: npm install --no-save playwright-core@1.53.2

      - name: Verify published operation rows
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright-core');
          const baseUrl = process.env.PUBLIC_URL;
          const url = `${baseUrl}?operation-visual=${process.env.GITHUB_SHA}`;
          const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
          const gate = {
            'PUBLIC-URL': baseUrl,
            'HTTP-LOAD': 'FAILED',
            'HTTP-STATUS': 'NOT VERIFIED',
            'FINAL-ADDRESS': 'NOT VERIFIED',
            'OPERATION-ICONS-REMOVED': 'NOT VERIFIED',
            'OPERATION-ROW-STRUCTURE': 'NOT VERIFIED',
            'INCOME-TEXT-SUBDUED': 'NOT VERIFIED',
            'EXPENSE-TEXT-SUBDUED': 'NOT VERIFIED',
            'OPERATION-DETAIL-OPEN': 'NOT VERIFIED',
            'DEBT-BOTTOM-SPACING': 'NOT VERIFIED',
            'PAGE-JAVASCRIPT-ERRORS': 'NOT VERIFIED',
            'VERIFIED-COMMIT': process.env.GITHUB_SHA,
          };

          (async()=>{
            let source = '';
            let status = 0;
            for (let attempt = 0; attempt < 60; attempt++) {
              try {
                const response = await fetch(url, { cache: 'no-store', redirect: 'follow' });
                status = response.status;
                source = await response.text();
                if (response.ok && source.includes('Calm operation rows and standard debt spacing') && !source.includes('op-icon')) break;
              } catch {}
              await sleep(5000);
            }
            gate['HTTP-STATUS'] = String(status || 0);
            gate['HTTP-LOAD'] = status >= 200 && status < 400 && source.includes('Calm operation rows and standard debt spacing') ? 'SUCCEEDED' : 'FAILED';

            const candidates = ['/usr/bin/google-chrome', '/usr/bin/google-chrome-stable', '/usr/bin/chromium', '/usr/bin/chromium-browser'];
            const executablePath = candidates.find(candidate => fs.existsSync(candidate));
            const errors = [];
            let browser;
            try {
              browser = await chromium.launch({ headless: true, executablePath, args: ['--no-sandbox'] });
              const page = await browser.newPage({ viewport: { width: 390, height: 844 } });
              page.on('pageerror', error => errors.push(error.message));
              const response = await page.goto(url, { waitUntil: 'networkidle', timeout: 60000 });
              gate['FINAL-ADDRESS'] = page.url();
              gate['HTTP-STATUS'] = String(response?.status() || status || 0);
              gate['HTTP-LOAD'] = response?.ok() ? 'SUCCEEDED' : 'FAILED';
              gate['OPERATION-ICONS-REMOVED'] = await page.locator('.op-icon').count() === 0 ? 'VERIFIED' : 'FAILED';
              gate['OPERATION-ROW-STRUCTURE'] = await page.locator('.operation').evaluateAll(rows => rows.length > 0 && rows.every(row => row.children.length === 2 && (row.classList.contains('income') || row.classList.contains('expense')))) ? 'VERIFIED' : 'FAILED';
              gate['INCOME-TEXT-SUBDUED'] = await page.evaluate(() => {
                const text = document.querySelector('.operation.income .op-title');
                const reference = document.querySelector('.positive');
                return !!text && !!reference && getComputedStyle(text).color !== getComputedStyle(reference).color;
              }) ? 'VERIFIED' : 'FAILED';
              gate['EXPENSE-TEXT-SUBDUED'] = await page.evaluate(() => {
                const text = document.querySelector('.operation.expense .op-title');
                const reference = document.querySelector('.negative');
                return !!text && !!reference && getComputedStyle(text).color !== getComputedStyle(reference).color;
              }) ? 'VERIFIED' : 'FAILED';
              await page.locator('.operation').first().click();
              gate['OPERATION-DETAIL-OPEN'] = await page.locator('#operationDetail').evaluate(element => element.classList.contains('open')) ? 'VERIFIED' : 'FAILED';
              gate['DEBT-BOTTOM-SPACING'] = await page.locator('.debts').evaluate(element => getComputedStyle(element).marginBottom === '9px') ? 'VERIFIED' : 'FAILED';
              gate['PAGE-JAVASCRIPT-ERRORS'] = errors.length ? `FAILED: ${errors.join(' | ')}` : 'NONE';
            } catch (error) {
              gate['BROWSER-ERROR'] = error.stack || error.message;
              gate['PAGE-JAVASCRIPT-ERRORS'] = errors.length ? `FAILED: ${errors.join(' | ')}` : 'NOT VERIFIED';
            } finally {
              if (browser) await browser.close();
              const lines = Object.entries(gate).map(([key, value]) => `${key}: ${value}`);
              fs.writeFileSync('verification/operation-row-visual-gate.txt', lines.join('\n') + '\n');
              console.log(lines.join('\n'));
            }
          })().catch(error => { console.error(error); process.exitCode = 1; });
          NODE

      - name: Record evidence
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git add verification/operation-row-visual-gate.txt
          git commit -m "Record operation row visual gate [skip ci]"
          git push origin HEAD:main
