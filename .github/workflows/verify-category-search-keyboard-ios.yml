name: Verify iPhone category search keyboard visibility

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-category-search-keyboard-ios.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Wait for exact published runtime
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_SHA256: a7b74be41068eb73db9df81de2f1f96f00c69021039f769eeec9d19c6b3456cb
        run: |
          status=0
          actual=""
          for i in $(seq 1 72); do
            status=$(curl -L -sS -o /tmp/public-index.html -w '%{http_code}' "${PUBLIC_URL}?category-keyboard=152fab41&attempt=$i&ts=$(date +%s)" || true)
            actual=$(sha256sum /tmp/public-index.html 2>/dev/null | awk '{print $1}')
            [ "$status" = "200" ] && [ "$actual" = "$EXPECTED_SHA256" ] && break
            sleep 5
          done
          echo "HTTP_STATUS=$status" >> "$GITHUB_ENV"
          echo "PUBLIC_SHA=$actual" >> "$GITHUB_ENV"
      - name: Install browser driver
        run: npm install --no-save playwright-core@1.53.2
      - name: Run iPhone-sized keyboard scenario
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_SHA256: a7b74be41068eb73db9df81de2f1f96f00c69021039f769eeec9d19c6b3456cb
          RUNTIME_COMMIT: 152fab417f19ac5e1b95a58dea09c581f7741918
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs=require('fs');
          const {chromium}=require('playwright-core');
          const gate={
            'PUBLIC-URL':process.env.PUBLIC_URL,
            'HTTP-STATUS':process.env.HTTP_STATUS||'0',
            'PUBLIC-RUNTIME-MATCH':process.env.PUBLIC_SHA===process.env.EXPECTED_SHA256?'VERIFIED':'FAILED',
            'IPHONE14-VIEWPORT':'390x844',
            'ENLARGED-TEXT':'FAILED',
            'CATEGORY-MODAL-VISUAL-VIEWPORT-BOUND':'FAILED',
            'SEARCH-INPUT-ABOVE-KEYBOARD':'FAILED',
            'EMPTY-RESULT-DOES-NOT-MOVE-INPUT':'FAILED',
            'SEARCH-REMAINS-FOCUSED':'FAILED',
            'EMPTY-RESULT-MESSAGE-VISIBLE':'FAILED',
            'VALID-RESULT-RESTORES-LIST':'FAILED',
            'VISUAL-VIEWPORT-RESTORES':'FAILED',
            'PAGE-JAVASCRIPT-ERRORS':'FAILED',
            'PACKAGE-CLOSURE':'FAILED',
            'VERIFIED-RUNTIME-COMMIT':process.env.RUNTIME_COMMIT
          };
          const ok=(k,v)=>gate[k]=v?'VERIFIED':'FAILED';
          (async()=>{
            let browser;const errors=[];
            try{
              const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
              browser=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});
              const context=await browser.newContext({viewport:{width:390,height:844},isMobile:true,hasTouch:true,deviceScaleFactor:3});
              const page=await context.newPage();
              await page.addInitScript(()=>localStorage.clear());
              page.on('pageerror',e=>errors.push(e.message));
              const response=await page.goto(`${process.env.PUBLIC_URL}?test=1&category-keyboard-gate=1`,{waitUntil:'domcontentloaded',timeout:60000});
              await page.waitForFunction(()=>window.__FP_TEST__?.syncCategoryViewport,{timeout:30000});
              if(!response||response.status()!==200)gate['HTTP-STATUS']=`FAILED: ${response?.status()}`;

              await page.evaluate(()=>document.documentElement.style.fontSize='20px');
              ok('ENLARGED-TEXT',(await page.evaluate(()=>parseFloat(getComputedStyle(document.documentElement).fontSize)))===20);
              await page.locator('[data-screen="operations"]').click();
              await page.locator('#filterToggleBtn').click();
              await page.locator('#categoryFilterBtn').click();
              const input=page.locator('#categorySearch');
              await input.focus();
              await page.evaluate(()=>window.__FP_TEST__.syncCategoryViewport(420,0,844));
              await page.waitForTimeout(50);
              const before=await input.boundingBox();
              await input.fill('ъ');
              await page.waitForTimeout(100);
              const after=await input.boundingBox();
              const geometry=await page.evaluate(()=>{
                const modal=document.getElementById('categoryFilterModal');
                const panel=modal.querySelector('.panel');
                const search=document.getElementById('categorySearch');
                const mr=modal.getBoundingClientRect(),pr=panel.getBoundingClientRect(),sr=search.getBoundingClientRect();
                return{modalTop:mr.top,modalBottom:mr.bottom,panelTop:pr.top,panelBottom:pr.bottom,searchTop:sr.top,searchBottom:sr.bottom,keyboard:modal.classList.contains('keyboard-visible'),focused:document.activeElement===search};
              });
              ok('CATEGORY-MODAL-VISUAL-VIEWPORT-BOUND',geometry.keyboard&&geometry.modalTop>=-1&&geometry.modalBottom<=421&&geometry.panelTop>=-1&&geometry.panelBottom<=421);
              ok('SEARCH-INPUT-ABOVE-KEYBOARD',geometry.searchTop>=0&&geometry.searchBottom<=416);
              ok('EMPTY-RESULT-DOES-NOT-MOVE-INPUT',before&&after&&Math.abs(before.y-after.y)<=2&&after.y+after.height<=416);
              ok('SEARCH-REMAINS-FOCUSED',geometry.focused);
              const emptyText=await page.locator('#categoryChecks').innerText();
              ok('EMPTY-RESULT-MESSAGE-VISIBLE',emptyText.includes('нет')&&await page.locator('#categoryChecks').isVisible());

              await input.fill('про');
              await page.waitForTimeout(80);
              const restoredCount=await page.locator('[data-filter-category]').count();
              const restoredBox=await input.boundingBox();
              ok('VALID-RESULT-RESTORES-LIST',restoredCount>=1&&restoredBox&&restoredBox.y+restoredBox.height<=416);

              await page.evaluate(()=>window.__FP_TEST__.syncCategoryViewport(844,0,844));
              await page.waitForTimeout(50);
              const restoredViewport=await page.evaluate(()=>{
                const m=document.getElementById('categoryFilterModal'),r=m.getBoundingClientRect();
                return{bottom:r.bottom,keyboard:m.classList.contains('keyboard-visible')};
              });
              ok('VISUAL-VIEWPORT-RESTORES',!restoredViewport.keyboard&&restoredViewport.bottom>=843&&restoredViewport.bottom<=845);
              gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'NONE';
              await context.close();
            }catch(e){gate['BROWSER-ERROR']=e.stack||e.message;gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'FAILED'}finally{
              if(browser)await browser.close();
              const required=['PUBLIC-RUNTIME-MATCH','ENLARGED-TEXT','CATEGORY-MODAL-VISUAL-VIEWPORT-BOUND','SEARCH-INPUT-ABOVE-KEYBOARD','EMPTY-RESULT-DOES-NOT-MOVE-INPUT','SEARCH-REMAINS-FOCUSED','EMPTY-RESULT-MESSAGE-VISIBLE','VALID-RESULT-RESTORES-LIST','VISUAL-VIEWPORT-RESTORES'];
              gate['PACKAGE-CLOSURE']=required.every(k=>gate[k]==='VERIFIED')&&gate['PAGE-JAVASCRIPT-ERRORS']==='NONE'?'VERIFIED':'FAILED';
              fs.writeFileSync('verification/category-search-keyboard-ios-gate.txt',Object.entries(gate).map(([k,v])=>`${k}: ${v}`).join('\n')+'\n');
              console.log(fs.readFileSync('verification/category-search-keyboard-ios-gate.txt','utf8'));
            }
          })();
          NODE
      - name: Record evidence and remove workflow
        if: always()
        run: |
          cp verification/category-search-keyboard-ios-gate.txt /tmp/gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/gate.txt verification/category-search-keyboard-ios-gate.txt
          rm -f .github/workflows/verify-category-search-keyboard-ios.yml
          git add verification/category-search-keyboard-ios-gate.txt .github/workflows/verify-category-search-keyboard-ios.yml
          git commit -m "Record iPhone category search keyboard gate [skip ci]"
          git push origin HEAD:main
# trigger
