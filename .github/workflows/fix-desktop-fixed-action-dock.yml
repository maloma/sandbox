name: Fix desktop fixed action dock

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-desktop-fixed-action-dock.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Remove desktop flow override
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '''@media (min-width:700px){
  .app{min-height:auto;padding-bottom:calc(var(--nav) + 16px + env(safe-area-inset-bottom))}
  main{padding-bottom:0}
  .action-dock{position:static;left:auto;right:auto;bottom:auto;transform:none;width:auto;padding:8px 12px 8px;background:none}
}'''
          if old not in text:
              raise SystemExit('Expected desktop flow override not found')
          text = text.replace(old, '', 1)
          marker = '<!-- Layout: fixed-action-dock-all-viewports -->'
          if marker not in text:
              text = text.replace('</body>', marker + '\n</body>', 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit canonical runtime change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Keep action buttons fixed on desktop"
          git push origin HEAD:main
