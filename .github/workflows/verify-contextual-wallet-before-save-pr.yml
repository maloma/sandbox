name: Verify contextual wallet warning before Save from PR

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  verify:
    if: startsWith(github.event.pull_request.head.ref, 'agent/verify-contextual-wallet-before-save')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install browser verifier
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Verify published runtime
        run: node .github/scripts/verify-contextual-wallet-before-save-public.cjs
      - name: Commit final public gate to PR branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add verification/contextual-wallet-before-save-final-gate.txt
          git commit -m 'Verify contextual wallet warning publicly'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
