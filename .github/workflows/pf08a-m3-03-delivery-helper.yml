name: PF-08A M3-03 One-Time Delivery Helper

on:
  pull_request:
    branches: [main]
    paths:
      - tools/pf08a-m3-03-bootstrap.mjs
      - tools/.m3-03-payload/**
      - .github/workflows/pf08a-m3-03-bootstrap.yml

permissions:
  contents: write

concurrency:
  group: pf08a-m3-03-delivery-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  materialize-verify-push:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/pf08a-m3-03-payment-attention'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Materialize existing bounded package
        run: node tools/pf08a-m3-03-bootstrap.mjs

      - name: Check syntax
        run: |
          for file in \
            familypilot-obligations.js familypilot-obligations-ui-v2.js \
            familypilot-payment-attention.js familypilot-payment-attention-ui.js \
            familypilot-debts.js familypilot-debts-ui.js \
            familypilot-savings-goals.js familypilot-savings-goals-ui.js \
            familypilot-wallet-management.js familypilot-wallet-management-ui.js \
            familypilot-wallet-transfers.js familypilot-wallet-transfers-ui.js \
            tools/pf08a-m3-01-finalize-runtime-artifacts.mjs \
            tools/pf08a-m3-03-domain-test.cjs \
            tools/pf08a-m3-03-verify-integration.mjs \
            tools/pf08a-m3-03-browser-smoke.mjs; do
            node --check "$file"
          done

      - name: Run domain tests
        run: |
          node tools/pf08a-m3-01-domain-test.cjs
          node tools/pf08a-m3-03-domain-test.cjs
          node tools/pf08a-m2-01-domain-test.cjs
          node tools/pf08a-m4-01-domain-test.cjs
          node tools/pf08a-wf01-domain-test.cjs
          node tools/pf08a-wf02-domain-test.cjs

      - name: Build deterministic runtime
        run: |
          node tools/pf08a-m3-01-correct-today-payment-time.mjs
          node tools/pf08a-m3-01-correct-browser-test-api.mjs
          node tools/pf08a-m3-01-finalize-runtime-artifacts.mjs

      - name: Verify integration contracts
        run: |
          node tools/pf08a-m3-01-verify-plan-obligations.mjs
          node tools/pf08a-m3-03-verify-integration.mjs
          node tools/pf08a-m2-01-verify-debt-integration.mjs
          node tools/pf08a-m4-01-verify-integration.mjs
          node tools/pf08a-wf01-verify-integration.mjs
          node tools/pf08a-wf02-verify-integration.mjs

      - name: Run browser regressions
        run: |
          node tools/pf08a-a3-01-browser-smoke.mjs
          node tools/pf08a-priv01-browser-smoke.mjs
          node tools/pf08a-m3-01-browser-smoke.mjs
          node tools/pf08a-m3-03-browser-smoke.mjs
          node tools/pf08a-m2-01-browser-smoke.mjs
          node tools/pf08a-m4-01-browser-smoke.mjs
          node tools/pf08a-wf01-browser-smoke.mjs
          node tools/pf08a-wf02-browser-smoke.mjs

      - name: Commit verified package to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Generate verified M3-03 payment attention package"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
