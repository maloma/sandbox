name: PF-08A FamilyPilot Trusted Public Gate

on:
  pull_request:
    branches: [main]
    paths:
      - tools/pf08a-m3-03-public-browser-smoke.mjs
      - docs/execution-batches/PF-08A-M3-03-PAYMENT-ATTENTION/Public_Verification.md
      - docs/execution-batches/PF-08A-M3-03-PAYMENT-ATTENTION/Checkpoint_Ledger.md
      - .github/workflows/pf08a-m3-01-trusted-public-gate.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-public-package:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Verify published M3-03 FamilyPilot package
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_MAIN_M303: cbb6651e53d61b5552598f32159f36fe6e1ec82d
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          node tools/pf08a-m3-03-public-browser-smoke.mjs > /tmp/m3-03-public.log 2>&1
          status=$?
          cat /tmp/m3-03-public.log
          if [ "$status" -ne 0 ]; then
            {
              echo '### M3-03 public verification failure'
              echo
              echo 'The published-package verifier reported:'
              echo
              echo '```text'
              tail -n 120 /tmp/m3-03-public.log
              echo '```'
            } > /tmp/m3-03-public-comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/m3-03-public-comment.md
            exit "$status"
          fi
