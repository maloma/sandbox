name: PF-08A FamilyPilot Trusted Public Gate

on:
  pull_request:
    branches: [main]
    paths:
      - tools/pf08a-wf02-public-browser-smoke.mjs
      - docs/execution-batches/PF-08A-WF02-BASE-CURRENCY-WALLET-TRANSFERS/Public_Verification.md
      - docs/execution-batches/PF-08A-WF02-BASE-CURRENCY-WALLET-TRANSFERS/Checkpoint_Ledger.md
      - .github/workflows/pf08a-m3-01-trusted-public-gate.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-public-package:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Verify published WF-02 FamilyPilot package
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_MAIN_WF02: 4a20cf720314a9d4fe6b8e410d22aa26411c78e1
        run: node tools/pf08a-wf02-public-browser-smoke.mjs
