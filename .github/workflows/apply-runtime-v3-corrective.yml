name: Apply FamilyPilot runtime v3 corrective patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-runtime-v3-corrective.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - name: Apply corrective patch
        run: python runtime-v3-corrective.py
      - name: Validate corrected behavior contracts
        run: |
          python <<'PY'
          from pathlib import Path
          import re
          s=Path('runtime-source.html').read_text(encoding='utf-8')
          required=["renderQuickCategories(kind,o?.categoryId||$('categoryInput').value)","const mode=categoryFilterContext==='analytics'?analyticsMode:opsTypeFilter","data-cat-quick","data-cat-merge","Разархивировать"]
          for marker in required:
            if marker not in s: raise SystemExit(f'missing {marker}')
          scripts=re.findall(r'<script>(.*?)</script>',s,re.S)
          Path('/tmp/runtime.js').write_text(scripts[-1],encoding='utf-8')
          PY
          node --check /tmp/runtime.js
      - name: Build deterministic standalone runtime
        run: |
          python <<'PY'
          from pathlib import Path
          import gzip,base64,hashlib
          html=Path('runtime-source.html').read_bytes()
          payload=base64.b64encode(gzip.compress(html,compresslevel=9,mtime=0)).decode('ascii')
          wrapper=f'''<!doctype html>
          <html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="cache-control" content="no-store"><meta name="theme-color" content="#071824"><title>FamilyPilot</title><style>html,body{{margin:0;min-height:100%;background:#071824}}</style></head><body><script>
          (async()=>{{const b="{payload}",a=Uint8Array.from(atob(b),c=>c.charCodeAt(0)),s=new Blob([a]).stream().pipeThrough(new DecompressionStream('gzip')),h=await new Response(s).text();document.open();document.write(h);document.close()}})().catch(e=>{{document.body.textContent='Ошибка загрузки FamilyPilot';console.error(e)}});
          </script></body></html>'''
          wrapper='\n'.join(line.strip() for line in wrapper.splitlines())
          Path('index.html').write_text(wrapper,encoding='utf-8')
          Path('verification/runtime-v3-corrective-sha.txt').write_text(f'SOURCE-SHA256: {hashlib.sha256(html).hexdigest()}\nINDEX-SHA256: {hashlib.sha256(wrapper.encode()).hexdigest()}\n',encoding='utf-8')
          PY
      - name: Commit corrected runtime and clean staging
        run: |
          rm -f runtime-source.html runtime-v3-corrective.py .github/workflows/apply-runtime-v3-corrective.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html verification/runtime-v3-corrective-sha.txt runtime-source.html runtime-v3-corrective.py .github/workflows/apply-runtime-v3-corrective.yml
          git commit -m "Correct FamilyPilot quick categories filters and category manager"
          git push origin HEAD:main
