name: Apply contextual wallet warning on PR sync

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/contextual-wallet-before-save'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply bounded correction
        run: |
          python3 .github/scripts/contextual-wallet-before-save.py
          node --check /tmp/familypilot-runtime.js
      - name: Commit correction to PR branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html src/familypilot.html verification/contextual-wallet-before-save-source-gate.txt verification/contextual-wallet-before-save-sha.txt
          git commit -m 'Show non-default wallet only before saving an operation'
          git push
