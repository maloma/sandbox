name: PF-08A M3-06 Current Public Regression

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/pf08a-m3-06-current-public-regression.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-current-public-mobile-ux:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Quiet exact-head checkout
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          git fetch -q --depth=1 origin "${HEAD_SHA}"
          git checkout -q --detach FETCH_HEAD

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Re-verify current published mobile UX
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_MAIN_M306: a6f7702936d55c3cbf94a780b9f49158629659ba
        run: node tools/pf08a-m3-06-public-browser-smoke.mjs
