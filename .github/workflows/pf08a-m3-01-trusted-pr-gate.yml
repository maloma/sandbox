name: PF-08A FamilyPilot Trusted PR Gate

on:
  pull_request:
    branches: [main]
    paths:
      - src/familypilot.html
      - index.html
      - familypilot-scope.js
      - familypilot-obligations.js
      - familypilot-obligations-ui-v2.js
      - familypilot-debts.js
      - familypilot-debts-ui.js
      - familypilot-savings-goals.js
      - familypilot-savings-goals-ui.js
      - familypilot-wallet-management.js
      - familypilot-wallet-management-ui.js
      - familypilot-wallet-transfers.js
      - familypilot-wallet-transfers-ui.js
      - tools/pf08a-m3-01-apply-plan-obligations.mjs
      - tools/pf08a-m3-01-correct-today-payment-time.mjs
      - tools/pf08a-m3-01-correct-browser-test-api.mjs
      - tools/pf08a-m3-01-finalize-runtime-artifacts.mjs
      - tools/pf08a-m3-01-verify-plan-obligations.mjs
      - tools/pf08a-m3-01-domain-test.cjs
      - tools/pf08a-m3-01-browser-smoke.mjs
      - tools/pf08a-m2-01-domain-test.cjs
      - tools/pf08a-m2-01-verify-debt-integration.mjs
      - tools/pf08a-m2-01-browser-smoke.mjs
      - tools/pf08a-m4-01-domain-test.cjs
      - tools/pf08a-m4-01-verify-integration.mjs
      - tools/pf08a-m4-01-browser-smoke.mjs
      - tools/pf08a-wf01-domain-test.cjs
      - tools/pf08a-wf01-verify-integration.mjs
      - tools/pf08a-wf01-browser-smoke.mjs
      - tools/pf08a-wf02-domain-test.cjs
      - tools/pf08a-wf02-verify-integration.mjs
      - tools/pf08a-wf02-browser-smoke.mjs
      - .github/workflows/pf08a-m3-01-plan-obligations.yml
      - .github/workflows/pf08a-m3-01-trusted-pr-gate.yml
      - docs/execution-batches/PF-08A-WF02-BASE-CURRENCY-WALLET-TRANSFERS/**

permissions:
  contents: read

concurrency:
  group: pf08a-family-trusted-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  verify-exact-head:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Check syntax
        run: |
          for file in \
            familypilot-obligations.js familypilot-obligations-ui-v2.js \
            familypilot-debts.js familypilot-debts-ui.js \
            familypilot-savings-goals.js familypilot-savings-goals-ui.js \
            familypilot-wallet-management.js familypilot-wallet-management-ui.js \
            familypilot-wallet-transfers.js familypilot-wallet-transfers-ui.js \
            tools/pf08a-m3-01-apply-plan-obligations.mjs tools/pf08a-m3-01-correct-today-payment-time.mjs \
            tools/pf08a-m3-01-correct-browser-test-api.mjs tools/pf08a-m3-01-finalize-runtime-artifacts.mjs \
            tools/pf08a-m3-01-verify-plan-obligations.mjs tools/pf08a-m3-01-domain-test.cjs tools/pf08a-m3-01-browser-smoke.mjs \
            tools/pf08a-m2-01-domain-test.cjs tools/pf08a-m2-01-verify-debt-integration.mjs tools/pf08a-m2-01-browser-smoke.mjs \
            tools/pf08a-m4-01-domain-test.cjs tools/pf08a-m4-01-verify-integration.mjs tools/pf08a-m4-01-browser-smoke.mjs \
            tools/pf08a-wf01-domain-test.cjs tools/pf08a-wf01-verify-integration.mjs tools/pf08a-wf01-browser-smoke.mjs \
            tools/pf08a-wf02-domain-test.cjs tools/pf08a-wf02-verify-integration.mjs tools/pf08a-wf02-browser-smoke.mjs; do node --check "$file"; done

      - name: Run domain tests
        run: |
          node tools/pf08a-m3-01-domain-test.cjs
          node tools/pf08a-m2-01-domain-test.cjs
          node tools/pf08a-m4-01-domain-test.cjs
          node tools/pf08a-wf01-domain-test.cjs
          node tools/pf08a-wf02-domain-test.cjs

      - name: Recreate deterministic runtime
        run: |
          if ! grep -Fq 'plan-obligations-foundation-v1' src/familypilot.html; then node tools/pf08a-m3-01-apply-plan-obligations.mjs; fi
          node tools/pf08a-m3-01-correct-today-payment-time.mjs
          node tools/pf08a-m3-01-correct-browser-test-api.mjs
          node tools/pf08a-m3-01-finalize-runtime-artifacts.mjs

      - name: Require generated artifacts committed
        run: git diff --exit-code -- src/familypilot.html index.html

      - name: Verify integration contracts
        run: |
          node tools/pf08a-m3-01-verify-plan-obligations.mjs
          node tools/pf08a-m2-01-verify-debt-integration.mjs
          node tools/pf08a-m4-01-verify-integration.mjs
          node tools/pf08a-wf01-verify-integration.mjs
          node tools/pf08a-wf02-verify-integration.mjs

      - name: Browser regression — Analytics
        run: node tools/pf08a-a3-01-browser-smoke.mjs

      - name: Browser regression — Privacy
        run: node tools/pf08a-priv01-browser-smoke.mjs

      - name: Browser regression — Obligations
        run: node tools/pf08a-m3-01-browser-smoke.mjs

      - name: Browser regression — Debts
        run: node tools/pf08a-m2-01-browser-smoke.mjs

      - name: Browser regression — Savings
        run: node tools/pf08a-m4-01-browser-smoke.mjs

      - name: Browser regression — Wallet management
        run: node tools/pf08a-wf01-browser-smoke.mjs

      - name: Browser regression — Wallet transfers
        shell: bash
        run: |
          set +e
          node tools/pf08a-wf02-browser-smoke.mjs 2>&1 | tee /tmp/pf08a-wf02-browser.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: WF-02 bootstrap assertion — test API readiness
        if: failure()
        run: |
          if grep -Fq 'WF-02 test API did not become ready' /tmp/pf08a-wf02-browser.log; then exit 1; fi

      - name: WF-02 bootstrap assertion — package marker
        if: failure()
        run: |
          if grep -Fq 'WF-02 marker missing' /tmp/pf08a-wf02-browser.log; then exit 1; fi

      - name: WF-02 bootstrap assertion — transfer action
        if: failure()
        run: |
          if grep -Fq 'Transfer action missing' /tmp/pf08a-wf02-browser.log; then exit 1; fi

      - name: WF-02 fixture assertion — navigation
        if: failure()
        run: |
          if grep -Fq 'Navigation changed' /tmp/pf08a-wf02-browser.log; then exit 1; fi

      - name: WF-02 fixture assertion — baseline wallets
        if: failure()
        run: |
          if grep -Fq 'Baseline wallets missing' /tmp/pf08a-wf02-browser.log; then exit 1; fi

      - name: WF-02 fixture assertion — shared wallet creation
        if: failure()
        run: |
          if grep -Fq 'Shared wallet fixture failed' /tmp/pf08a-wf02-browser.log; then exit 1; fi

      - name: WF-02 assertion — creation and access validation
        if: failure()
        run: |
          if grep -Eq 'Included-to-included|Canonical TransferEvent|Linked movement|Operations projection|Movement roles|Same wallet accepted|Zero amount accepted|Martin private wallet fixture|Inaccessible personal wallet accepted|Transfer modal did not open|Inaccessible wallet leaked' /tmp/pf08a-wf02-browser.log; then exit 1; fi

      - name: WF-02 assertion — Capital and correction
        if: failure()
        run: |
          if grep -Eq 'Included-to-excluded|Personal transfer inflow|Transfer correction|Stable transfer ID|Movement IDs changed|Operation projection ID changed|Correction history missing|Correction left stale|Reload normalization' /tmp/pf08a-wf02-browser.log; then exit 1; fi

      - name: WF-02 assertion — Operations and detail UI
        if: failure()
        run: |
          if grep -Eq 'Transfer rows missing|Corrected route not explained|Transfer detail did not open|Transfer detail route incorrect|Correction history not visible' /tmp/pf08a-wf02-browser.log; then exit 1; fi

      - name: WF-02 assertion — privacy and regressions
        if: failure()
        run: |
          if grep -Eq 'Private Anna route leaked|Income/Expense totals changed|Prior module API regressed|Runtime exceptions' /tmp/pf08a-wf02-browser.log; then exit 1; fi

      - name: WF-02 assertion — unknown
        if: failure()
        run: |
          if grep -Eq 'WF-02 test API did not become ready|WF-02 marker missing|Transfer action missing|Navigation changed|Baseline wallets missing|Shared wallet fixture failed|Included-to-included|Canonical TransferEvent|Linked movement|Operations projection|Movement roles|Same wallet accepted|Zero amount accepted|Martin private wallet fixture|Inaccessible personal wallet accepted|Transfer modal did not open|Inaccessible wallet leaked|Included-to-excluded|Personal transfer inflow|Transfer correction|Stable transfer ID|Movement IDs changed|Operation projection ID changed|Correction history missing|Correction left stale|Reload normalization|Transfer rows missing|Corrected route not explained|Transfer detail did not open|Transfer detail route incorrect|Correction history not visible|Private Anna route leaked|Income/Expense totals changed|Prior module API regressed|Runtime exceptions' /tmp/pf08a-wf02-browser.log; then exit 0; fi
          exit 1
