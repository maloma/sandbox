name: Assemble Operations foundation runtime

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/assemble-operations-foundation.yml

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assemble and verify canonical index
        run: |
          cat build_payload/fp_chunk_*.txt > /tmp/index.html
          echo "bf64855fbddde4b7dde75eacb0068e13762154d93c4c544b551b2ca3977e2c0a  /tmp/index.html" | sha256sum -c -
          mv /tmp/index.html index.html
      - name: Commit canonical runtime and remove staging
        run: |
          rm -rf build_payload
          rm -f .github/workflows/assemble-operations-foundation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html build_payload .github/workflows/assemble-operations-foundation.yml
          git commit -m "Implement Operations foundation module"
          git push origin HEAD:main
