name: Verify FamilyPilot filters analytics and category lifecycle

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-family-filter-analytics-v3.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Wait for exact published runtime
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_SHA256: bcc82d776e29b6d81db759415e62593c80c805f7efd0e919304a1f73d2258de0
        run: |
          mkdir -p verification
          status=0
          actual=""
          for i in $(seq 1 72); do
            status=$(curl -L -sS -o /tmp/public-index.html -w '%{http_code}' "${PUBLIC_URL}?v3=90869932&attempt=$i&ts=$(date +%s)" || true)
            actual=$(sha256sum /tmp/public-index.html 2>/dev/null | awk '{print $1}')
            [ "$status" = "200" ] && [ "$actual" = "$EXPECTED_SHA256" ] && break
            sleep 5
          done
          echo "HTTP_STATUS=$status" >> "$GITHUB_ENV"
          echo "PUBLIC_SHA=$actual" >> "$GITHUB_ENV"
      - name: Install browser driver
        run: npm install --no-save playwright-core@1.53.2
      - name: Run mobile and desktop scenarios
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_SHA256: bcc82d776e29b6d81db759415e62593c80c805f7efd0e919304a1f73d2258de0
          RUNTIME_COMMIT: 90869932e2228932c310787869f407ea77d80385
        run: |
          node <<'NODE'
          const fs=require('fs');
          const {chromium}=require('playwright-core');
          const gate={
            'PUBLIC-URL':process.env.PUBLIC_URL,
            'HTTP-STATUS':process.env.HTTP_STATUS||'0',
            'PUBLIC-RUNTIME-MATCH':process.env.PUBLIC_SHA===process.env.EXPECTED_SHA256?'VERIFIED':'FAILED',
            'FILTER-COLLAPSED-ONE-ROW':'FAILED',
            'AMOUNT-FIELDS-IP14-NO-OVERLAP':'FAILED',
            'RESET-CLEARS-ALL-FILTERS':'FAILED',
            'CATEGORY-LIST-INDEPENDENT-OF-PERIOD-DATA':'FAILED',
            'DOUBLE-TAP-ZOOM-BLOCKED':'FAILED',
            'AMOUNT-FOCUS-SCROLL-GESTURE':'FAILED',
            'QUICK-CATEGORIES-CONFIGURABLE':'FAILED',
            'QUICK-CATEGORIES-MAX-FIVE':'FAILED',
            'QUICK-CATEGORIES-HORIZONTAL-SCROLL':'FAILED',
            'CAPITAL-DEBT-INFORMATION':'FAILED',
            'ANALYTICS-TYPE-FILTER':'FAILED',
            'ANALYTICS-CATEGORY-FILTER':'FAILED',
            'ANALYTICS-TEXT-SEARCH':'FAILED',
            'ANALYTICS-DEFAULT-AMOUNT-SORT':'FAILED',
            'ANALYTICS-DATE-SORT':'FAILED',
            'ANALYTICS-SAME-NAME-BOTH-KINDS':'FAILED',
            'CATEGORY-ARCHIVE-EXPLAINED':'FAILED',
            'CATEGORY-UNARCHIVE-VISIBLE':'FAILED',
            'CATEGORY-MERGE-MOVES-OPERATIONS':'FAILED',
            'CATEGORY-MERGE-ARCHIVES-SOURCE':'FAILED',
            'CATEGORY-MERGE-AUDIT-BATCH':'FAILED',
            'DESKTOP-FILTER-COLLAPSE':'FAILED',
            'PAGE-JAVASCRIPT-ERRORS':'FAILED',
            'VERIFIED-RUNTIME-COMMIT':process.env.RUNTIME_COMMIT
          };
          const ok=(k,v)=>gate[k]=v?'VERIFIED':'FAILED';
          const within=(b,w)=>b&&b.x>=-0.5&&b.x+b.width<=w+0.5;
          (async()=>{
            let browser;const errors=[];
            try{
              const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
              browser=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});
              const ctx=await browser.newContext({viewport:{width:390,height:844},isMobile:true,hasTouch:true});
              const page=await ctx.newPage();
              await page.addInitScript(()=>localStorage.clear());
              page.on('pageerror',e=>errors.push(e.message));
              const response=await page.goto(`${process.env.PUBLIC_URL}?test=1&v3-browser=1`,{waitUntil:'domcontentloaded',timeout:60000});
              await page.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2,{timeout:30000});
              if(!response||response.status()!==200)gate['HTTP-STATUS']=`FAILED: ${response?.status()}`;

              await page.locator('[data-screen="operations"]').click();
              ok('FILTER-COLLAPSED-ONE-ROW',await page.locator('#operationsFilterCard').evaluate(el=>el.classList.contains('collapsed'))&&await page.locator('#filterSummaryText').isVisible());
              await page.locator('#filterToggleBtn').click();
              await page.evaluate(()=>document.documentElement.style.fontSize='20px');
              const from=await page.locator('#amountFrom').boundingBox(),to=await page.locator('#amountTo').boundingBox();
              ok('AMOUNT-FIELDS-IP14-NO-OVERLAP',within(from,390)&&within(to,390)&&from.y+from.height<=to.y+0.5);

              await page.evaluate(()=>{const a=window.__FP_TEST__;a.setTypeFilter('expense');a.setCategoryFilter(['cat-exp-food']);a.setAmountFilter(10,100)});
              await page.locator('#resetAllFilters').click();
              ok('RESET-CLEARS-ALL-FILTERS',(await page.locator('#filterSummaryText').innerText())==='Не применён'&&(await page.locator('#amountFrom').inputValue())===''&&(await page.locator('#amountTo').inputValue())===''&&(await page.locator('#categoryFilterTitle').innerText())==='Все категории'&&await page.locator('[data-filter="all"]').evaluate(el=>el.classList.contains('active')));

              await page.evaluate(()=>{localStorage.setItem('familypilot.period.selection.v5',JSON.stringify({home:{range:'year',anchor:new Date(2000,0,1).getTime()},operations:{range:'year',anchor:new Date(2000,0,1).getTime()},analytics:{range:'month',anchor:Date.now()}}))});
              await page.reload({waitUntil:'domcontentloaded'});await page.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2);
              await page.locator('[data-screen="operations"]').click();
              await page.evaluate(()=>window.__FP_TEST__.setCategoryFilter(['cat-exp-food']));
              await page.locator('#filterToggleBtn').click();
              await page.locator('#categoryFilterBtn').click();
              const visibleFood=await page.locator('[data-filter-category="cat-exp-food"]').count()===1;
              const categoryCount=await page.locator('[data-filter-category]').count();
              await page.locator('#clearCategories').click();
              const zero=(await page.locator('#selectedCategoryCount').innerText()).includes('0');
              await page.locator('#applyCategoryFilter').click();
              ok('CATEGORY-LIST-INDEPENDENT-OF-PERIOD-DATA',visibleFood&&categoryCount>=5&&zero&&(await page.locator('#categoryFilterTitle').innerText())==='Все категории');

              ok('DOUBLE-TAP-ZOOM-BLOCKED',await page.evaluate(()=>{const e=new MouseEvent('dblclick',{bubbles:true,cancelable:true});document.body.dispatchEvent(e);return e.defaultPrevented&&getComputedStyle(document.documentElement).touchAction.includes('manipulation')}));

              await page.locator('[data-screen="home"]').click();
              await page.locator('[data-open-entry="expense"]').click();
              const touchScroll=await page.evaluate(()=>{const input=document.getElementById('amountInput'),sheet=input.closest('.sheet');sheet.scrollTop=0;input.focus();const a=new Event('touchstart',{bubbles:true,cancelable:true});Object.defineProperty(a,'touches',{value:[{clientY:600}]});input.dispatchEvent(a);const b=new Event('touchmove',{bubbles:true,cancelable:true});Object.defineProperty(b,'touches',{value:[{clientY:430}]});input.dispatchEvent(b);return document.activeElement!==input&&sheet.scrollTop>0});
              ok('AMOUNT-FOCUS-SCROLL-GESTURE',touchScroll);
              await page.locator('[data-close="entryModal"]').click();

              const quick=await page.evaluate(()=>{const a=window.__FP_TEST__,ids=['cat-exp-food','cat-exp-fuel','cat-exp-cafe','cat-exp-health','cat-exp-other'];const results=ids.map(id=>a.toggleQuickCategory(id));const extra=a.createCategory('expense','Шестая быстрая');const sixth=a.toggleQuickCategory(extra.category.id);return{five:results.every(x=>x.ok),sixth:sixth.ok}});
              await page.locator('[data-open-entry="expense"]').click();
              const quickCount=await page.locator('[data-quick-category]').count();
              const quickOverflow=await page.locator('#quickCategories').evaluate(el=>['auto','scroll'].includes(getComputedStyle(el).overflowX)&&el.scrollWidth>=el.clientWidth);
              ok('QUICK-CATEGORIES-CONFIGURABLE',quick.five&&quickCount===5);
              ok('QUICK-CATEGORIES-MAX-FIVE',!quick.sixth&&quickCount===5);
              ok('QUICK-CATEGORIES-HORIZONTAL-SCROLL',quickOverflow);
              await page.locator('[data-close="entryModal"]').click();

              await page.locator('#capitalInfoBtn').click();
              const capitalText=await page.locator('#capitalInfoContent').innerText();
              ok('CAPITAL-DEBT-INFORMATION',capitalText.includes('Мне должны')&&capitalText.includes('Я верну')&&capitalText.includes('не входят в операционный капитал'));
              await page.locator('[data-close="capitalInfo"]').click();

              const analyticsData=await page.evaluate(()=>{const a=window.__FP_TEST__,inc=a.createCategory('income','3D'),exp=a.createCategory('expense','3D'),now=Date.now();a.createOperation({id:'a-exp-big',kind:'expense',amount:300,categoryId:exp.category.id,note:'ремонт машины',occurredAt:now-30000});a.createOperation({id:'a-exp-small',kind:'expense',amount:100,categoryId:exp.category.id,note:'деталь машины',occurredAt:now-10000});a.createOperation({id:'a-inc',kind:'income',amount:500,categoryId:inc.category.id,note:'продажа 3d печати',occurredAt:now-20000});return{inc:inc.category.id,exp:exp.category.id}});
              await page.locator('#analyticsBtn').click();
              await page.evaluate(id=>{const a=window.__FP_TEST__;a.setAnalyticsMode('expense');a.setAnalyticsCategories([id]);a.setAnalyticsSearch('ремонт')},analyticsData.exp);
              ok('ANALYTICS-TYPE-FILTER',(await page.locator('[data-analytics-mode="expense"]').evaluate(el=>el.classList.contains('active')))&&await page.locator('#analyticsOperations [data-op-id="a-exp-big"]').count()===1&&await page.locator('#analyticsOperations [data-op-id="a-inc"]').count()===0);
              ok('ANALYTICS-CATEGORY-FILTER',(await page.locator('#analyticsCategoryTitle').innerText()).includes('1'));
              ok('ANALYTICS-TEXT-SEARCH',await page.locator('#analyticsOperations [data-op-id="a-exp-big"]').count()===1&&await page.locator('#analyticsOperations [data-op-id="a-exp-small"]').count()===0);
              await page.evaluate(()=>window.__FP_TEST__.setAnalyticsSearch(''));
              const amountOrder=await page.locator('#analyticsOperations [data-op-id]').evaluateAll(els=>els.map(e=>e.dataset.opId));
              ok('ANALYTICS-DEFAULT-AMOUNT-SORT',amountOrder[0]==='a-exp-big'&&amountOrder[1]==='a-exp-small'&&(await page.locator('#analyticsSortBtn').innerText()).includes('сумме'));
              await page.locator('#analyticsSortBtn').click();
              const dateOrder=await page.locator('#analyticsOperations [data-op-id]').evaluateAll(els=>els.map(e=>e.dataset.opId));
              ok('ANALYTICS-DATE-SORT',dateOrder[0]==='a-exp-small'&&dateOrder[1]==='a-exp-big'&&(await page.locator('#analyticsSortBtn').innerText()).includes('дате'));
              await page.evaluate(ids=>{const a=window.__FP_TEST__;a.setAnalyticsMode('all');a.setAnalyticsCategories(ids);a.setAnalyticsSearch('')},[analyticsData.exp,analyticsData.inc]);
              await page.locator('#analyticsCategoryFilterBtn').click();
              await page.locator('#categorySearch').fill('3D');
              const sameNameRows=await page.locator('[data-filter-category]').count();
              const sameText=await page.locator('#categoryChecks').innerText();
              ok('ANALYTICS-SAME-NAME-BOTH-KINDS',sameNameRows===2&&sameText.includes('Приход')&&sameText.includes('Расход'));
              await page.locator('[data-close="categoryFilterModal"]').click();

              await page.locator('[data-screen="more"]').click();
              await page.locator('#openCategoryManager').click();
              const help=await page.locator('.manager-help').innerText();
              ok('CATEGORY-ARCHIVE-EXPLAINED',help.includes('скрывается из выбора')&&help.includes('Разархивировать'));
              const mergeData=await page.evaluate(()=>{const a=window.__FP_TEST__,target=a.createCategory('expense','Категория А'),source=a.createCategory('expense','Категория Б'),id1=a.createOperation({id:'merge-1',kind:'expense',amount:11,categoryId:source.category.id}),id2=a.createOperation({id:'merge-2',kind:'expense',amount:22,categoryId:source.category.id}),result=a.mergeCategory(source.category.id,target.category.id);return{source:source.category.id,target:target.category.id,result}});
              const mergeState=await page.evaluate(({source,target})=>{const s=window.__FP_TEST__.getState(),src=s.categories.find(c=>c.id===source),ops=s.operations.filter(o=>['merge-1','merge-2'].includes(o.id)),revs=ops.map(o=>o.revisions.at(-1));return{archived:!!src.archivedAt,moved:ops.every(o=>o.categoryId===target),audit:revs.every(r=>r.source==='category_merge'&&r.batchId&&r.changes.length===1&&r.changes[0].field==='categoryId')&&new Set(revs.map(r=>r.batchId)).size===1}},mergeData);
              ok('CATEGORY-MERGE-MOVES-OPERATIONS',mergeData.result.ok&&mergeData.result.count===2&&mergeState.moved);
              ok('CATEGORY-MERGE-ARCHIVES-SOURCE',mergeState.archived);
              ok('CATEGORY-MERGE-AUDIT-BATCH',mergeState.audit);
              await page.evaluate(()=>{document.getElementById('categoryManager').classList.remove('open');window.__FP_TEST__.renderAll()});
              await page.locator('#openCategoryManager').click();
              await page.locator('[data-cat-kind="expense"]').click();
              const archivedItem=page.locator('.category-item',{hasText:'Категория Б'});
              ok('CATEGORY-UNARCHIVE-VISIBLE',await archivedItem.count()===1&&(await archivedItem.innerText()).includes('В архиве')&&await archivedItem.locator('[data-cat-archive]').innerText()==='Разархивировать');
              await page.locator('[data-close="categoryManager"]').click();

              const desktop=await browser.newContext({viewport:{width:1720,height:966}});const dp=await desktop.newPage();await dp.addInitScript(()=>localStorage.clear());dp.on('pageerror',e=>errors.push(e.message));await dp.goto(`${process.env.PUBLIC_URL}?test=1&desktop-v3=1`,{waitUntil:'domcontentloaded'});await dp.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2);await dp.locator('[data-screen="operations"]').click();ok('DESKTOP-FILTER-COLLAPSE',await dp.locator('#operationsFilterCard').evaluate(el=>el.classList.contains('collapsed')));await desktop.close();
              gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'NONE';
              await ctx.close();
            }catch(e){gate['BROWSER-ERROR']=e.stack||e.message;gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'FAILED'}finally{
              if(browser)await browser.close();
              fs.writeFileSync('verification/family-filter-analytics-v3-gate.txt',Object.entries(gate).map(([k,v])=>`${k}: ${v}`).join('\n')+'\n');
              console.log(fs.readFileSync('verification/family-filter-analytics-v3-gate.txt','utf8'));
            }
          })();
          NODE
      - name: Record public evidence
        if: always()
        run: |
          cp verification/family-filter-analytics-v3-gate.txt /tmp/gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/gate.txt verification/family-filter-analytics-v3-gate.txt
          git add verification/family-filter-analytics-v3-gate.txt
          git diff --cached --quiet && exit 0
          git commit -m "Record FamilyPilot filter and analytics public gate [skip ci]"
          git push origin HEAD:main
