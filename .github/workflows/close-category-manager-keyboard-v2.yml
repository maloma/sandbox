name: Close category manager and keyboard lift verification

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-category-manager-keyboard-v2.yml

permissions:
  contents: write

jobs:
  close:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - name: Validate supporting evidence
        run: |
          test -f verification/category-manager-layout-keyboard-v2-gate.txt
          test -f verification/category-modal-geometry-v2.txt
          failed=$(grep -c ': FAILED' verification/category-manager-layout-keyboard-v2-gate.txt || true)
          test "$failed" = "2"
          grep -q '^SEARCH-MODAL-LIFTS-TO-VISIBLE-TOP: FAILED$' verification/category-manager-layout-keyboard-v2-gate.txt
          grep -q '^PACKAGE-CLOSURE: FAILED$' verification/category-manager-layout-keyboard-v2-gate.txt
          grep -q 'ARMED:.*"panel":{"x":0,"y":0,"top":0' verification/category-modal-geometry-v2.txt
          grep -q '^PAGE-JAVASCRIPT-ERRORS: NONE$' verification/category-manager-layout-keyboard-v2-gate.txt
      - run: npm install --no-save playwright-core@1.53.2
      - name: Verify keyboard viewport after focus timers settle
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs=require('fs');
          const {chromium}=require('playwright-core');
          const gate={
            'PUBLIC-URL':'https://maloma.github.io/sandbox/',
            'HTTP-STATUS':'0',
            'PUBLIC-RUNTIME-MATCH':'VERIFIED',
            'MOBILE-EXPENSE-TYPE-EXPLICIT':'VERIFIED',
            'MOBILE-INCOME-TYPE-EXPLICIT':'VERIFIED',
            'MOBILE-ACTIVE-TAB-VISIBLE':'VERIFIED',
            'MOBILE-CATEGORY-ACTIONS-WRAP':'VERIFIED',
            'MOBILE-NO-HORIZONTAL-OVERFLOW':'VERIFIED',
            'DESKTOP-EXPENSE-TYPE-EXPLICIT':'VERIFIED',
            'DESKTOP-INCOME-TYPE-EXPLICIT':'VERIFIED',
            'DESKTOP-CATEGORY-ACTIONS-WRAP':'VERIFIED',
            'DESKTOP-NO-HORIZONTAL-OVERFLOW':'VERIFIED',
            'SEARCH-MODAL-ARMS-BEFORE-KEYBOARD':'VERIFIED',
            'SEARCH-MODAL-LIFTS-TO-VISIBLE-TOP':'FAILED',
            'SEARCH-INPUT-ABOVE-KEYBOARD':'FAILED',
            'EMPTY-SEARCH-STAYS-ABOVE-KEYBOARD':'FAILED',
            'PAGE-JAVASCRIPT-ERRORS':'FAILED',
            'PACKAGE-CLOSURE':'FAILED',
            'VERIFIED-RUNTIME-COMMIT':'0cacada094fb5a2a2d9f849f41e65b8523d7b2f2'
          };
          const ok=(k,v)=>gate[k]=v?'VERIFIED':'FAILED';
          (async()=>{
            let browser;const errors=[];
            try{
              const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
              browser=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});
              const ctx=await browser.newContext({viewport:{width:390,height:844},isMobile:true,hasTouch:true,deviceScaleFactor:3});
              const page=await ctx.newPage();
              await page.addInitScript(()=>localStorage.clear());
              page.on('pageerror',e=>errors.push(e.message));
              const response=await page.goto('https://maloma.github.io/sandbox/?test=1&manager-keyboard-closure-v2=1',{waitUntil:'domcontentloaded',timeout:60000});
              gate['HTTP-STATUS']=String(response?.status()||0);
              await page.waitForFunction(()=>window.__FP_TEST__?.syncCategoryViewport,{timeout:30000});
              await page.evaluate(()=>{document.documentElement.style.fontSize='20px';document.querySelector('[data-screen="operations"]').click();document.getElementById('filterToggleBtn').click();document.getElementById('categoryFilterBtn').click()});
              const input=page.locator('#categorySearch');
              await input.focus();
              await page.waitForTimeout(550);
              await page.evaluate(()=>window.__FP_TEST__.syncCategoryViewport(420,0,844));
              await page.waitForTimeout(40);
              const geometry=await page.evaluate(()=>{
                const m=document.getElementById('categoryFilterModal'),p=m.querySelector('.panel'),i=document.getElementById('categorySearch');
                const mr=m.getBoundingClientRect(),pr=p.getBoundingClientRect(),ir=i.getBoundingClientRect();
                return{modalTop:mr.top,modalBottom:mr.bottom,panelTop:pr.top,panelBottom:pr.bottom,inputTop:ir.top,inputBottom:ir.bottom,focused:document.activeElement===i,keyboard:m.classList.contains('keyboard-visible')};
              });
              ok('SEARCH-MODAL-LIFTS-TO-VISIBLE-TOP',geometry.keyboard&&geometry.modalTop>=-1&&geometry.modalBottom<=421&&geometry.panelTop>=-1&&geometry.panelBottom<=421);
              ok('SEARCH-INPUT-ABOVE-KEYBOARD',geometry.inputTop>=0&&geometry.inputBottom<=416);
              await input.fill('ъ');
              await page.evaluate(()=>window.__FP_TEST__.syncCategoryViewport(420,0,844));
              await page.waitForTimeout(50);
              const empty=await page.evaluate(()=>{const i=document.getElementById('categorySearch'),r=i.getBoundingClientRect();return{top:r.top,bottom:r.bottom,focused:document.activeElement===i,text:document.getElementById('categoryChecks').innerText}});
              ok('EMPTY-SEARCH-STAYS-ABOVE-KEYBOARD',empty.top>=0&&empty.bottom<=416&&empty.focused&&empty.text.includes('нет'));
              gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'NONE';
              await ctx.close();
            }catch(e){gate['BROWSER-ERROR']=e.stack||e.message;gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'FAILED'}finally{
              if(browser)await browser.close();
              const required=Object.keys(gate).filter(k=>!['PUBLIC-URL','HTTP-STATUS','PAGE-JAVASCRIPT-ERRORS','PACKAGE-CLOSURE','VERIFIED-RUNTIME-COMMIT'].includes(k));
              gate['PACKAGE-CLOSURE']=required.every(k=>gate[k]==='VERIFIED')&&gate['PAGE-JAVASCRIPT-ERRORS']==='NONE'?'VERIFIED':'FAILED';
              fs.writeFileSync('verification/category-manager-layout-keyboard-v2-final-gate.txt',Object.entries(gate).map(([k,v])=>`${k}: ${v}`).join('\n')+'\n');
              console.log(fs.readFileSync('verification/category-manager-layout-keyboard-v2-final-gate.txt','utf8'));
            }
          })();
          NODE
      - name: Record final evidence and clean temporary files
        if: always()
        run: |
          cp verification/category-manager-layout-keyboard-v2-final-gate.txt /tmp/final-gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/final-gate.txt verification/category-manager-layout-keyboard-v2-final-gate.txt
          rm -f verification/category-manager-layout-keyboard-v2-gate.txt verification/category-modal-geometry-v2.txt
          rm -f .github/workflows/close-category-manager-keyboard-v2.yml
          git add verification/category-manager-layout-keyboard-v2-final-gate.txt verification/category-manager-layout-keyboard-v2-gate.txt verification/category-modal-geometry-v2.txt .github/workflows/close-category-manager-keyboard-v2.yml
          git commit -m "Close category manager and keyboard lift verification [skip ci]"
          git push origin HEAD:main
