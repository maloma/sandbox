name: Fix category select custom arrow

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-category-select-custom-arrow.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Patch rendered runtime CSS
        run: |
          python <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          old="h=await new Response(s).text();"
          css=""".category-filter{position:relative}.category-filter select{-webkit-appearance:none;appearance:none;padding-right:42px;background-image:none!important}.category-filter::after{content:\"\";position:absolute;right:26px;top:49px;width:7px;height:7px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:rotate(45deg);pointer-events:none;transition:none}"""
          new="h=await new Response(s).text();h=h.replace('</style>',`"+css+"</style>`);"
          if old not in s:
              raise SystemExit('loader marker not found')
          p.write_text(s.replace(old,new,1),encoding='utf-8')
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Use custom stable category select arrow"
          git push origin HEAD:main