name: Final synchronous modal scroll lock verification

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-single-synchronous-modal-scroll-lock.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v6
      - name: Wait for exact public build
        run: |
          expected=fceea77f5e462292eaadbec872e223f1af9452a46f6cdaa6e0e2b2326377bab6
          status=0
          actual=""
          for i in $(seq 1 72); do
            status=$(curl -L -sS -o /tmp/public.html -w '%{http_code}' "https://maloma.github.io/sandbox/?sync-final=$i&ts=$(date +%s)" || true)
            actual=$(sha256sum /tmp/public.html 2>/dev/null | awk '{print $1}')
            [ "$status" = "200" ] && [ "$actual" = "$expected" ] && break
            sleep 5
          done
          echo "HTTP_STATUS=$status" >> "$GITHUB_ENV"
          echo "PUBLIC_SHA=$actual" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA=$expected" >> "$GITHUB_ENV"
      - run: npm install --no-save playwright-core@1.53.2
      - name: Verify public interaction
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs=require('fs');
          const {chromium}=require('playwright-core');
          const g={
            'PUBLIC-URL':'https://maloma.github.io/sandbox/',
            'HTTP-STATUS':process.env.HTTP_STATUS||'0',
            'PUBLIC-RUNTIME-MATCH':process.env.PUBLIC_SHA===process.env.EXPECTED_SHA?'VERIFIED':'FAILED',
            'SINGLE-LOCK-MECHANISM':'FAILED',
            'MOBILE-CATEGORY-LOCK-PRESERVES-VIEW':'FAILED',
            'MOBILE-CATEGORY-BACKGROUND-STABLE':'FAILED',
            'MOBILE-BACKDROP-GESTURE-BLOCKED':'FAILED',
            'MOBILE-CATEGORY-CLOSE-RESTORES-VIEW':'FAILED',
            'MOBILE-ENTRY-LOCK-PRESERVES-VIEW':'FAILED',
            'MOBILE-ENTRY-BACKGROUND-STABLE':'FAILED',
            'MOBILE-FOREGROUND-SHEET-SCROLLABLE':'FAILED',
            'MOBILE-ENTRY-CLOSE-RESTORES-VIEW':'FAILED',
            'DESKTOP-BACKGROUND-LOCK':'FAILED',
            'DESKTOP-BACKGROUND-STABLE':'FAILED',
            'PAGE-JAVASCRIPT-ERRORS':'FAILED',
            'PACKAGE-CLOSURE':'FAILED',
            'VERIFIED-RUNTIME-COMMIT':'850db016822fa83d465e0cac8cac1681953dee3c'
          };
          const set=(k,v)=>g[k]=v?'VERIFIED':'FAILED';
          const near=(a,b,t=2)=>Math.abs(a-b)<=t;
          (async()=>{let browser;const errors=[];try{
            const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
            browser=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});
            const mobile=await browser.newContext({viewport:{width:390,height:844},isMobile:true,hasTouch:true});
            const p=await mobile.newPage();p.on('pageerror',e=>errors.push(e.message));
            await p.goto('https://maloma.github.io/sandbox/?test=1&sync-final-mobile=1',{waitUntil:'domcontentloaded',timeout:60000});
            await p.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2,{timeout:30000});
            set('SINGLE-LOCK-MECHANISM',await p.evaluate(()=>typeof lockBodyNow==='function'&&typeof syncBodyLock==='function'&&typeof backgroundScrollLocked==='undefined'));

            await p.locator('[data-screen="operations"]').click();await p.locator('#filterToggleBtn').click();
            await p.evaluate(()=>{document.body.style.minHeight='3000px';window.scrollTo(0,360)});await p.waitForTimeout(100);
            const cb=await p.evaluate(()=>({y:window.scrollY,app:document.querySelector('.app').getBoundingClientRect().y}));
            await p.evaluate(()=>document.getElementById('categoryFilterBtn').click());await p.waitForFunction(()=>document.body.classList.contains('modal-open'));
            const cl=await p.evaluate(()=>({top:document.body.style.top,pos:getComputedStyle(document.body).position,app:document.querySelector('.app').getBoundingClientRect().y}));
            set('MOBILE-CATEGORY-LOCK-PRESERVES-VIEW',cl.pos==='fixed'&&cl.top===`-${cb.y}px`&&near(cl.app,cb.app));
            await p.mouse.move(385,430);await p.mouse.wheel(0,1200);await p.waitForTimeout(120);
            set('MOBILE-CATEGORY-BACKGROUND-STABLE',near(await p.evaluate(()=>document.querySelector('.app').getBoundingClientRect().y),cl.app));
            set('MOBILE-BACKDROP-GESTURE-BLOCKED',await p.evaluate(()=>{const e=new Event('touchmove',{bubbles:true,cancelable:true});document.getElementById('categoryFilterModal').dispatchEvent(e);return e.defaultPrevented}));
            await p.evaluate(()=>document.querySelector('[data-close="categoryFilterModal"]').click());await p.waitForFunction(()=>!document.body.classList.contains('modal-open'));await p.waitForTimeout(180);
            const cc=await p.evaluate(()=>({y:window.scrollY,app:document.querySelector('.app').getBoundingClientRect().y}));
            set('MOBILE-CATEGORY-CLOSE-RESTORES-VIEW',near(cc.y,cb.y)&&near(cc.app,cb.app));

            await p.locator('[data-screen="home"]').click();await p.evaluate(()=>{document.body.style.minHeight='3000px';window.scrollTo(0,300)});await p.waitForTimeout(100);
            const eb=await p.evaluate(()=>({y:window.scrollY,app:document.querySelector('.app').getBoundingClientRect().y}));
            await p.evaluate(()=>document.querySelector('[data-open-entry="expense"]').click());await p.waitForFunction(()=>document.body.classList.contains('modal-open'));
            const el=await p.evaluate(()=>({top:document.body.style.top,pos:getComputedStyle(document.body).position,app:document.querySelector('.app').getBoundingClientRect().y}));
            set('MOBILE-ENTRY-LOCK-PRESERVES-VIEW',el.pos==='fixed'&&el.top===`-${eb.y}px`&&near(el.app,eb.app));
            await p.mouse.move(385,400);await p.mouse.wheel(0,1000);await p.waitForTimeout(100);
            set('MOBILE-ENTRY-BACKGROUND-STABLE',near(await p.evaluate(()=>document.querySelector('.app').getBoundingClientRect().y),el.app));
            set('MOBILE-FOREGROUND-SHEET-SCROLLABLE',await p.evaluate(()=>{const s=document.querySelector('#entryModal .sheet');const a=s.scrollTop;s.scrollTop=a+120;return s.scrollTop>a||s.scrollHeight<=s.clientHeight}));
            await p.evaluate(()=>document.querySelector('[data-close="entryModal"]').click());await p.waitForFunction(()=>!document.body.classList.contains('modal-open'));await p.waitForTimeout(180);
            const ec=await p.evaluate(()=>({y:window.scrollY,app:document.querySelector('.app').getBoundingClientRect().y}));
            set('MOBILE-ENTRY-CLOSE-RESTORES-VIEW',near(ec.y,eb.y)&&near(ec.app,eb.app));await mobile.close();

            const desktop=await browser.newContext({viewport:{width:1720,height:966}});const d=await desktop.newPage();d.on('pageerror',e=>errors.push(e.message));
            await d.goto('https://maloma.github.io/sandbox/?test=1&sync-final-desktop=1',{waitUntil:'domcontentloaded',timeout:60000});await d.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2);
            await d.locator('[data-screen="operations"]').click();await d.locator('#filterToggleBtn').click();await d.evaluate(()=>{document.body.style.minHeight='3000px';window.scrollTo(0,420)});await d.waitForTimeout(100);
            const db=await d.evaluate(()=>({y:window.scrollY,app:document.querySelector('.app').getBoundingClientRect().y}));await d.evaluate(()=>document.getElementById('categoryFilterBtn').click());await d.waitForFunction(()=>document.body.classList.contains('modal-open'));
            const dl=await d.evaluate(()=>({top:document.body.style.top,pos:getComputedStyle(document.body).position,app:document.querySelector('.app').getBoundingClientRect().y}));set('DESKTOP-BACKGROUND-LOCK',dl.pos==='fixed'&&dl.top===`-${db.y}px`&&near(dl.app,db.app));
            await d.mouse.move(1600,450);await d.mouse.wheel(0,1400);await d.waitForTimeout(100);set('DESKTOP-BACKGROUND-STABLE',near(await d.evaluate(()=>document.querySelector('.app').getBoundingClientRect().y),dl.app));await desktop.close();
            g['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'NONE';
          }catch(e){g['BROWSER-ERROR']=e.stack||e.message;g['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'FAILED'}finally{
            if(browser)await browser.close();const req=['PUBLIC-RUNTIME-MATCH','SINGLE-LOCK-MECHANISM','MOBILE-CATEGORY-LOCK-PRESERVES-VIEW','MOBILE-CATEGORY-BACKGROUND-STABLE','MOBILE-BACKDROP-GESTURE-BLOCKED','MOBILE-CATEGORY-CLOSE-RESTORES-VIEW','MOBILE-ENTRY-LOCK-PRESERVES-VIEW','MOBILE-ENTRY-BACKGROUND-STABLE','MOBILE-FOREGROUND-SHEET-SCROLLABLE','MOBILE-ENTRY-CLOSE-RESTORES-VIEW','DESKTOP-BACKGROUND-LOCK','DESKTOP-BACKGROUND-STABLE'];g['PACKAGE-CLOSURE']=req.every(k=>g[k]==='VERIFIED')&&g['PAGE-JAVASCRIPT-ERRORS']==='NONE'?'VERIFIED':'FAILED';
            fs.writeFileSync('verification/single-synchronous-modal-scroll-lock-gate.txt',Object.entries(g).map(([k,v])=>`${k}: ${v}`).join('\n')+'\n');
          }})();
          NODE
          cat verification/single-synchronous-modal-scroll-lock-gate.txt
      - name: Record evidence
        if: always()
        run: |
          cp verification/single-synchronous-modal-scroll-lock-gate.txt /tmp/gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/gate.txt verification/single-synchronous-modal-scroll-lock-gate.txt
          git add verification/single-synchronous-modal-scroll-lock-gate.txt
          git diff --cached --quiet && exit 0
          git commit -m "Record synchronous modal scroll lock closure [skip ci]"
          git push origin HEAD:main
# trigger
