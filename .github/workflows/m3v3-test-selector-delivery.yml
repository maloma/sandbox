name: Temporary M3-03 Test Selector Migration

on:
  pull_request:
    branches: [main]
    paths:
      - '_delivery/m3v3-test-selector'

permissions:
  contents: write

concurrency:
  group: m3v3-test-selector-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  migrate-test-selector:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          show-progress: false

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Migrate old quick-pay selector to accepted right-side toggle
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path=Path('tools/pf08a-m3-01-browser-smoke.mjs')
          text=path.read_text(encoding='utf-8')
          old='''    // Quick pay from row creates one linked Expense.\n    click(doc.querySelector('[data-m302-quick-pay="'+first.id+'"]'));'''
          new='''    // Right-side quick payment toggle creates one linked Expense.\n    click(doc.querySelector('[data-ux-payment-toggle="'+first.id+'"]'));'''
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one legacy quick-pay selector block')
          path.write_text(text.replace(old,new),encoding='utf-8')
          PY
          rm _delivery/m3v3-test-selector
          node --check tools/pf08a-m3-01-browser-smoke.mjs
          grep -Fq 'Right-side quick payment toggle creates one linked Expense.' tools/pf08a-m3-01-browser-smoke.mjs
          grep -Fq 'data-ux-payment-toggle' tools/pf08a-m3-01-browser-smoke.mjs
          ! grep -Fq 'data-m302-quick-pay="'+first.id tools/pf08a-m3-01-browser-smoke.mjs

      - name: Commit migrated test to feature branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/pf08a-m3-01-browser-smoke.mjs _delivery/m3v3-test-selector
          git commit -m 'Align obligations smoke with right-side payment toggle'
          git push origin "HEAD:${{ github.head_ref }}"
