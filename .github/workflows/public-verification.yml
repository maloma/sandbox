name: Public Pages Verification

on:
  push:
    branches: [main]
    paths:
      - index.html
      - .github/workflows/public-verification.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-pages-verification
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - name: Install browser driver
        run: npm install --no-save playwright-core@1.53.2
      - name: Run rendered public gate
        continue-on-error: true
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright-core');
          const baseUrl = process.env.PUBLIC_URL;
          const url = `${baseUrl}?fixed-dock=${process.env.GITHUB_SHA}`;
          const gate = {
            'PUBLIC-URL': baseUrl,
            'HTTP-LOAD': 'FAILED',
            'HTTP-STATUS': 'NOT VERIFIED',
            'FINAL-ADDRESS': 'NOT VERIFIED',
            'NO-IFRAME': 'NOT VERIFIED',
            'DESKTOP-DOCK-FIXED': 'NOT VERIFIED',
            'DESKTOP-DOCK-SCROLL-STABLE': 'NOT VERIFIED',
            'DESKTOP-DOCK-ABOVE-NAV': 'NOT VERIFIED',
            'DESKTOP-BUTTON-COPY-STACKED': 'NOT VERIFIED',
            'DESKTOP-BUTTON-OVERFLOW': 'NOT VERIFIED',
            'DESKTOP-DARK-CANVAS': 'NOT VERIFIED',
            'MOBILE-DOCK-FIXED': 'NOT VERIFIED',
            'MOBILE-BUTTON-COPY-STACKED': 'NOT VERIFIED',
            'CORE-OPERATIONS-DOM': 'NOT VERIFIED',
            'PAGE-JAVASCRIPT-ERRORS': 'NOT VERIFIED',
            'VERIFIED-COMMIT': process.env.GITHUB_SHA,
          };
          const sleep = ms => new Promise(r => setTimeout(r, ms));
          const stacked = async button => {
            const [title, subtitle] = await Promise.all([
              button.locator('strong').boundingBox(),
              button.locator('small').boundingBox(),
            ]);
            return !!title && !!subtitle && Math.abs(title.x - subtitle.x) <= 2 && title.y + title.height <= subtitle.y + 1;
          };
          (async()=>{
            let browser;
            const errors = [];
            try {
              const executablePath = ['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
              browser = await chromium.launch({ headless: true, executablePath, args: ['--no-sandbox'] });

              const desktop = await browser.newContext({ viewport: { width: 1720, height: 966 } });
              await desktop.addInitScript(() => localStorage.setItem('familypilot.theme', 'dark'));
              const page = await desktop.newPage();
              page.on('pageerror', error => errors.push(`desktop: ${error.message}`));

              let response;
              for (let attempt = 0; attempt < 48; attempt++) {
                response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
                try {
                  await page.locator('#actionDock .action.income').waitFor({ state: 'visible', timeout: 5000 });
                  await page.locator('[data-screen="operations"]').waitFor({ state: 'visible', timeout: 5000 });
                  break;
                } catch {
                  await sleep(5000);
                }
              }

              const status = response?.status() || 0;
              gate['HTTP-STATUS'] = String(status);
              gate['HTTP-LOAD'] = status >= 200 && status < 400 ? 'SUCCEEDED' : 'FAILED';
              gate['FINAL-ADDRESS'] = page.url();
              gate['NO-IFRAME'] = await page.locator('iframe').count() === 0 ? 'VERIFIED' : 'FAILED';
              gate['CORE-OPERATIONS-DOM'] = await page.locator('#operationsScreen').count() === 1 && await page.locator('#operationsList').count() === 1 ? 'VERIFIED' : 'FAILED';

              await page.locator('[data-screen="operations"]').click();
              await page.evaluate(() => {
                const filler = document.createElement('div');
                filler.id = 'verification-scroll-filler';
                filler.style.height = '2200px';
                document.querySelector('#operationsScreen').appendChild(filler);
              });

              const dock = page.locator('#actionDock');
              const nav = page.locator('.bottom');
              const before = await dock.boundingBox();
              const navBox = await nav.boundingBox();
              const position = await dock.evaluate(el => getComputedStyle(el).position);
              gate['DESKTOP-DOCK-FIXED'] = position === 'fixed' ? 'VERIFIED' : `FAILED: ${position}`;
              gate['DESKTOP-DOCK-ABOVE-NAV'] = before && navBox && Math.round(before.y + before.height) <= Math.round(navBox.y) + 1 ? `VERIFIED: bottom=${Math.round(before.y + before.height)}px, navTop=${Math.round(navBox.y)}px` : 'FAILED';

              await page.evaluate(() => window.scrollTo(0, 1500));
              await page.waitForTimeout(150);
              const after = await dock.boundingBox();
              gate['DESKTOP-DOCK-SCROLL-STABLE'] = before && after && Math.abs(before.y - after.y) <= 1 ? `VERIFIED: y=${Math.round(before.y)}px` : `FAILED: before=${before?.y}, after=${after?.y}`;

              const income = page.locator('.action.income');
              const expense = page.locator('.action.expense');
              gate['DESKTOP-BUTTON-COPY-STACKED'] = await stacked(income) && await stacked(expense) ? 'VERIFIED' : 'FAILED';
              const overflow = await page.locator('.action').evaluateAll(nodes => nodes.some(el => el.scrollWidth > el.clientWidth || el.scrollHeight > el.clientHeight));
              gate['DESKTOP-BUTTON-OVERFLOW'] = overflow ? 'FAILED' : 'NONE';
              const rootBg = await page.evaluate(() => getComputedStyle(document.documentElement).backgroundColor.replace(/\s+/g,''));
              gate['DESKTOP-DARK-CANVAS'] = rootBg === 'rgb(7,24,36)' ? 'VERIFIED' : `FAILED: ${rootBg}`;
              await desktop.close();

              const mobile = await browser.newContext({ viewport: { width: 390, height: 844 }, isMobile: true, hasTouch: true });
              const mobilePage = await mobile.newPage();
              mobilePage.on('pageerror', error => errors.push(`mobile: ${error.message}`));
              await mobilePage.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
              await mobilePage.locator('#actionDock .action.income').waitFor({ state: 'visible', timeout: 30000 });
              const mobilePosition = await mobilePage.locator('#actionDock').evaluate(el => getComputedStyle(el).position);
              gate['MOBILE-DOCK-FIXED'] = mobilePosition === 'fixed' ? 'VERIFIED' : `FAILED: ${mobilePosition}`;
              gate['MOBILE-BUTTON-COPY-STACKED'] = await stacked(mobilePage.locator('.action.income')) && await stacked(mobilePage.locator('.action.expense')) ? 'VERIFIED' : 'FAILED';
              await mobile.close();

              gate['PAGE-JAVASCRIPT-ERRORS'] = errors.length ? `FAILED: ${errors.join(' | ')}` : 'NONE';
            } catch (error) {
              gate['BROWSER-ERROR'] = error.stack || error.message;
              gate['PAGE-JAVASCRIPT-ERRORS'] = errors.length ? `FAILED: ${errors.join(' | ')}` : 'NOT VERIFIED';
            } finally {
              if (browser) await browser.close();
              const lines = Object.entries(gate).map(([key,value]) => `${key}: ${value}`);
              fs.writeFileSync('verification/public-gate.txt', lines.join('\n') + '\n');
              console.log(lines.join('\n'));
            }
          })().catch(error => { console.error(error); process.exitCode = 1; });
          NODE
      - name: Record verification evidence
        if: always()
        run: |
          cp verification/public-gate.txt /tmp/public-gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/public-gate.txt verification/public-gate.txt
          git add verification/public-gate.txt
          git diff --cached --quiet && exit 0
          git commit -m "Record public verification gate [skip ci]"
          git push origin HEAD:main
