name: Public Pages Verification

on:
  push:
    branches: [main]
    paths:
      - index.html
      - .github/workflows/public-verification.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-pages-verification
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6

      - name: Initialize evidence
        run: |
          mkdir -p verification
          {
            printf 'PUBLIC-URL: https://maloma.github.io/sandbox/\n'
            printf 'HTTP-LOAD: FAILED\n'
            printf '404: NOT VERIFIED\n'
            printf 'FINAL-ADDRESS: NOT VERIFIED\n'
            printf 'HOME-PERIOD-TYPE-TAP: NOT VERIFIED\n'
            printf 'ANALYTICS-PERIOD-TYPE-TAP: NOT VERIFIED\n'
            printf 'HOME-PERIOD-LABEL-TAP: NOT VERIFIED\n'
            printf 'ANALYTICS-PERIOD-LABEL-TAP: NOT VERIFIED\n'
            printf 'OPERATIONS-PERIOD-LABEL: NOT VERIFIED\n'
            printf 'OPERATIONS-ARROWS: NOT VERIFIED\n'
            printf 'OPERATIONS-INDEPENDENCE: NOT VERIFIED\n'
            printf 'HOME-ANALYTICS-INDEPENDENCE: NOT VERIFIED\n'
            printf 'FINANCIAL-BALANCE-FILTER-INHERITANCE: NOT VERIFIED\n'
            printf 'NO-IFRAME: NOT VERIFIED\n'
            printf 'PAGE-JAVASCRIPT-ERRORS: NOT VERIFIED\n'
            printf 'VERIFIED-COMMIT: %s\n' "$GITHUB_SHA"
          } > verification/public-gate.txt

      - name: Install browser driver
        continue-on-error: true
        run: |
          set +e
          npm install --no-save playwright-core@1.53.2 > /tmp/npm-install.log 2>&1
          CODE=$?
          printf 'PLAYWRIGHT-INSTALL-EXIT: %s\n' "$CODE" >> verification/public-gate.txt
          exit "$CODE"

      - name: Run public gate
        continue-on-error: true
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
        run: |
          set +e
          node <<'NODE' > /tmp/public-gate.log 2>&1
          const fs = require('fs');
          const { chromium } = require('playwright-core');
          const url = `${process.env.PUBLIC_URL}?verify=${process.env.GITHUB_SHA}`;
          const results = {};
          const errors = [];
          const candidates = ['/usr/bin/google-chrome', '/usr/bin/google-chrome-stable', '/usr/bin/chromium', '/usr/bin/chromium-browser'];
          const executablePath = candidates.find(path => fs.existsSync(path));
          (async()=>{
            let browser;
            try {
              browser = await chromium.launch({ headless: true, executablePath, args: ['--no-sandbox'] });
              const page = await browser.newPage({ viewport: { width: 390, height: 844 } });
              page.on('pageerror', error => errors.push(error.message));
              const response = await page.goto(url, { waitUntil: 'networkidle', timeout: 60000 });
              const status = response?.status() || 0;
              results['HTTP-LOAD'] = status >= 200 && status < 400 ? 'SUCCEEDED' : 'FAILED';
              results['404'] = status === 404 ? 'YES' : 'NO';
              results['HTTP-STATUS'] = String(status);
              results['FINAL-ADDRESS'] = page.url();
              results['NO-IFRAME'] = await page.locator('iframe').count() === 0 ? 'VERIFIED' : 'FAILED';
              const pickerOpen = () => page.locator('#picker').evaluate(el => el.classList.contains('open'));
              await page.locator('[data-range="day"][data-context="home"]').click();
              results['HOME-PERIOD-TYPE-TAP'] = !(await pickerOpen()) ? 'NO PICKER' : 'FAILED';
              const homeLabel = await page.locator('[data-label="home"]').innerText();
              await page.locator('[data-label="home"]').click();
              results['HOME-PERIOD-LABEL-TAP'] = (await pickerOpen()) ? 'PICKER OPENS' : 'FAILED';
              await page.locator('[data-close="picker"]').click();
              await page.locator('#analyticsBtn').click();
              await page.locator('[data-range="week"][data-context="analytics"]').click();
              results['ANALYTICS-PERIOD-TYPE-TAP'] = !(await pickerOpen()) ? 'NO PICKER' : 'FAILED';
              await page.locator('[data-label="analytics"]').click();
              results['ANALYTICS-PERIOD-LABEL-TAP'] = (await pickerOpen()) ? 'PICKER OPENS' : 'FAILED';
              await page.locator('[data-close="picker"]').click();
              await page.locator('#analyticsScreen [data-back]').click();
              results['HOME-ANALYTICS-INDEPENDENCE'] = (await page.locator('[data-label="home"]').innerText()) === homeLabel ? 'VERIFIED' : 'FAILED';
              await page.locator('[data-screen="operations"]').click();
              const opsInitial = await page.locator('[data-label="operations"]').innerText();
              results['OPERATIONS-PERIOD-LABEL'] = opsInitial.trim() ? 'VISIBLE' : 'FAILED';
              const inherited = opsInitial === homeLabel;
              await page.locator('[data-prev="operations"]').click();
              const opsAfter = await page.locator('[data-label="operations"]').innerText();
              results['OPERATIONS-ARROWS'] = opsAfter !== opsInitial ? 'WORKING' : 'FAILED';
              await page.locator('#operationsScreen [data-back]').click();
              const homeAfterOps = await page.locator('[data-label="home"]').innerText();
              results['OPERATIONS-INDEPENDENCE'] = inherited && homeAfterOps === homeLabel ? 'VERIFIED' : 'FAILED';
              await page.locator('[data-open-ops="expense"]').first().click();
              const expenseActive = await page.locator('[data-filter="expense"]').evaluate(el => el.classList.contains('active'));
              const inheritedBalancePeriod = (await page.locator('[data-label="operations"]').innerText()) === homeLabel;
              results['FINANCIAL-BALANCE-FILTER-INHERITANCE'] = expenseActive && inheritedBalancePeriod ? 'VERIFIED' : 'FAILED';
              results['FUTURE-PERIODS-BLOCKED'] = await page.locator('[data-next="operations"]').isDisabled() ? 'VERIFIED' : 'FAILED';
              results['PAGE-JAVASCRIPT-ERRORS'] = errors.length ? `FAILED: ${errors.join(' | ')}` : 'NONE';
            } catch (error) {
              results['BROWSER-ERROR'] = error.stack || error.message;
              results['PAGE-JAVASCRIPT-ERRORS'] = errors.length ? `FAILED: ${errors.join(' | ')}` : 'NOT VERIFIED';
            } finally {
              if (browser) await browser.close();
              for (const [key,value] of Object.entries(results)) console.log(`${key}: ${value}`);
            }
          })().catch(error=>{console.error(error);process.exitCode=1});
          NODE
          cat /tmp/public-gate.log >> verification/public-gate.txt
          exit 0

      - name: Record verification evidence
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git add verification/public-gate.txt
          git commit -m "Record public verification gate [skip ci]"
          git push origin HEAD:main
