name: Apply deterministic FamilyPilot runtime correction

on:
  push:
    paths:
      - '.github/workflows/extract-current-familypilot-source.yml'

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Correct runtime
        run: python3 .github/scripts/correct-operation-first-runtime.py
      - name: Verify JavaScript syntax
        run: node --check /tmp/familypilot-runtime.js
      - name: Commit corrected package
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html src/familypilot.html verification/operation-first-app-shell-source-gate.txt verification/operation-first-app-shell-sha.txt
          git commit -m 'Correct and verify operation-first app shell runtime'
          git push
