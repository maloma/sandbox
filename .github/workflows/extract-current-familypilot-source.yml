name: Apply operation-first FamilyPilot package

on:
  push:
    paths:
      - '.github/workflows/extract-current-familypilot-source.yml'

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Correct static ID validation
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/operation-first-app-shell.cjs')
          text = path.read_text()
          old = "const ids = [...source.matchAll(/\\bid=\"([^\"]+)\"/g)].map(m => m[1]);\nconst duplicateIds = [...new Set(ids.filter((id, index) => ids.indexOf(id) !== index))];"
          new = "const ids = [...source.matchAll(/\\bid=\"([^\"]+)\"/g)].map(m => m[1]);\nconst staticIds = ids.filter(id => !id.includes('${'));\nconst duplicateIds = [...new Set(staticIds.filter((id, index) => staticIds.indexOf(id) !== index))];"
          if old not in text:
              raise SystemExit('Static ID validation anchor not found')
          path.write_text(text.replace(old, new))
          PY
      - name: Apply patch and capture diagnostics
        run: |
          mkdir -p verification
          set +e
          node .github/scripts/operation-first-app-shell.cjs > verification/operation-first-patch-run.log 2>&1
          status=$?
          echo "PATCH-EXIT-CODE: $status" >> verification/operation-first-patch-run.log
          if [ -f /tmp/familypilot-runtime.js ]; then
            node --check /tmp/familypilot-runtime.js >> verification/operation-first-patch-run.log 2>&1
            syntax_status=$?
            echo "RUNTIME-SYNTAX-EXIT-CODE: $syntax_status" >> verification/operation-first-patch-run.log
            if [ $status -eq 0 ] && [ $syntax_status -ne 0 ]; then status=$syntax_status; fi
          fi
          echo "$status" > /tmp/package-status
          exit 0
      - name: Commit outputs and diagnostics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add verification/operation-first-patch-run.log
          [ -f src/familypilot.html ] && git add src/familypilot.html || true
          [ -f verification/operation-first-app-shell-source-gate.txt ] && git add verification/operation-first-app-shell-source-gate.txt || true
          [ -f verification/operation-first-app-shell-sha.txt ] && git add verification/operation-first-app-shell-sha.txt || true
          git add index.html
          git commit -m 'Run operation-first app shell package diagnostics' || exit 0
          git push
      - name: Enforce package success
        run: |
          status=$(cat /tmp/package-status)
          test "$status" = "0"
