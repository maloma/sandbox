name: Apply operation-first FamilyPilot package

on:
  push:
    paths:
      - '.github/workflows/extract-current-familypilot-source.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply operation-first package
        run: |
          node .github/scripts/operation-first-app-shell.cjs
          node --check /tmp/familypilot-runtime.js
      - name: Commit package
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html src/familypilot.html verification/operation-first-app-shell-source-gate.txt verification/operation-first-app-shell-sha.txt
          git commit -m 'Implement operation-first app shell and safe category names'
          git push
