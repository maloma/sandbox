name: Verify GitHub Actions execution

on:
  push:
    paths:
      - '.github/workflows/extract-current-familypilot-source.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write probe
        run: |
          mkdir -p verification
          echo 'ACTIONS-EXECUTION: VERIFIED' > verification/actions-execution-probe.txt
      - name: Commit probe
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add verification/actions-execution-probe.txt
          git commit -m 'Verify GitHub Actions execution' || exit 0
          git push
