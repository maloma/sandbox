name: Fix iPhone amount focus scroll interaction

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-amount-focus-scroll-v3.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - name: Decode and patch runtime
        run: |
          python <<'PY'
          from pathlib import Path
          import re,base64,gzip
          wrapper=Path('index.html').read_text(encoding='utf-8')
          m=re.search(r'const b="([A-Za-z0-9+/=]+)"',wrapper)
          if not m: raise SystemExit('runtime payload not found')
          s=gzip.decompress(base64.b64decode(m.group(1))).decode('utf-8')
          css='.entry-sheet{touch-action:pan-y;-webkit-overflow-scrolling:touch}.entry-sheet input,.entry-sheet textarea,.entry-sheet select{touch-action:pan-y}'
          css2=css+'.entry-sheet.keyboard-assist{padding-bottom:max(45vh,calc(220px + env(safe-area-inset-bottom)))}'
          if css not in s: raise SystemExit('entry sheet css marker missing')
          s=s.replace(css,css2,1)
          old="document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});let amountTouchY=null;$('amountInput').addEventListener('touchstart',e=>{amountTouchY=e.touches[0]?.clientY??null},{passive:true});$('amountInput').addEventListener('touchmove',e=>{if(amountTouchY===null||!e.touches[0])return;const y=e.touches[0].clientY,delta=amountTouchY-y;if(Math.abs(delta)>7){$('amountInput').blur();const sheet=$('amountInput').closest('.sheet');if(sheet)sheet.scrollTop+=delta;amountTouchY=y;e.preventDefault()}},{passive:false});"
          new="document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});const amountEntryInput=$('amountInput'),amountEntrySheet=amountEntryInput.closest('.sheet');let amountTouchY=null,keyboardAssistTimer=0;const keepKeyboardAssist=()=>{clearTimeout(keyboardAssistTimer);amountEntrySheet?.classList.add('keyboard-assist')};const releaseKeyboardAssist=()=>{clearTimeout(keyboardAssistTimer);keyboardAssistTimer=setTimeout(()=>{if(!amountEntrySheet?.contains(document.activeElement))amountEntrySheet?.classList.remove('keyboard-assist')},700)};amountEntryInput.addEventListener('focus',()=>{keepKeyboardAssist();setTimeout(()=>amountEntryInput.scrollIntoView({block:'center',behavior:'smooth'}),120)});amountEntryInput.addEventListener('blur',releaseKeyboardAssist);amountEntryInput.addEventListener('touchstart',e=>{amountTouchY=e.touches[0]?.clientY??null;keepKeyboardAssist()},{passive:true});amountEntryInput.addEventListener('touchmove',e=>{if(amountTouchY===null||!e.touches[0])return;const y=e.touches[0].clientY,delta=amountTouchY-y;if(Math.abs(delta)>6){keepKeyboardAssist();amountEntryInput.blur();if(amountEntrySheet){const limit=Math.max(0,amountEntrySheet.scrollHeight-amountEntrySheet.clientHeight);amountEntrySheet.scrollTop=Math.max(0,Math.min(limit,amountEntrySheet.scrollTop+delta))}amountTouchY=y;e.preventDefault()}},{passive:false});amountEntryInput.addEventListener('touchend',()=>{amountTouchY=null;releaseKeyboardAssist()},{passive:true});"
          if old not in s: raise SystemExit('amount touch handler marker missing')
          s=s.replace(old,new,1)
          Path('/tmp/runtime-source.html').write_text(s,encoding='utf-8')
          PY
      - name: Validate JavaScript
        run: |
          python <<'PY'
          from pathlib import Path
          import re
          s=Path('/tmp/runtime-source.html').read_text(encoding='utf-8')
          for marker in ['keyboard-assist','keepKeyboardAssist','amountEntrySheet.scrollHeight','touchend']:
            if marker not in s: raise SystemExit(f'missing {marker}')
          scripts=re.findall(r'<script>(.*?)</script>',s,re.S)
          Path('/tmp/runtime.js').write_text(scripts[-1],encoding='utf-8')
          PY
          node --check /tmp/runtime.js
      - name: Rebuild deterministic runtime
        run: |
          python <<'PY'
          from pathlib import Path
          import gzip,base64,hashlib
          html=Path('/tmp/runtime-source.html').read_bytes()
          payload=base64.b64encode(gzip.compress(html,compresslevel=9,mtime=0)).decode('ascii')
          wrapper=f'''<!doctype html>
          <html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="cache-control" content="no-store"><meta name="theme-color" content="#071824"><title>FamilyPilot</title><style>html,body{{margin:0;min-height:100%;background:#071824}}</style></head><body><script>
          (async()=>{{const b="{payload}",a=Uint8Array.from(atob(b),c=>c.charCodeAt(0)),s=new Blob([a]).stream().pipeThrough(new DecompressionStream('gzip')),h=await new Response(s).text();document.open();document.write(h);document.close()}})().catch(e=>{{document.body.textContent='Ошибка загрузки FamilyPilot';console.error(e)}});
          </script></body></html>'''
          wrapper='\n'.join(line.strip() for line in wrapper.splitlines())
          Path('index.html').write_text(wrapper,encoding='utf-8')
          Path('verification/runtime-v3-final-sha.txt').write_text(f'SOURCE-SHA256: {hashlib.sha256(html).hexdigest()}\nINDEX-SHA256: {hashlib.sha256(wrapper.encode()).hexdigest()}\n',encoding='utf-8')
          PY
      - name: Commit runtime and remove workflow
        run: |
          rm -f .github/workflows/fix-amount-focus-scroll-v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html verification/runtime-v3-final-sha.txt .github/workflows/fix-amount-focus-scroll-v3.yml
          git commit -m "Fix iPhone amount focus form scrolling"
          git push origin HEAD:main
