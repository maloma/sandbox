name: Extract modal open close source

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/extract-modal-open-close-source.yml

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Decode and extract relevant source
        run: |
          python <<'PY'
          from pathlib import Path
          import re,base64,gzip
          wrapper=Path('index.html').read_text(encoding='utf-8')
          m=re.search(r'const b="([A-Za-z0-9+/=]+)"',wrapper)
          s=gzip.decompress(base64.b64decode(m.group(1))).decode('utf-8')
          lines=[]
          for i,line in enumerate(s.splitlines(),1):
              if 'function open(' in line or 'function close(' in line or 'modal-open' in line or 'backgroundScrollLock' in line or 'syncBackgroundScrollLock' in line:
                  lines.append(f'{i}: {line}')
          Path('verification/modal-open-close-source.txt').write_text('\n'.join(lines)+'\n',encoding='utf-8')
          PY
      - name: Record extract
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add verification/modal-open-close-source.txt
          git commit -m "Record modal open close source extract [skip ci]"
          git push origin HEAD:main
