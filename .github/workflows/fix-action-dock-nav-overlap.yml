name: Fix action dock nav overlap

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-action-dock-nav-overlap.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Patch canonical runtime
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '@media (min-width:700px){\n  .app{min-height:auto;padding-bottom:calc(var(--nav) + 24px + env(safe-area-inset-bottom))}\n  .action-dock{position:static;left:auto;right:auto;bottom:auto;transform:none;width:auto;padding:10px 12px 12px;background:none}\n}',
              '@media (min-width:700px){\n  .app{min-height:auto;padding-bottom:calc(var(--nav) + 16px + env(safe-area-inset-bottom))}\n  main{padding-bottom:0}\n  .action-dock{position:static;left:auto;right:auto;bottom:auto;transform:none;width:auto;padding:8px 12px 8px;background:none}\n}',
              1,
          )
          marker = '<!-- Layout: desktop-dock-clear-of-fixed-nav -->'
          if marker not in text:
              text = text.replace('</body>', marker + '\n</body>', 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit canonical runtime change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Keep desktop action dock above fixed navigation"
          git push origin HEAD:main
