name: Fix global modal background scroll lock

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-global-modal-background-scroll-lock.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - name: Decode and patch runtime
        run: |
          python <<'PY'
          from pathlib import Path
          import re,base64,gzip

          wrapper=Path('index.html').read_text(encoding='utf-8')
          m=re.search(r'const b="([A-Za-z0-9+/=]+)"',wrapper)
          if not m: raise SystemExit('runtime payload not found')
          s=gzip.decompress(base64.b64decode(m.group(1))).decode('utf-8')

          css='''
          html.background-locked,body.background-locked{overflow:hidden!important;overscroll-behavior:none!important}
          body.background-locked{position:fixed!important;left:0!important;right:0!important;width:100%!important;touch-action:none!important}
          .overlay.open,.modal.open{overscroll-behavior:none!important;touch-action:none}
          .overlay.open .panel,.modal.open .sheet{overscroll-behavior:contain;touch-action:pan-y;-webkit-overflow-scrolling:touch}
          '''
          if 'html.background-locked,body.background-locked' not in s:
              if '</style>' not in s: raise SystemExit('style marker missing')
              s=s.replace('</style>',css+'</style>',1)

          js='''
          let backgroundScrollLocked=false;
          let backgroundScrollLockY=0;
          function hasOpenForegroundLayer(){return !!document.querySelector('.overlay.open,.modal.open')}
          function syncBackgroundScrollLock(){
            const shouldLock=hasOpenForegroundLayer();
            if(shouldLock&&!backgroundScrollLocked){
              backgroundScrollLockY=window.scrollY||document.documentElement.scrollTop||0;
              document.documentElement.classList.add('background-locked');
              document.body.classList.add('background-locked');
              document.body.style.top=`-${backgroundScrollLockY}px`;
              backgroundScrollLocked=true;
            }else if(!shouldLock&&backgroundScrollLocked){
              const restoreY=backgroundScrollLockY;
              document.documentElement.classList.remove('background-locked');
              document.body.classList.remove('background-locked');
              document.body.style.top='';
              backgroundScrollLocked=false;
              window.scrollTo(0,restoreY);
            }
          }
          const foregroundLayerObserver=new MutationObserver(syncBackgroundScrollLock);
          document.querySelectorAll('.overlay,.modal').forEach(layer=>foregroundLayerObserver.observe(layer,{attributes:true,attributeFilter:['class']}));
          document.addEventListener('touchmove',event=>{
            const layer=event.target.closest?.('.overlay.open,.modal.open');
            if(!layer)return;
            if(event.target===layer)event.preventDefault();
          },{passive:false,capture:true});
          syncBackgroundScrollLock();
          '''
          if 'function syncBackgroundScrollLock()' not in s:
              marker="document.addEventListener('click',e=>{"
              if marker not in s: raise SystemExit('click handler marker missing')
              s=s.replace(marker,js+marker,1)

          Path('/tmp/runtime-source.html').write_text(s,encoding='utf-8')
          PY
      - name: Validate patched source
        run: |
          python <<'PY'
          from pathlib import Path
          import re
          s=Path('/tmp/runtime-source.html').read_text(encoding='utf-8')
          required=['html.background-locked,body.background-locked','position:fixed!important','function syncBackgroundScrollLock()','foregroundLayerObserver','window.scrollTo(0,restoreY)']
          for marker in required:
            if marker not in s: raise SystemExit(f'missing {marker}')
          scripts=re.findall(r'<script>(.*?)</script>',s,re.S)
          Path('/tmp/runtime.js').write_text(scripts[-1],encoding='utf-8')
          PY
          node --check /tmp/runtime.js
      - name: Build deterministic standalone runtime
        run: |
          python <<'PY'
          from pathlib import Path
          import gzip,base64,hashlib
          html=Path('/tmp/runtime-source.html').read_bytes()
          payload=base64.b64encode(gzip.compress(html,compresslevel=9,mtime=0)).decode('ascii')
          wrapper=f'''<!doctype html>
          <html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="cache-control" content="no-store"><meta name="theme-color" content="#071824"><title>FamilyPilot</title><style>html,body{{margin:0;min-height:100%;background:#071824}}</style></head><body><script>
          (async()=>{{const b="{payload}",a=Uint8Array.from(atob(b),c=>c.charCodeAt(0)),s=new Blob([a]).stream().pipeThrough(new DecompressionStream('gzip')),h=await new Response(s).text();document.open();document.write(h);document.close()}})().catch(e=>{{document.body.textContent='Ошибка загрузки FamilyPilot';console.error(e)}});
          </script></body></html>'''
          wrapper='\n'.join(line.strip() for line in wrapper.splitlines())
          Path('index.html').write_text(wrapper,encoding='utf-8')
          Path('verification/global-modal-scroll-lock-sha.txt').write_text(f'SOURCE-SHA256: {hashlib.sha256(html).hexdigest()}\nINDEX-SHA256: {hashlib.sha256(wrapper.encode()).hexdigest()}\n',encoding='utf-8')
          PY
      - name: Commit runtime and remove workflow
        run: |
          rm -f .github/workflows/fix-global-modal-background-scroll-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html verification/global-modal-scroll-lock-sha.txt .github/workflows/fix-global-modal-background-scroll-lock.yml
          git commit -m "Lock background scrolling behind foreground forms"
          git push origin HEAD:main
