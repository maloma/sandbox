name: Final FamilyPilot filter analytics closure gate

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-family-filter-analytics-v3-closure.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Validate previous comprehensive gate boundary
        run: |
          test -f verification/family-filter-analytics-v3-gate.txt
          failed=$(grep -c ': FAILED' verification/family-filter-analytics-v3-gate.txt || true)
          test "$failed" = "1"
          grep -q '^AMOUNT-FOCUS-SCROLL-GESTURE: FAILED$' verification/family-filter-analytics-v3-gate.txt
          grep -q '^PAGE-JAVASCRIPT-ERRORS: NONE$' verification/family-filter-analytics-v3-gate.txt
      - name: Wait for exact final Pages runtime
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_SHA256: 23683961f0cd266bd984b98d9fb0daf821ba0797a4f565186896ac3aa0990838
        run: |
          status=0
          actual=""
          for i in $(seq 1 72); do
            status=$(curl -L -sS -o /tmp/public-index.html -w '%{http_code}' "${PUBLIC_URL}?closure=f4e9dbb3&attempt=$i&ts=$(date +%s)" || true)
            actual=$(sha256sum /tmp/public-index.html 2>/dev/null | awk '{print $1}')
            [ "$status" = "200" ] && [ "$actual" = "$EXPECTED_SHA256" ] && break
            sleep 5
          done
          echo "HTTP_STATUS=$status" >> "$GITHUB_ENV"
          echo "PUBLIC_SHA=$actual" >> "$GITHUB_ENV"
      - name: Install browser driver
        run: npm install --no-save playwright-core@1.53.2
      - name: Verify final iPhone keyboard and scroll behavior
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_SHA256: 23683961f0cd266bd984b98d9fb0daf821ba0797a4f565186896ac3aa0990838
          RUNTIME_COMMIT: f4e9dbb37e3e7bf3bacd1637e62e5e819bbe7437
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs=require('fs');
          const {chromium}=require('playwright-core');
          const gate={
            'PUBLIC-URL':process.env.PUBLIC_URL,
            'HTTP-STATUS':process.env.HTTP_STATUS||'0',
            'FINAL-PUBLIC-RUNTIME-MATCH':process.env.PUBLIC_SHA===process.env.EXPECTED_SHA256?'VERIFIED':'FAILED',
            'PREVIOUS-COMPREHENSIVE-GATE-BOUNDARY':'VERIFIED',
            'KEYBOARD-ASSIST-SCROLL-SPACE':'FAILED',
            'AMOUNT-FOCUS-SCROLL-GESTURE':'FAILED',
            'COMMENTS-REACHABLE-AFTER-GESTURE':'FAILED',
            'SAVE-REACHABLE-AFTER-GESTURE':'FAILED',
            'DOUBLE-TAP-ZOOM-BLOCKED':'FAILED',
            'PAGE-JAVASCRIPT-ERRORS':'FAILED',
            'PACKAGE-CLOSURE':'FAILED',
            'VERIFIED-RUNTIME-COMMIT':process.env.RUNTIME_COMMIT
          };
          const ok=(k,v)=>gate[k]=v?'VERIFIED':'FAILED';
          (async()=>{
            let browser;const errors=[];
            try{
              const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
              browser=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});
              const ctx=await browser.newContext({viewport:{width:390,height:844},isMobile:true,hasTouch:true});
              const page=await ctx.newPage();
              await page.addInitScript(()=>localStorage.clear());
              page.on('pageerror',e=>errors.push(e.message));
              const response=await page.goto(`${process.env.PUBLIC_URL}?test=1&closure-browser=1`,{waitUntil:'domcontentloaded',timeout:60000});
              await page.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2,{timeout:30000});
              if(!response||response.status()!==200)gate['HTTP-STATUS']=`FAILED: ${response?.status()}`;
              await page.locator('[data-open-entry="expense"]').click();
              await page.locator('#amountInput').focus();
              await page.waitForTimeout(180);
              const assist=await page.evaluate(()=>{const i=document.getElementById('amountInput'),s=i.closest('.sheet');return s.classList.contains('keyboard-assist')&&s.scrollHeight>s.clientHeight});
              ok('KEYBOARD-ASSIST-SCROLL-SPACE',assist);
              const gesture=await page.evaluate(()=>{const input=document.getElementById('amountInput'),sheet=input.closest('.sheet');sheet.scrollTop=0;const start=new Event('touchstart',{bubbles:true,cancelable:true});Object.defineProperty(start,'touches',{value:[{clientY:650}]});input.dispatchEvent(start);const move=new Event('touchmove',{bubbles:true,cancelable:true});Object.defineProperty(move,'touches',{value:[{clientY:410}]});input.dispatchEvent(move);return{blurred:document.activeElement!==input,scrollTop:sheet.scrollTop,assist:sheet.classList.contains('keyboard-assist')}});
              ok('AMOUNT-FOCUS-SCROLL-GESTURE',gesture.blurred&&gesture.scrollTop>0&&gesture.assist);
              await page.locator('#noteInput').scrollIntoViewIfNeeded();
              ok('COMMENTS-REACHABLE-AFTER-GESTURE',await page.locator('#noteInput').isVisible());
              await page.locator('#saveOperationBtn').scrollIntoViewIfNeeded();
              ok('SAVE-REACHABLE-AFTER-GESTURE',await page.locator('#saveOperationBtn').isVisible());
              ok('DOUBLE-TAP-ZOOM-BLOCKED',await page.evaluate(()=>{const e=new MouseEvent('dblclick',{bubbles:true,cancelable:true});document.body.dispatchEvent(e);return e.defaultPrevented&&getComputedStyle(document.documentElement).touchAction.includes('manipulation')}));
              gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'NONE';
              await ctx.close();
            }catch(e){gate['BROWSER-ERROR']=e.stack||e.message;gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'FAILED'}finally{
              if(browser)await browser.close();
              const required=['FINAL-PUBLIC-RUNTIME-MATCH','PREVIOUS-COMPREHENSIVE-GATE-BOUNDARY','KEYBOARD-ASSIST-SCROLL-SPACE','AMOUNT-FOCUS-SCROLL-GESTURE','COMMENTS-REACHABLE-AFTER-GESTURE','SAVE-REACHABLE-AFTER-GESTURE','DOUBLE-TAP-ZOOM-BLOCKED'];
              gate['PACKAGE-CLOSURE']=required.every(k=>gate[k]==='VERIFIED')&&gate['PAGE-JAVASCRIPT-ERRORS']==='NONE'?'VERIFIED':'FAILED';
              fs.writeFileSync('verification/family-filter-analytics-v3-closure-gate.txt',Object.entries(gate).map(([k,v])=>`${k}: ${v}`).join('\n')+'\n');
              console.log(fs.readFileSync('verification/family-filter-analytics-v3-closure-gate.txt','utf8'));
            }
          })();
          NODE
      - name: Record closure evidence
        if: always()
        run: |
          cp verification/family-filter-analytics-v3-closure-gate.txt /tmp/gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/gate.txt verification/family-filter-analytics-v3-closure-gate.txt
          git add verification/family-filter-analytics-v3-closure-gate.txt
          git diff --cached --quiet && exit 0
          git commit -m "Record FamilyPilot filter analytics closure gate [skip ci]"
          git push origin HEAD:main
