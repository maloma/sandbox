name: Cleanup contextual wallet package

on:
  push:
    paths:
      - '.github/workflows/cleanup-contextual-wallet-package.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove temporary execution assets
        run: |
          rm -f \
            .github/workflows/apply-contextual-wallet-warning-from-pr.yml \
            .github/workflows/apply-contextual-wallet-warning-on-sync.yml \
            .github/workflows/apply-contextual-wallet-warning-pr-sync-v2.yml \
            .github/workflows/verify-contextual-wallet-before-save-pr.yml \
            .github/workflows/verify-contextual-wallet-before-save-pr-sync.yml \
            .github/workflows/cleanup-contextual-wallet-package.yml \
            .github/scripts/contextual-wallet-before-save.py \
            .github/scripts/verify-contextual-wallet-before-save-public.cjs \
            verification/contextual-wallet-before-save-request.txt \
            verification/contextual-wallet-before-save-open-pr.txt \
            verification/contextual-wallet-before-save-branch-trigger.txt \
            verification/contextual-wallet-before-save-pr-seed.txt \
            verification/contextual-wallet-before-save-ready.txt \
            verification/contextual-wallet-before-save-final-seed.txt \
            verification/contextual-wallet-before-save-pr-trigger-note.txt \
            verification/contextual-wallet-before-save-start.txt \
            verification/contextual-wallet-before-save-main-anchor.txt \
            verification/contextual-wallet-before-save-boundary.txt \
            verification/contextual-wallet-before-save-anchor-final.txt \
            verification/contextual-wallet-before-save-anchor-final-2.txt \
            verification/contextual-wallet-before-save-anchor-final-3.txt \
            verification/contextual-wallet-before-save-anchor-final-4.txt \
            verification/contextual-wallet-before-save-anchor-final-5.txt \
            verification/contextual-wallet-before-save-anchor-final-6.txt \
            verification/contextual-wallet-before-save-pr-trigger.txt \
            verification/contextual-wallet-before-save-sync-trigger.txt \
            verification/contextual-wallet-before-save-sync-trigger-v2.txt \
            verification/contextual-wallet-before-save-public-verify-trigger.txt \
            verification/contextual-wallet-before-save-public-verify-retry.txt \
            verification/contextual-wallet-before-save-verification.log
      - name: Preserve only authoritative evidence
        run: |
          test -f verification/contextual-wallet-before-save-source-gate.txt
          test -f verification/contextual-wallet-before-save-sha.txt
          test -f verification/contextual-wallet-before-save-final-gate.txt
      - name: Commit cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Close contextual wallet warning package'
          git push
