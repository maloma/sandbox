name: Verify global modal background scroll lock

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-global-modal-background-scroll-lock.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Wait for exact published runtime
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
        run: |
          expected=$(awk '/INDEX-SHA256:/{print $2}' verification/global-modal-scroll-lock-sha.txt)
          status=0
          actual=""
          for i in $(seq 1 72); do
            status=$(curl -L -sS -o /tmp/public-index.html -w '%{http_code}' "${PUBLIC_URL}?scroll-lock=8573e0c0&attempt=$i&ts=$(date +%s)" || true)
            actual=$(sha256sum /tmp/public-index.html 2>/dev/null | awk '{print $1}')
            [ "$status" = "200" ] && [ "$actual" = "$expected" ] && break
            sleep 5
          done
          echo "HTTP_STATUS=$status" >> "$GITHUB_ENV"
          echo "PUBLIC_SHA=$actual" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA=$expected" >> "$GITHUB_ENV"
      - name: Install browser driver
        run: npm install --no-save playwright-core@1.53.2
      - name: Run mobile and desktop scroll-lock gate
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          RUNTIME_COMMIT: 8573e0c0a3e542ad4a88883d9fdf957388b716fd
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs=require('fs');
          const {chromium}=require('playwright-core');
          const gate={
            'PUBLIC-URL':process.env.PUBLIC_URL,
            'HTTP-STATUS':process.env.HTTP_STATUS||'0',
            'PUBLIC-RUNTIME-MATCH':process.env.PUBLIC_SHA===process.env.EXPECTED_SHA?'VERIFIED':'FAILED',
            'MOBILE-CATEGORY-FORM-LOCKS-BACKGROUND':'FAILED',
            'MOBILE-CATEGORY-BACKGROUND-POSITION-STABLE':'FAILED',
            'MOBILE-CATEGORY-CLOSE-RESTORES-SCROLL':'FAILED',
            'MOBILE-ENTRY-FORM-LOCKS-BACKGROUND':'FAILED',
            'MOBILE-FOREGROUND-SHEET-REMAINS-SCROLLABLE':'FAILED',
            'DESKTOP-CATEGORY-FORM-LOCKS-BACKGROUND':'FAILED',
            'DESKTOP-BACKGROUND-WHEEL-BLOCKED':'FAILED',
            'PAGE-JAVASCRIPT-ERRORS':'FAILED',
            'PACKAGE-CLOSURE':'FAILED',
            'VERIFIED-RUNTIME-COMMIT':process.env.RUNTIME_COMMIT
          };
          const ok=(k,v)=>gate[k]=v?'VERIFIED':'FAILED';
          (async()=>{
            let browser;const errors=[];
            try{
              const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
              browser=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});
              const mobile=await browser.newContext({viewport:{width:390,height:844},isMobile:true,hasTouch:true});
              const page=await mobile.newPage();
              await page.addInitScript(()=>localStorage.clear());
              page.on('pageerror',e=>errors.push(e.message));
              await page.goto(`${process.env.PUBLIC_URL}?test=1&scroll-lock-mobile=1`,{waitUntil:'domcontentloaded',timeout:60000});
              await page.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2,{timeout:30000});
              await page.evaluate(()=>{document.body.style.minHeight='2600px';window.scrollTo(0,520)});
              await page.waitForTimeout(50);
              const before=await page.evaluate(()=>window.scrollY);
              await page.locator('[data-screen="operations"]').click();
              await page.locator('#filterToggleBtn').click();
              await page.locator('#categoryFilterBtn').click();
              await page.waitForFunction(()=>document.body.classList.contains('background-locked'));
              const locked=await page.evaluate(()=>({bodyClass:document.body.classList.contains('background-locked'),htmlClass:document.documentElement.classList.contains('background-locked'),position:getComputedStyle(document.body).position,top:document.body.style.top,appY:document.querySelector('.app').getBoundingClientRect().y}));
              ok('MOBILE-CATEGORY-FORM-LOCKS-BACKGROUND',locked.bodyClass&&locked.htmlClass&&locked.position==='fixed'&&locked.top===`-${before}px`);
              const appYBefore=locked.appY;
              await page.mouse.move(380,420);
              await page.mouse.wheel(0,900);
              await page.waitForTimeout(100);
              const appYAfter=await page.evaluate(()=>document.querySelector('.app').getBoundingClientRect().y);
              ok('MOBILE-CATEGORY-BACKGROUND-POSITION-STABLE',Math.abs(appYAfter-appYBefore)<1);
              await page.locator('[data-close="categoryFilterModal"]').click();
              await page.waitForFunction(()=>!document.body.classList.contains('background-locked'));
              const restored=await page.evaluate(()=>window.scrollY);
              ok('MOBILE-CATEGORY-CLOSE-RESTORES-SCROLL',Math.abs(restored-before)<2);

              await page.evaluate(()=>window.scrollTo(0,640));
              const entryBefore=await page.evaluate(()=>window.scrollY);
              await page.locator('[data-screen="home"]').click();
              await page.locator('[data-open-entry="expense"]').click();
              await page.waitForFunction(()=>document.body.classList.contains('background-locked'));
              const entryLocked=await page.evaluate(()=>document.body.classList.contains('background-locked')&&getComputedStyle(document.body).position==='fixed'&&document.body.style.top===`-${window.backgroundScrollLockY||640}px`);
              ok('MOBILE-ENTRY-FORM-LOCKS-BACKGROUND',entryLocked||await page.evaluate(v=>document.body.classList.contains('background-locked')&&document.body.style.top===`-${v}px`,entryBefore));
              const sheetScroll=await page.evaluate(()=>{const s=document.querySelector('#entryModal .sheet');s.scrollTop=0;s.scrollTop=120;return s.scrollTop>0||s.scrollHeight<=s.clientHeight});
              ok('MOBILE-FOREGROUND-SHEET-REMAINS-SCROLLABLE',sheetScroll);
              await page.locator('[data-close="entryModal"]').click();
              await mobile.close();

              const desktop=await browser.newContext({viewport:{width:1720,height:966}});
              const dp=await desktop.newPage();
              dp.on('pageerror',e=>errors.push(e.message));
              await dp.goto(`${process.env.PUBLIC_URL}?test=1&scroll-lock-desktop=1`,{waitUntil:'domcontentloaded',timeout:60000});
              await dp.waitForFunction(()=>window.__FP_TEST__?.getState().schemaVersion===2);
              await dp.evaluate(()=>{document.body.style.minHeight='2600px';window.scrollTo(0,700)});
              await dp.locator('[data-screen="operations"]').click();
              await dp.locator('#filterToggleBtn').click();
              await dp.locator('#categoryFilterBtn').click();
              await dp.waitForFunction(()=>document.body.classList.contains('background-locked'));
              const desktopLock=await dp.evaluate(()=>({locked:document.body.classList.contains('background-locked')&&getComputedStyle(document.body).position==='fixed',y:document.querySelector('.app').getBoundingClientRect().y}));
              ok('DESKTOP-CATEGORY-FORM-LOCKS-BACKGROUND',desktopLock.locked);
              await dp.mouse.move(1600,450);await dp.mouse.wheel(0,1100);await dp.waitForTimeout(100);
              const desktopAfter=await dp.evaluate(()=>document.querySelector('.app').getBoundingClientRect().y);
              ok('DESKTOP-BACKGROUND-WHEEL-BLOCKED',Math.abs(desktopAfter-desktopLock.y)<1);
              await desktop.close();
              gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'NONE';
            }catch(e){gate['BROWSER-ERROR']=e.stack||e.message;gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'FAILED'}finally{
              if(browser)await browser.close();
              const req=['PUBLIC-RUNTIME-MATCH','MOBILE-CATEGORY-FORM-LOCKS-BACKGROUND','MOBILE-CATEGORY-BACKGROUND-POSITION-STABLE','MOBILE-CATEGORY-CLOSE-RESTORES-SCROLL','MOBILE-ENTRY-FORM-LOCKS-BACKGROUND','MOBILE-FOREGROUND-SHEET-REMAINS-SCROLLABLE','DESKTOP-CATEGORY-FORM-LOCKS-BACKGROUND','DESKTOP-BACKGROUND-WHEEL-BLOCKED'];
              gate['PACKAGE-CLOSURE']=req.every(k=>gate[k]==='VERIFIED')&&gate['PAGE-JAVASCRIPT-ERRORS']==='NONE'?'VERIFIED':'FAILED';
              fs.writeFileSync('verification/global-modal-scroll-lock-gate.txt',Object.entries(gate).map(([k,v])=>`${k}: ${v}`).join('\n')+'\n');
              console.log(fs.readFileSync('verification/global-modal-scroll-lock-gate.txt','utf8'));
            }
          })();
          NODE
      - name: Record evidence and remove workflow
        if: always()
        run: |
          cp verification/global-modal-scroll-lock-gate.txt /tmp/gate.txt
          rm -f .github/workflows/verify-global-modal-background-scroll-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/gate.txt verification/global-modal-scroll-lock-gate.txt
          git add verification/global-modal-scroll-lock-gate.txt .github/workflows/verify-global-modal-background-scroll-lock.yml
          git commit -m "Record global modal background scroll lock gate [skip ci]"
          git push origin HEAD:main
