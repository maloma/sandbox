name: Patch Operations UX verifier operation selector

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-ux-verifier-operation-selector.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Limit operation row to active Operations list
        run: |
          python <<'PY'
          from pathlib import Path
          p=Path('.github/workflows/verify-operations-ux-repair.yml')
          s=p.read_text(encoding='utf-8')
          old='page.locator(`[data-op-id="${id}"]`).click()'
          new='page.locator(`#operationsList [data-op-id="${id}"]`).click()'
          if s.count(old)!=2: raise SystemExit(f'expected 2 operation selectors, found {s.count(old)}')
          p.write_text(s.replace(old,new),encoding='utf-8')
          PY
      - name: Commit and clean helper
        run: |
          rm -f .github/workflows/patch-ux-verifier-operation-selector.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/verify-operations-ux-repair.yml .github/workflows/patch-ux-verifier-operation-selector.yml
          git commit -m "Limit Operations UX verifier to active operation list"
          git push origin HEAD:main
# trigger
