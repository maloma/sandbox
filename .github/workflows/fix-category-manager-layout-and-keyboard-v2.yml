name: Fix category manager clarity layout and iPhone keyboard lift

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-category-manager-layout-and-keyboard-v2.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - name: Decode and patch runtime
        run: |
          python <<'PY'
          from pathlib import Path
          import re,base64,gzip

          wrapper=Path('index.html').read_text(encoding='utf-8')
          m=re.search(r'const b="([A-Za-z0-9+/=]+)"',wrapper)
          if not m: raise SystemExit('runtime payload not found')
          s=gzip.decompress(base64.b64decode(m.group(1))).decode('utf-8')

          css='''
          .category-kind-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
          .category-kind-tabs .mini{min-width:0;min-height:44px;font-weight:900}
          .category-kind-tabs .mini.active{color:var(--green);border-color:color-mix(in srgb,var(--green) 62%,var(--line));background:color-mix(in srgb,var(--green) 12%,var(--card2));box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--green) 30%,transparent)}
          #categoryManagerKindHint{display:block;color:var(--muted);font-size:11px;font-weight:750;margin-top:2px}
          #categoryManager .category-item{min-width:0;overflow:hidden}
          #categoryManager .category-item-actions{display:grid!important;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:7px;width:100%;max-width:100%;overflow:visible;margin-top:9px}
          #categoryManager .category-item-actions button{box-sizing:border-box;min-width:0;width:100%;max-width:100%;white-space:normal;overflow-wrap:anywhere;line-height:1.18;padding:9px 8px}
          #categoryFilterModal.keyboard-arming,#categoryFilterModal.keyboard-visible{align-items:flex-start}
          #categoryFilterModal.keyboard-arming .panel,#categoryFilterModal.keyboard-visible .panel{height:var(--category-vv-height,100dvh);max-height:var(--category-vv-height,100dvh);border-radius:0 0 18px 18px}
          @media(max-width:420px){#categoryManager .category-item-actions{grid-template-columns:repeat(2,minmax(0,1fr))}#categoryManager .category-item-actions button{font-size:11px}.category-kind-tabs .mini{font-size:13px}}
          '''
          if '</style>' not in s: raise SystemExit('style marker missing')
          s=s.replace('</style>',css+'</style>',1)

          old_title='<h2>Справочник категорий</h2>'
          new_title='<div><h2 id="categoryManagerTitle">Категории расходов</h2><small id="categoryManagerKindHint">Сейчас показаны категории расходов</small></div>'
          if old_title not in s: raise SystemExit('category manager title marker missing')
          s=s.replace(old_title,new_title,1)

          old_tabs='<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px"><button class="mini" data-cat-kind="expense">Расходы</button><button class="mini" data-cat-kind="income">Приходы</button></div>'
          new_tabs='<div class="category-kind-tabs"><button class="mini" data-cat-kind="expense">Расходы</button><button class="mini" data-cat-kind="income">Приходы</button></div>'
          if old_tabs not in s: raise SystemExit('category kind tabs marker missing')
          s=s.replace(old_tabs,new_tabs,1)

          pattern=r'^function renderCategoryManager\(\)\{.*$'
          replacement="function renderCategoryManager(){$('categoryManagerTitle').textContent=managerKind==='expense'?'Категории расходов':'Категории приходов';$('categoryManagerKindHint').textContent=managerKind==='expense'?'Сейчас показаны категории расходов':'Сейчас показаны категории приходов';document.querySelectorAll('[data-cat-kind]').forEach(b=>b.classList.toggle('active',b.dataset.catKind===managerKind));const quick=new Set(state.config.quickCategoryIds[managerKind]||[]),cats=state.categories.filter(c=>c.kind===managerKind).sort((a,b)=>Number(!!a.archivedAt)-Number(!!b.archivedAt)||a.name.localeCompare(b.name,'ru'));$('categoryManagerList').innerHTML=cats.map(c=>{const count=categoryUseCount(c.id);return`<div class=\"category-item\"><div class=\"category-item-head\"><div><strong>${esc(c.name)}${c.archivedAt?'<span class=\"category-status\">В архиве</span>':''}</strong><div><small>операций: ${count}${quick.has(c.id)?' · быстрая':''}</small></div></div></div><div class=\"category-item-actions\"><button data-cat-rename=\"${c.id}\">Переименовать</button><button data-cat-quick=\"${c.id}\"${c.archivedAt?' disabled':''}>${quick.has(c.id)?'Убрать из быстрых':'В быстрые'}</button><button data-cat-archive=\"${c.id}\">${c.archivedAt?'Разархивировать':'Архивировать'}</button>${!c.archivedAt?`<button data-cat-merge=\"${c.id}\">Слить…</button>`:''}<button data-cat-delete=\"${c.id}\">Удалить</button></div></div>`}).join('')}"
          s,n=re.subn(pattern,lambda _m:replacement,s,count=1,flags=re.M)
          if n!=1: raise SystemExit(f'renderCategoryManager marker count {n}')

          js='''
          const categorySearchInput=$('categorySearch');
          const categoryKeyboardLiftDelays=[0,60,140,260,420];
          function armCategoryKeyboardLift(){
            const modal=$('categoryFilterModal');
            modal.classList.add('keyboard-arming');
            for(const delay of categoryKeyboardLiftDelays){
              setTimeout(()=>{
                syncCategoryVisualViewport();
                if(modal.classList.contains('open')&&document.activeElement===categorySearchInput){
                  categorySearchInput.scrollIntoView({block:'start',inline:'nearest'});
                }
              },delay);
            }
          }
          categorySearchInput.addEventListener('focus',armCategoryKeyboardLift);
          categorySearchInput.addEventListener('pointerdown',()=>{$('categoryFilterModal').classList.add('keyboard-arming')},{passive:true});
          categorySearchInput.addEventListener('blur',()=>setTimeout(()=>{$('categoryFilterModal').classList.remove('keyboard-arming');syncCategoryVisualViewport()},180));
          '''
          marker="document.addEventListener('click',e=>{"
          if marker not in s: raise SystemExit('click handler marker missing')
          s=s.replace(marker,js+marker,1)

          Path('/tmp/runtime-source.html').write_text(s,encoding='utf-8')
          PY
      - name: Validate patched source
        run: |
          python <<'PY'
          from pathlib import Path
          import re
          s=Path('/tmp/runtime-source.html').read_text(encoding='utf-8')
          required=['categoryManagerTitle','categoryManagerKindHint','category-kind-tabs','grid-template-columns:repeat(auto-fit,minmax(128px,1fr))','keyboard-arming','armCategoryKeyboardLift','Категории приходов']
          for marker in required:
            if marker not in s: raise SystemExit(f'missing {marker}')
          scripts=re.findall(r'<script>(.*?)</script>',s,re.S)
          Path('/tmp/runtime.js').write_text(scripts[-1],encoding='utf-8')
          PY
          node --check /tmp/runtime.js
      - name: Build deterministic standalone runtime
        run: |
          python <<'PY'
          from pathlib import Path
          import gzip,base64,hashlib
          html=Path('/tmp/runtime-source.html').read_bytes()
          payload=base64.b64encode(gzip.compress(html,compresslevel=9,mtime=0)).decode('ascii')
          wrapper=f'''<!doctype html>
          <html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="cache-control" content="no-store"><meta name="theme-color" content="#071824"><title>FamilyPilot</title><style>html,body{{margin:0;min-height:100%;background:#071824}}</style></head><body><script>
          (async()=>{{const b="{payload}",a=Uint8Array.from(atob(b),c=>c.charCodeAt(0)),s=new Blob([a]).stream().pipeThrough(new DecompressionStream('gzip')),h=await new Response(s).text();document.open();document.write(h);document.close()}})().catch(e=>{{document.body.textContent='Ошибка загрузки FamilyPilot';console.error(e)}});
          </script></body></html>'''
          wrapper='\n'.join(line.strip() for line in wrapper.splitlines())
          Path('index.html').write_text(wrapper,encoding='utf-8')
          Path('verification/category-manager-keyboard-v2-sha.txt').write_text(f'SOURCE-SHA256: {hashlib.sha256(html).hexdigest()}\nINDEX-SHA256: {hashlib.sha256(wrapper.encode()).hexdigest()}\n',encoding='utf-8')
          PY
      - name: Commit runtime and remove workflow
        run: |
          rm -f .github/workflows/fix-category-manager-layout-and-keyboard-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html verification/category-manager-keyboard-v2-sha.txt .github/workflows/fix-category-manager-layout-and-keyboard-v2.yml
          git commit -m "Clarify category manager and lift search above iPhone keyboard"
          git push origin HEAD:main
