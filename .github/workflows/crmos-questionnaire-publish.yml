name: Publish CRMOS lifecycle questionnaire

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "crmos-questionnaire/**"
      - ".github/workflows/crmos-questionnaire-publish.yml"

permissions:
  contents: read
  issues: write

concurrency:
  group: crmos-questionnaire-publication
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      - name: Create missing questionnaire cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node crmos-questionnaire/seed-questionnaire.mjs
