name: Temporary M3-03 UTF-8 Payload Delivery

on:
  pull_request:
    branches: [main]
    paths:
      - '_delivery/m3v3/**'

permissions:
  contents: write

concurrency:
  group: m3v3-payload-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  materialize-verified-ui:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Decode and verify UTF-8 source
        shell: bash
        run: |
          set -euo pipefail
          base64 -d _delivery/m3v3/familypilot-payment-attention-ui.js.gz.b64 | gzip -d > familypilot-payment-attention-ui.js
          sha256sum -c _delivery/m3v3/familypilot-payment-attention-ui.sha256
          node --check familypilot-payment-attention-ui.js
          node --check tools/pf08a-m3-03-browser-smoke.mjs
          node --check tools/pf08a-m3-03-verify-integration.mjs
          grep -Fq 'planned-payment-attention-v3' familypilot-payment-attention-ui.js
          grep -Fq '<label for="obligationReminderLeadDays">Напомнить заранее</label>' familypilot-payment-attention-ui.js
          grep -Fq 'font-weight:800' familypilot-payment-attention-ui.js

      - name: Commit verified source to the feature branch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _delivery/m3v3
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add familypilot-payment-attention-ui.js tools/pf08a-m3-03-browser-smoke.mjs tools/pf08a-m3-03-verify-integration.mjs _delivery/m3v3
          git commit -m 'Materialize verified M3-03 interaction source'
          git push origin "HEAD:${{ github.head_ref }}"
