name: Execute deterministic FamilyPilot correction

on:
  push:
    paths:
      - '.github/workflows/implement-operation-first-app-shell.yml'

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python3 .github/scripts/correct-operation-first-runtime.py
      - run: node --check /tmp/familypilot-runtime.js
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html src/familypilot.html verification/operation-first-app-shell-source-gate.txt verification/operation-first-app-shell-sha.txt
          git commit -m 'Correct and verify operation-first app shell runtime'
          git push
