name: Accept CRMOS questionnaire answer

on:
  issue_comment:
    types:
      - created
      - edited

permissions:
  contents: read
  issues: write

concurrency:
  group: crmos-questionnaire-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  accept:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      - name: Accept or refresh owned answer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node crmos-questionnaire/accept-answer.mjs
