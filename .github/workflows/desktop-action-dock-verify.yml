name: Verify desktop action dock flow

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/desktop-action-dock-verify.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v6
      - run: npm install --no-save playwright-core@1.53.2
      - name: Run responsive public layout gate
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
        run: |
          mkdir -p verification
          node <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright-core');
          const baseUrl = process.env.PUBLIC_URL;
          const url = `${baseUrl}?desktop-layout=${process.env.GITHUB_SHA}`;
          const gate = {
            'PUBLIC-URL': baseUrl,
            'HTTP-LOAD': 'FAILED',
            'HTTP-STATUS': 'NOT VERIFIED',
            'FINAL-ADDRESS': 'NOT VERIFIED',
            'DESKTOP-ACTION-DOCK-FLOW': 'NOT VERIFIED',
            'DESKTOP-CONTENT-TO-DOCK-GAP': 'NOT VERIFIED',
            'DESKTOP-BOTTOM-NAV-FIXED': 'NOT VERIFIED',
            'MOBILE-ACTION-DOCK-FIXED': 'NOT VERIFIED',
            'PAGE-JAVASCRIPT-ERRORS': 'NOT VERIFIED',
            'VERIFIED-COMMIT': process.env.GITHUB_SHA,
          };
          const sleep = ms => new Promise(r => setTimeout(r, ms));
          (async()=>{
            let source = '';
            let status = 0;
            for (let i = 0; i < 36; i++) {
              try {
                const response = await fetch(url, { cache: 'no-store', redirect: 'follow' });
                status = response.status;
                source = await response.text();
                if (response.ok && source.includes('desktop-flow-action-dock')) break;
              } catch {}
              await sleep(5000);
            }
            gate['HTTP-STATUS'] = String(status);
            if (!(status >= 200 && status < 400) || !source.includes('desktop-flow-action-dock')) {
              throw new Error('Published runtime did not expose desktop-flow-action-dock marker');
            }
            gate['HTTP-LOAD'] = 'SUCCEEDED';
            const executablePath = ['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
            const browser = await chromium.launch({ headless: true, executablePath, args: ['--no-sandbox'] });
            const errors = [];

            const desktop = await browser.newContext({ viewport: { width: 900, height: 1000 } });
            const page = await desktop.newPage();
            page.on('pageerror', error => errors.push(`desktop: ${error.message}`));
            const response = await page.goto(url, { waitUntil: 'networkidle', timeout: 60000 });
            gate['FINAL-ADDRESS'] = page.url();
            gate['HTTP-STATUS'] = String(response?.status() || status);
            await page.locator('[data-screen="operations"]').click();
            const desktopPosition = await page.locator('#actionDock').evaluate(el => getComputedStyle(el).position);
            gate['DESKTOP-ACTION-DOCK-FLOW'] = desktopPosition === 'static' ? 'VERIFIED' : `FAILED: ${desktopPosition}`;
            const screenBox = await page.locator('#operationsScreen').boundingBox();
            const dockBox = await page.locator('#actionDock').boundingBox();
            const gap = Math.round(dockBox.y - (screenBox.y + screenBox.height));
            gate['DESKTOP-CONTENT-TO-DOCK-GAP'] = gap >= 0 && gap <= 30 ? `VERIFIED: ${gap}px` : `FAILED: ${gap}px`;
            const navPosition = await page.locator('.bottom').evaluate(el => getComputedStyle(el).position);
            gate['DESKTOP-BOTTOM-NAV-FIXED'] = navPosition === 'fixed' ? 'VERIFIED' : `FAILED: ${navPosition}`;
            await desktop.close();

            const mobile = await browser.newContext({ viewport: { width: 390, height: 844 }, isMobile: true, hasTouch: true });
            const mobilePage = await mobile.newPage();
            mobilePage.on('pageerror', error => errors.push(`mobile: ${error.message}`));
            await mobilePage.goto(url, { waitUntil: 'networkidle', timeout: 60000 });
            const mobilePosition = await mobilePage.locator('#actionDock').evaluate(el => getComputedStyle(el).position);
            gate['MOBILE-ACTION-DOCK-FIXED'] = mobilePosition === 'fixed' ? 'VERIFIED' : `FAILED: ${mobilePosition}`;
            await mobile.close();
            await browser.close();
            gate['PAGE-JAVASCRIPT-ERRORS'] = errors.length ? `FAILED: ${errors.join(' | ')}` : 'NONE';
          })().catch(error => {
            gate['ERROR'] = error.stack || error.message;
          }).finally(() => {
            fs.writeFileSync('verification/desktop-action-dock-gate.txt', Object.entries(gate).map(([k,v]) => `${k}: ${v}`).join('\n') + '\n');
          });
          NODE
      - name: Record evidence
        if: always()
        run: |
          cp verification/desktop-action-dock-gate.txt /tmp/desktop-action-dock-gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/desktop-action-dock-gate.txt verification/desktop-action-dock-gate.txt
          git add verification/desktop-action-dock-gate.txt
          git diff --cached --quiet && exit 0
          git commit -m "Record desktop action dock verification [skip ci]"
          git push origin HEAD:main
