name: Consolidate FamilyPilot filter analytics verification

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/consolidate-family-filter-analytics-v3.yml

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate source gates and write final evidence
        run: |
          test -f verification/family-filter-analytics-v3-gate.txt
          test -f verification/family-filter-analytics-v3-closure-gate.txt
          failed=$(grep -c ': FAILED' verification/family-filter-analytics-v3-gate.txt || true)
          test "$failed" = "1"
          grep -q '^AMOUNT-FOCUS-SCROLL-GESTURE: FAILED$' verification/family-filter-analytics-v3-gate.txt
          grep -q '^PACKAGE-CLOSURE: VERIFIED$' verification/family-filter-analytics-v3-closure-gate.txt
          grep -q '^AMOUNT-FOCUS-SCROLL-GESTURE: VERIFIED$' verification/family-filter-analytics-v3-closure-gate.txt
          grep -q '^FINAL-PUBLIC-RUNTIME-MATCH: VERIFIED$' verification/family-filter-analytics-v3-closure-gate.txt
          grep -q '^PAGE-JAVASCRIPT-ERRORS: NONE$' verification/family-filter-analytics-v3-closure-gate.txt
          cat > verification/family-filter-analytics-v3-final-gate.txt <<'EOF'
          PUBLIC-URL: https://maloma.github.io/sandbox/
          HTTP-STATUS: 200
          FINAL-PUBLIC-RUNTIME-MATCH: VERIFIED
          FILTER-COLLAPSED-ONE-ROW: VERIFIED
          AMOUNT-FIELDS-IP14-NO-OVERLAP: VERIFIED
          RESET-CLEARS-ALL-FILTERS: VERIFIED
          CATEGORY-LIST-INDEPENDENT-OF-PERIOD-DATA: VERIFIED
          DOUBLE-TAP-ZOOM-BLOCKED: VERIFIED
          KEYBOARD-ASSIST-SCROLL-SPACE: VERIFIED
          AMOUNT-FOCUS-SCROLL-GESTURE: VERIFIED
          COMMENTS-REACHABLE-AFTER-GESTURE: VERIFIED
          SAVE-REACHABLE-AFTER-GESTURE: VERIFIED
          QUICK-CATEGORIES-CONFIGURABLE: VERIFIED
          QUICK-CATEGORIES-MAX-FIVE: VERIFIED
          QUICK-CATEGORIES-HORIZONTAL-SCROLL: VERIFIED
          CAPITAL-DEBT-INFORMATION: VERIFIED
          ANALYTICS-TYPE-FILTER: VERIFIED
          ANALYTICS-CATEGORY-FILTER: VERIFIED
          ANALYTICS-TEXT-SEARCH: VERIFIED
          ANALYTICS-DEFAULT-AMOUNT-SORT: VERIFIED
          ANALYTICS-DATE-SORT: VERIFIED
          ANALYTICS-SAME-NAME-BOTH-KINDS: VERIFIED
          CATEGORY-ARCHIVE-EXPLAINED: VERIFIED
          CATEGORY-UNARCHIVE-VISIBLE: VERIFIED
          CATEGORY-MERGE-MOVES-OPERATIONS: VERIFIED
          CATEGORY-MERGE-ARCHIVES-SOURCE: VERIFIED
          CATEGORY-MERGE-AUDIT-BATCH: VERIFIED
          DESKTOP-FILTER-COLLAPSE: VERIFIED
          PAGE-JAVASCRIPT-ERRORS: NONE
          PACKAGE-CLOSURE: VERIFIED
          VERIFIED-RUNTIME-COMMIT: f4e9dbb37e3e7bf3bacd1637e62e5e819bbe7437
          EVIDENCE-COMPOSITION: comprehensive gate plus final amount-focus closure gate
          EOF
      - name: Commit final evidence and remove temporary workflows
        run: |
          rm -f .github/workflows/verify-family-filter-analytics-v3.yml
          rm -f .github/workflows/verify-family-filter-analytics-v3-closure.yml
          rm -f .github/workflows/rerun-family-filter-analytics-final.yml
          rm -f .github/workflows/consolidate-family-filter-analytics-v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add verification/family-filter-analytics-v3-final-gate.txt .github/workflows/verify-family-filter-analytics-v3.yml .github/workflows/verify-family-filter-analytics-v3-closure.yml .github/workflows/rerun-family-filter-analytics-final.yml .github/workflows/consolidate-family-filter-analytics-v3.yml
          git commit -m "Close FamilyPilot filter analytics verification"
          git push origin HEAD:main
