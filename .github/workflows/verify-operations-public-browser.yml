name: Operations foundation public browser gate

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-operations-public-browser.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Initialize evidence
        run: |
          mkdir -p verification
          cat > verification/operations-public-browser-gate.txt <<'EOF'
          PUBLIC-URL: https://maloma.github.io/sandbox/
          HTTP-LOAD: NOT VERIFIED
          RENDERED-DOM: NOT VERIFIED
          DOMAIN-CHECKS: NOT VERIFIED
          AUTHORSHIP-AND-HISTORY: NOT VERIFIED
          TRASH-AND-RESTORE: NOT VERIFIED
          MULTI-CATEGORY-FILTER: NOT VERIFIED
          CATEGORY-INTEGRITY: NOT VERIFIED
          PERSONAL-WALLET-DEFAULT: NOT VERIFIED
          WALLET-METADATA-UI: NOT VERIFIED
          RESPONSIVE-ACTION-DOCK: NOT VERIFIED
          PAGE-JAVASCRIPT-ERRORS: NOT VERIFIED
          VERIFIED-RUNTIME-COMMIT: 4b931fba44216717d39253da0bcc7a91919b773c
          EOF
      - name: Install browser driver
        run: npm install --no-save playwright-core@1.53.2
      - name: Run browser checks
        if: always()
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
        run: |
          node <<'NODE'
          const fs=require('fs');
          const evidence='verification/operations-public-browser-gate.txt';
          const gate={
            'PUBLIC-URL':process.env.PUBLIC_URL,'HTTP-LOAD':'FAILED','RENDERED-DOM':'FAILED','DOMAIN-CHECKS':'FAILED',
            'AUTHORSHIP-AND-HISTORY':'FAILED','TRASH-AND-RESTORE':'FAILED','MULTI-CATEGORY-FILTER':'FAILED',
            'CATEGORY-INTEGRITY':'FAILED','PERSONAL-WALLET-DEFAULT':'FAILED','WALLET-METADATA-UI':'FAILED',
            'RESPONSIVE-ACTION-DOCK':'FAILED','PAGE-JAVASCRIPT-ERRORS':'NOT VERIFIED',
            'VERIFIED-RUNTIME-COMMIT':'4b931fba44216717d39253da0bcc7a91919b773c'
          };
          const write=()=>fs.writeFileSync(evidence,Object.entries(gate).map(([k,v])=>`${k}: ${v}`).join('\n')+'\n');
          (async()=>{
            let browser; const errors=[];
            try{
              const {chromium}=require('playwright-core');
              const executablePath=['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium','/usr/bin/chromium-browser'].find(fs.existsSync);
              browser=await chromium.launch({headless:true,executablePath,args:['--no-sandbox']});
              const context=await browser.newContext({viewport:{width:390,height:844}});
              const page=await context.newPage(); page.on('pageerror',e=>errors.push(e.message));
              const response=await page.goto(`${process.env.PUBLIC_URL}?test=1&browser-gate=4b931fba`,{waitUntil:'domcontentloaded',timeout:60000});
              await page.waitForFunction(()=>typeof window.__FP_TEST__==='object'&&window.__FP_TEST__.getState().schemaVersion===2,{timeout:30000});
              gate['HTTP-LOAD']=response&&response.status()===200?'SUCCEEDED':`FAILED: ${response?.status()}`;
              gate['RENDERED-DOM']=await page.locator('#operationsScreen').count()===1&&await page.locator('#walletContextBtn').count()===1?'VERIFIED':'FAILED';
              const r=await page.evaluate(()=>{
                const api=window.__FP_TEST__,get=()=>api.getState(); let s=get();
                const personal=s.wallets.find(w=>w.type==='personal');
                const out={personal:personal?.includedInHouseholdCapital===false&&personal.allowedMemberIds.includes(personal.ownerMemberId),walletIds:s.operations.every(o=>!!o.walletId)};
                const c=api.createCategory('expense','Browser Gate Category'); const id=api.createOperation({kind:'expense',amount:12.34,categoryId:c.category.id,note:'Анна'});
                s=get(); let o=s.operations.find(x=>x.id===id); out.author=o.createdByMemberId==='member-anna'&&o.createdAt>0;
                api.setActor('member-martin'); api.editOperation(id,{amount:55,occurredAt:Date.now()-1000,categoryId:'cat-exp-fuel',walletId:'wallet-personal-anna',note:'Мартин'});
                o=get().operations.find(x=>x.id===id); const f=o.revisions.map(x=>x.field);
                out.history=o.lastEditedByMemberId==='member-martin'&&['amount','occurredAt','categoryId','walletId','note'].every(x=>f.includes(x))&&o.revisions.every(x=>x.source==='user'&&'batchId'in x);
                const before=o.revisions.length; api.setActor('member-anna'); api.setTrashEnabled(true); api.trashOperation(id);
                o=get().operations.find(x=>x.id===id); out.trash=o.status==='trash'&&!api.filteredOperations().includes(id)&&o.deletedByMemberId==='member-anna';
                api.setTrashEnabled(false); const retained=get().operations.some(x=>x.id===id&&x.status==='trash'); api.restoreOperation(id); o=get().operations.find(x=>x.id===id);
                out.restore=retained&&o.id===id&&o.status==='active'&&o.revisions.length>=before+2; api.permanentDelete(id); out.noGhost=!get().operations.some(x=>x.id===id);
                const exp=api.createOperation({kind:'expense',amount:1,categoryId:'cat-exp-food'}); api.setTrashEnabled(true); api.trashOperation(exp); api.setTrashExpiry(exp,Date.now()-1); api.renderAll(); out.expiry=!get().operations.some(x=>x.id===exp);
                api.setTypeFilter('expense'); api.setCategoryFilter(['cat-exp-food','cat-exp-fuel']); const ids=api.filteredOperations(),map=Object.fromEntries(get().operations.map(x=>[x.id,x]));
                out.filter=ids.length>0&&ids.every(x=>map[x].kind==='expense'&&['cat-exp-food','cat-exp-fuel'].includes(map[x].categoryId));
                out.duplicate=api.createCategory('expense','  ПРОДУКТЫ  ').ok===false; out.usedDelete=api.deleteCategory('cat-exp-food').ok===false;
                api.setTypeFilter('all'); api.setCategoryFilter([]); api.renderAll(); return out;
              });
              gate['PERSONAL-WALLET-DEFAULT']=r.personal?'VERIFIED':'FAILED';
              gate['DOMAIN-CHECKS']=r.walletIds&&r.author&&r.history?'VERIFIED':'FAILED';
              gate['AUTHORSHIP-AND-HISTORY']=r.author&&r.history?'VERIFIED':'FAILED';
              gate['TRASH-AND-RESTORE']=r.trash&&r.restore&&r.noGhost&&r.expiry?'VERIFIED':'FAILED';
              gate['MULTI-CATEGORY-FILTER']=r.filter?'VERIFIED':'FAILED'; gate['CATEGORY-INTEGRITY']=r.duplicate&&r.usedDelete?'VERIFIED':'FAILED';
              await page.locator('[data-op-id]').first().click();
              gate['WALLET-METADATA-UI']=(await page.locator('#detailWallet').innerText()).length>0&&(await page.locator('#detailCurrency').innerText()).length===3&&(await page.locator('#detailCreated').innerText()).length>0?'VERIFIED':'FAILED';
              await page.locator('[data-close="operationDetail"]').first().click();
              const mobileFixed=await page.locator('#actionDock').evaluate(el=>getComputedStyle(el).position)==='fixed'; await context.close();
              const desktop=await browser.newContext({viewport:{width:1720,height:966}}); const dp=await desktop.newPage(); dp.on('pageerror',e=>errors.push(e.message)); await dp.goto(`${process.env.PUBLIC_URL}?test=1&desktop=1`,{waitUntil:'domcontentloaded'}); await dp.waitForSelector('#actionDock');
              const desktopFixed=await dp.locator('#actionDock').evaluate(el=>getComputedStyle(el).position)==='fixed'; await desktop.close();
              gate['RESPONSIVE-ACTION-DOCK']=mobileFixed&&desktopFixed?'VERIFIED':'FAILED'; gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'NONE';
            }catch(e){gate['BROWSER-ERROR']=e.stack||e.message;gate['PAGE-JAVASCRIPT-ERRORS']=errors.length?`FAILED: ${errors.join(' | ')}`:'NOT VERIFIED'}finally{if(browser)await browser.close();write()}
          })();
          NODE
          cat verification/operations-public-browser-gate.txt
      - name: Record browser evidence
        if: always()
        run: |
          cp verification/operations-public-browser-gate.txt /tmp/gate.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p verification
          cp /tmp/gate.txt verification/operations-public-browser-gate.txt
          git add verification/operations-public-browser-gate.txt
          git diff --cached --quiet && exit 0
          git commit -m "Record Operations public browser gate [skip ci]"
          git push origin HEAD:main
