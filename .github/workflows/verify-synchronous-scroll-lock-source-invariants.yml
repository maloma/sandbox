name: Verify synchronous scroll lock source invariants

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-synchronous-scroll-lock-source-invariants.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v6
      - name: Decode canonical runtime and verify one mechanism
        run: |
          mkdir -p verification
          python <<'PY'
          from pathlib import Path
          import re,base64,gzip
          wrapper=Path('index.html').read_text(encoding='utf-8')
          m=re.search(r'const b="([A-Za-z0-9+/=]+)"',wrapper)
          if not m: raise SystemExit('runtime payload not found')
          source=gzip.decompress(base64.b64decode(m.group(1))).decode('utf-8')
          checks={
            'LOCK-BODY-NOW-COUNT':source.count('function lockBodyNow()')==1,
            'SYNC-BODY-LOCK-COUNT':source.count('function syncBodyLock()')==1,
            'OPEN-LOCKS-SYNCHRONOUSLY':"function open(id){if(!document.querySelector('.overlay.open,.modal.open'))lockBodyNow();" in source,
            'DUPLICATE-BACKGROUND-VARIABLE-ABSENT':'backgroundScrollLocked' not in source,
            'DUPLICATE-BACKGROUND-FUNCTION-ABSENT':'syncBackgroundScrollLock' not in source,
            'DUPLICATE-BACKGROUND-CLASS-ABSENT':'background-locked' not in source,
            'DUPLICATE-OBSERVER-ABSENT':'foregroundLayerObserver' not in source,
            'BODY-FIXED-LOCK-PRESENT':'body.modal-open{position:fixed!important' in source,
            'FOREGROUND-PAN-Y-PRESENT':'.overlay.open .panel,.modal.open .sheet{overscroll-behavior:contain;touch-action:pan-y' in source,
            'RESTORE-RETRY-PRESENT':'requestAnimationFrame(()=>window.scrollTo(0,restoreY))' in source,
          }
          result='VERIFIED' if all(checks.values()) else 'FAILED'
          lines=[f'{k}: {"VERIFIED" if v else "FAILED"}' for k,v in checks.items()]
          lines.append(f'SINGLE-LOCK-MECHANISM: {result}')
          lines.append('VERIFIED-RUNTIME-COMMIT: 850db016822fa83d465e0cac8cac1681953dee3c')
          Path('verification/synchronous-scroll-lock-source-invariants.txt').write_text('\n'.join(lines)+'\n',encoding='utf-8')
          print('\n'.join(lines))
          PY
      - name: Record source evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add verification/synchronous-scroll-lock-source-invariants.txt
          git commit -m "Record synchronous scroll lock source invariants [skip ci]"
          git push origin HEAD:main
