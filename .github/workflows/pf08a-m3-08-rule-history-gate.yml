name: PF-08A M3-08 Rule History Gate

on:
  pull_request:
    branches: [main]
    paths:
      - familypilot-scope.js
      - src/familypilot-scope.js
      - familypilot-rule-history.js
      - tools/pf08a-m3-08-rule-history-browser-smoke.mjs
      - .github/workflows/pf08a-m3-08-rule-history-gate.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-exact-head:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Quiet exact-head checkout
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"
          git fetch -q --depth=1 origin "${HEAD_SHA}"
          git checkout -q --detach FETCH_HEAD

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Check syntax and mirrors
        run: |
          node --check familypilot-scope.js
          node --check familypilot-rule-history.js
          node --check tools/pf08a-m3-08-rule-history-browser-smoke.mjs
          cmp familypilot-scope.js src/familypilot-scope.js

      - name: Verify package contract
        run: |
          grep -qF "familypilot-rule-history.js" familypilot-scope.js
          grep -qF "История платежей" familypilot-rule-history.js
          grep -qF "Изменения правила" familypilot-rule-history.js
          grep -qF "Убрана из финансов" familypilot-rule-history.js
          grep -qF "content.querySelector('.obligation-rule-stats')?.remove()" familypilot-rule-history.js
          grep -qF "rule-change-history" familypilot-rule-history.js

      - name: Browser regression — original obligations foundation
        run: node tools/pf08a-m3-01-browser-smoke.mjs

      - name: Browser regression — partial and cumulative payments
        run: node tools/pf08a-m3-07-partial-payments-browser-smoke.mjs

      - name: Browser regression — complete rule history
        run: node tools/pf08a-m3-08-rule-history-browser-smoke.mjs
