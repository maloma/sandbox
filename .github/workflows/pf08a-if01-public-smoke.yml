name: PF-08A IF-01 Public Smoke

on:
  push:
    branches:
      - agent/pf08a-if01-public-verification
    paths:
      - .github/workflows/pf08a-if01-public-smoke.yml

permissions:
  contents: write

jobs:
  verify-public-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Wait for and verify published canonical runtime
        shell: bash
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_MAIN: 078fff9a9a47b26fd6a4472fe107ba66e3cba926
        run: |
          set -euo pipefail
          mkdir -p docs/execution-batches/PF-08A-IF-01-CANONICAL-RUNTIME-SOURCE
          body="$(mktemp)"
          headers="$(mktemp)"
          passed=false
          attempts=0
          for attempt in $(seq 1 24); do
            attempts="$attempt"
            cache_bust="${EXPECTED_MAIN}-${attempt}-$(date +%s)"
            status="$(curl --fail-with-body --location --silent --show-error \
              --connect-timeout 10 --max-time 30 \
              -D "$headers" -o "$body" -w '%{http_code}' \
              "${PUBLIC_URL}?v=${cache_bust}" || true)"
            if [[ "$status" == "200" ]] \
              && grep -Fq 'canonical-runtime-source-v1' "$body" \
              && ! grep -Fq "fetch('./src/familypilot.html" "$body" \
              && ! grep -Fq 'document.write(source)' "$body" \
              && ! grep -Fq '<div id="boot">Загрузка FamilyPilot…</div>' "$body"; then
              passed=true
              break
            fi
            sleep 10
          done

          if [[ "$passed" != "true" ]]; then
            echo "Public root did not reach the canonical runtime contract." >&2
            echo "Last HTTP status: ${status:-unknown}" >&2
            exit 1
          fi

          body_sha="$(sha256sum "$body" | awk '{print $1}')"
          bytes="$(wc -c < "$body" | tr -d ' ')"
          verified_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > docs/execution-batches/PF-08A-IF-01-CANONICAL-RUNTIME-SOURCE/Public_Verification.md <<EOF
          # Public Verification — PF-08A-IF-01-CANONICAL-RUNTIME-SOURCE

          **Status:** PASS  
          **Verified At:** ${verified_at}  
          **Public URL:** ${PUBLIC_URL}  
          **Expected Main Commit:** ${EXPECTED_MAIN}  
          **HTTP Status:** ${status}  
          **Attempts:** ${attempts}  
          **Response Bytes:** ${bytes}  
          **Response SHA-256:** ${body_sha}

          ## Assertions

          - public root returned HTTP 200 — PASS;
          - `canonical-runtime-source-v1` present — PASS;
          - old runtime `fetch('./src/familypilot.html` loader absent — PASS;
          - `document.write(source)` absent — PASS;
          - old boot placeholder absent — PASS.

          ## Result

          The public FamilyPilot root serves the consolidated canonical runtime contract.

          # END OF FILE
          EOF

      - name: Commit public verification evidence
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/execution-batches/PF-08A-IF-01-CANONICAL-RUNTIME-SOURCE/Public_Verification.md
          git commit -m "Record canonical runtime public verification"
          git push origin HEAD:${{ github.ref_name }}
