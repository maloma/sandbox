name: PF-08A A3-01 Public Analytics Smoke

on:
  push:
    branches:
      - agent/pf08a-a3-01-public-verification
    paths:
      - tools/pf08a-a3-01-public-browser-smoke.mjs
      - .github/workflows/pf08a-a3-01-public-smoke.yml

permissions:
  contents: write

jobs:
  verify-public-analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Verify published compact Analytics package in Chrome
        env:
          PUBLIC_URL: https://maloma.github.io/sandbox/
          EXPECTED_MAIN: a42d3add5160f3a95dab7392ac17ef9b28bbdecf
        run: node tools/pf08a-a3-01-public-browser-smoke.mjs --evidence=docs/execution-batches/PF-08A-A3-01-COMPACT-ANALYTICS-STATES/Public_Verification.md

      - name: Commit public verification evidence
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/execution-batches/PF-08A-A3-01-COMPACT-ANALYTICS-STATES/Public_Verification.md
          git commit -m "Record compact Analytics public verification"
          git push origin HEAD:${{ github.ref_name }}
