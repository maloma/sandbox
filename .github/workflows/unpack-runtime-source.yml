name: Unpack runtime source

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/unpack-runtime-source.yml

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Unpack embedded runtime
        run: |
          python <<'PY'
          from pathlib import Path
          import re, base64, gzip
          s=Path('index.html').read_text(encoding='utf-8')
          m=re.search(r'const b="([A-Za-z0-9+/=]+)"',s)
          if not m: raise SystemExit('embedded payload not found')
          html=gzip.decompress(base64.b64decode(m.group(1))).decode('utf-8')
          Path('runtime-source.html').write_text(html,encoding='utf-8')
          PY
      - name: Commit readable source and remove workflow
        run: |
          rm -f .github/workflows/unpack-runtime-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime-source.html .github/workflows/unpack-runtime-source.yml
          git commit -m "Expose readable Operations runtime source"
          git push origin HEAD:main
