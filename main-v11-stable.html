<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta http-equiv="cache-control" content="no-store"><title>FamilyPilot</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5f7fb}iframe{position:fixed;inset:0;width:100%;height:100%;border:0}</style></head><body><iframe id="shell"></iframe><script>(()=>{'use strict';const shell=document.getElementById('shell'),KEY='familypilot.period.selection.v3';let ops={range:'month',anchor:Date.now()};const types=['day','week','month','year','all'];function deep(){let d=shell.contentWindow?.document;for(let i=0;i<10&&d;i++){if(d.getElementById('homeScreen'))return d;const f=d.querySelector('iframe');if(!f?.contentWindow)break;d=f.contentWindow.document}return null}function norm(v){return{range:types.includes(v?.range)?v.range:'month',anchor:Number(v?.anchor)||Date.now()}}function home(w){try{return norm(JSON.parse(w.localStorage.getItem(KEY)||'{}').home)}catch{return norm(null)}}function bounds(p){const x=new Date(p.anchor),y=x.getFullYear(),m=x.getMonth(),dt=x.getDate();if(p.range==='day')return[new Date(y,m,dt).getTime(),new Date(y,m,dt+1).getTime()];if(p.range==='week'){const q=(x.getDay()+6)%7,s=new Date(y,m,dt-q);return[s.getTime(),new Date(s.getFullYear(),s.getMonth(),s.getDate()+7).getTime()]};if(p.range==='month')return[new Date(y,m,1).getTime(),new Date(y,m+1,1).getTime()];if(p.range==='year')return[new Date(y,0,1).getTime(),new Date(y+1,0,1).getTime()];return[0,Infinity]}function label(p){const[s,e]=bounds(p),a=new Date(s);if(p.range==='day')return new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'long',year:'numeric'}).format(a);if(p.range==='week'){const b=new Date(e-1);return`${new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'short'}).format(a)} — ${new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'short',year:'numeric'}).format(b)}`};if(p.range==='month')return new Intl.DateTimeFormat('ru-RU',{month:'long',year:'numeric'}).format(a);if(p.range==='year')return`${a.getFullYear()} год`;return'Всё время'}function shift(n){const a=new Date(ops.anchor);if(ops.range==='day')a.setDate(a.getDate()+n);if(ops.range==='week')a.setDate(a.getDate()+7*n);if(ops.range==='month')a.setMonth(a.getMonth()+n);if(ops.range==='year')a.setFullYear(a.getFullYear()+n);ops.anchor=Math.min(a.getTime(),Date.now())}function install(){const d=deep();if(!d||d.readyState==='loading')return;const w=d.defaultView;if(d.documentElement.dataset.fpStable11!=='1'){d.documentElement.dataset.fpStable11='1';const st=d.createElement('style');st.textContent='#fpPicker.fp-suppress{display:none!important}';d.head.appendChild(st);const suppress=e=>{if(!e.target.closest?.('[data-fp-range],[data-ops-range]'))return;const p=d.getElementById('fpPicker');if(!p)return;p.classList.add('fp-suppress');p.classList.remove('open');p.setAttribute('aria-hidden','true');requestAnimationFrame(()=>{p.classList.remove('open');p.setAttribute('aria-hidden','true');setTimeout(()=>p.classList.remove('fp-suppress'),80)})};w.addEventListener('pointerdown',suppress,true);w.addEventListener('touchstart',suppress,{capture:true,passive:true});w.addEventListener('click',suppress,true);d.addEventListener('click',e=>{const t=e.target;if(t.closest?.('[data-screen="operations"],[data-fp-open-ops]')){ops={...home(w)};setTimeout(update,0)}const r=t.closest?.('[data-ops-range]');if(r){ops.range=r.dataset.opsRange;ops.anchor=Date.now();setTimeout(update,0)}if(t.closest?.('[data-ops-prev]')){shift(-1);setTimeout(update,0)}if(t.closest?.('[data-ops-next]')){shift(1);setTimeout(update,0)}},true)}function update(){const q=d.querySelector('[data-ops-label]');if(q)q.textContent=label(ops);const p=d.querySelector('[data-ops-prev]'),n=d.querySelector('[data-ops-next]');if(p)p.disabled=ops.range==='all';if(n)n.disabled=ops.range==='all'||bounds(ops)[0]>=bounds({range:ops.range,anchor:Date.now()})[0]}update();setTimeout(update,100)}function boot(){install();setTimeout(install,250);setTimeout(install,900)}shell.addEventListener('load',boot);shell.src='./main-v9-operations-period.html?stable=11&t='+Date.now();setInterval(install,1000)})();</script></body></html>
