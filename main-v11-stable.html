<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta http-equiv="cache-control" content="no-store"><title>FamilyPilot</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5f7fb}iframe{position:fixed;inset:0;width:100%;height:100%;border:0}</style></head><body><iframe id="shell" title="FamilyPilot"></iframe><script>(()=>{'use strict';const shell=document.getElementById('shell'),KEY='familypilot.period.selection.v3';const types=['day','week','month','year','all'];let ops={range:'month',anchor:Date.now()};function deep(){let d=shell.contentWindow?.document;for(let i=0;i<10&&d;i++){if(d.getElementById('homeScreen'))return d;const f=d.querySelector('iframe');if(!f?.contentWindow)break;d=f.contentWindow.document}return null}function norm(v){return{range:types.includes(v?.range)?v.range:'month',anchor:Number(v?.anchor)||Date.now()}}function readPeriods(w){try{return JSON.parse(w.localStorage.getItem(KEY)||'{}')||{}}catch{return{}}}function savePeriods(w,p){w.localStorage.setItem(KEY,JSON.stringify(p))}function home(w){return norm(readPeriods(w).home)}function bounds(p){const x=new Date(p.anchor),y=x.getFullYear(),m=x.getMonth(),dt=x.getDate();if(p.range==='day')return[new Date(y,m,dt).getTime(),new Date(y,m,dt+1).getTime()];if(p.range==='week'){const q=(x.getDay()+6)%7,s=new Date(y,m,dt-q);return[s.getTime(),new Date(s.getFullYear(),s.getMonth(),s.getDate()+7).getTime()]};if(p.range==='month')return[new Date(y,m,1).getTime(),new Date(y,m+1,1).getTime()];if(p.range==='year')return[new Date(y,0,1).getTime(),new Date(y+1,0,1).getTime()];return[0,Infinity]}function label(p){const[s,e]=bounds(p),a=new Date(s);if(p.range==='day')return new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'long',year:'numeric'}).format(a);if(p.range==='week'){const b=new Date(e-1);return`${new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'short'}).format(a)} — ${new Intl.DateTimeFormat('ru-RU',{day:'numeric',month:'short',year:'numeric'}).format(b)}`};if(p.range==='month')return new Intl.DateTimeFormat('ru-RU',{month:'long',year:'numeric'}).format(a);if(p.range==='year')return`${a.getFullYear()} год`;return'Всё время'}function shift(p,n){const a=new Date(p.anchor);if(p.range==='day')a.setDate(a.getDate()+n);if(p.range==='week')a.setDate(a.getDate()+7*n);if(p.range==='month')a.setMonth(a.getMonth()+n);if(p.range==='year')a.setFullYear(a.getFullYear()+n);p.anchor=Math.min(a.getTime(),Date.now())}function closePicker(d){const p=d.getElementById('fpPicker');if(!p)return;p.classList.remove('open');p.setAttribute('aria-hidden','true');p.style.display='none';setTimeout(()=>{p.style.display=''},120)}function install(){const d=deep();if(!d||d.readyState==='loading')return;const w=d.defaultView;if(d.documentElement.dataset.fpDirectPeriodFix!=='1'){d.documentElement.dataset.fpDirectPeriodFix='1';w.addEventListener('click',e=>{const btn=e.target.closest?.('[data-fp-range]');if(btn){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();const context=btn.dataset.fpContext||'home',range=btn.dataset.fpRange,all=readPeriods(w);all[context]=norm(all[context]);all[context].range=range;all[context].anchor=Date.now();savePeriods(w,all);closePicker(d);location.reload();return}const obtn=e.target.closest?.('[data-ops-range]');if(obtn){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();ops.range=obtn.dataset.opsRange;ops.anchor=Date.now();closePicker(d);update(d);return}},true);w.addEventListener('click',e=>{const t=e.target;if(t.closest?.('[data-screen="operations"],[data-fp-open-ops]')){ops={...home(w)};setTimeout(()=>update(d),0)}if(t.closest?.('[data-ops-prev]')){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();shift(ops,-1);update(d)}if(t.closest?.('[data-ops-next]')){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();shift(ops,1);update(d)}},true);new MutationObserver(()=>update(d)).observe(d.body,{subtree:true,childList:true,attributes:true})}update(d)}function update(d){const q=d.querySelector('[data-ops-label]');if(q)q.textContent=label(ops);const p=d.querySelector('[data-ops-prev]'),n=d.querySelector('[data-ops-next]');if(p)p.disabled=ops.range==='all';if(n)n.disabled=ops.range==='all'||bounds(ops)[0]>=bounds({range:ops.range,anchor:Date.now()})[0]}function boot(){install();setTimeout(install,200);setTimeout(install,700)}shell.addEventListener('load',boot);shell.src='./main-v9-operations-period.html?directfix=12&t='+Date.now();setInterval(install,800)})();</script></body></html>
